ents.", "translation": "그녀는 학생들을 위해 항상 늦게까지 남는 헌신적인 선생님입니다."}, {"word": "energetic", "meaning": "활동적인", "example": "We need an energetic person to lead the marketing campaign.", "translation": "마케팅 캠페인을 이끌 활동적인 사람이 필요합니다."}, {"word": "enthusiastic", "meaning": "열렬한", "example": "The audience was very enthusiastic about the new product.", "translation": "청중들은 신제품에 대해 매우 열렬한 반응을 보였습니다."}, {"word": "excel", "meaning": "능가하다, 보다 낫다", "example": "Our company strives to excel in customer satisfaction.", "translation": "우리 회사는 고객 만족에 있어 타사를 능가하기 위해 노력합니다."}, {"word": "exclude", "meaning": "제외하다, 배제하다", "example": "Please exclude personal expenses from the business report.", "translation": "업무 보고서에서 개인 비용은 제외해 주세요."}, {"word": "fluently", "meaning": "유창하게", "example": "He speaks four different languages fluently.", "translation": "그는 4개 국어를 유창하게 구사합니다."}, {"word": "get through", "meaning": "(시험 등에) 합격하다", "example": "I hope to get through the final round of interviews.", "translation": "저는 마지막 단계의 면접에 합격하기를 바랍니다."}, {"word": "against the law", "meaning": "법에 위배되는", "example": "Driving without a license is against the law.", "translation": "면허 없이 운전하는 것은 법에 위배됩니다."}, {"word": "by all means", "meaning": "반드시, 물론이지", "example": "By all means, you should visit the museum.", "translation": "반드시 당신은 그 박물관을 방문해야 합니다."}, {"word": "by mistake", "meaning": "실수로", "example": "I deleted the important file by mistake.", "translation": "나는 실수로 그 중요한 파일을 삭제했습니다."}, {"word": "come to an end", "meaning": "끝나다", "example": "The long negotiation will come to an end soon.", "translation": "긴 협상이 곧 끝날 것입니다."}, {"word": "company regulations", "meaning": "회사 규정", "example": "All employees must follow company regulations.", "translation": "모든 직원은 회사 규정을 준수해야 합니다."}, {"word": "give directions", "meaning": "방향을 알려주다", "example": "Can you give directions to the nearest station?", "translation": "가장 가까운 역으로 가는 방향을 알려주실 수 있나요?"}, {"word": "hold up", "meaning": "견디다, 떠받치다", "example": "These pillars hol tate sale and property management.", "translation": "그녀는 부동산 매매 및 자산 관리 분야에서 일합니다."}, {"word": "recession", "meaning": "경기 후퇴", "example": "The economy is recovering from a deep recession.", "translation": "경제가 깊은 경기 후퇴에서 회복되고 있습니다."}, {"word": "relieve pain", "meaning": "고통을 덜어주다", "example": "This medicine will help relieve pain quickly.", "translation": "이 약은 고통을 빠르게 덜어주는 데 도움을 줄 것입니다."}, {"word": "role model", "meaning": "역할 모델", "example": "Parents should be a good role model for their children.", "translation": "부모는 자녀들에게 좋은 역할 모델이 되어야 합니다."}, {"word": "unplug", "meaning": "플러그를 뽑다", "example": "Please unplug the machine when it is not in use.", "translation": "기계를 사용하지 않을 때는 플러그를 뽑아주세요."}, {"word": "worsen", "meaning": "악화되다", "example": "The weather conditions began to worsen at night.", "translation": "밤이 되자 기상 조건이 악화되기 시작했습니다."}, {"word": "accumulation", "meaning": "축적, 누적", "example": "The accumulation of snow caused severe traffic jams.", "translation": "눈의 축적이 심각한 교통 체증을 유발했습니다."}, {"word": "ascend", "meaning": "오르다, 올라가다", "example": "The elevator slowly ascended to the top floor.", "translation": "엘리베이터가 천천히 맨 위층으로 올라갔습니다."}, {"word": "commerce", "meaning": "통상, 교역", "example": "The city is a major center for international commerce.", "translation": "그 도시는 국제 통상의 주요 중심지입니다."}, {"word": "indifferent", "meaning": "무관심한, 중요하지 않은", "example": "He seemed entirely indifferent to the shocking news.", "translation": "그는 그 충격적인 소식에 완전히 무관심한 것 같았습니다."}, {"word": "prolong", "meaning": "연장시키다", "example": "Do not prolong the meeting unnecessarily today.", "translation": "오늘 회의를 불필요하게 연장시키지 마세요."}, {"word": "relevantly", "meaning": "관련되어", "example": "She answered all the interview questions relevantly.", "translation": "그녀는 모든 면접 질문에 관련되어(적절하게) 대답했습니다."}, {"word": "stimulate", "meaning": "자극하다, 격려하다", "example": "The government cut taxes to stimulate the economy.", "translation": "정부는 경제를 자극하기 위해 세금을 인하했습니다."}, {"word": "supplement", "meaning": "보완하다, 보충하다", "example": "He takes daily vitamins to supplement his diet.", "translation": "그는 식단을 보충하기 위해 매일 비타민을 섭취합니다."}, {"word": "tedious", "meaning": "지루한, 싫증나는", "example": "Data entry can be a very tedious and long job.", "translation": "데이터 입력은 매우 지루하고 긴 작업이 될 수 있습니다."}, {"word": "unavoidable", "meaning": "불가피한", "example": "The flight delay was unavoidable due to the bad weather.", "translation": "악천후로 인해 비행 지연은 불가피했습니다."}, {"word": "be related to", "meaning": "~에 관련되다", "example": "This issue be related to the new security policy.", "translation": "이 문제는 새로운 보안 정책에 관련되어 있습니다. (원형 유지)"}, {"word": "bring in", "meaning": "(시스템을) 도입하다, (돈을) 벌다", "example": "We plan to bring in a new computer system next year.", "translation": "우리는 내년에 새로운 컴퓨터 시스템을 도입할 계획입니다."}, {"word": "brokerage", "meaning": "중개, 중개업소", "example": "He works as an agent at a real estate brokerage.", "translation": "그는 부동산 중개업소에서 중개인으로 일합니다."}, {"word": "business management", "meaning": "경영(학)", "example": "She holds a master's degree in business management.", "translation": "그녀는 경영학 석사 학위를 가지고 있습니다."}, {"word": "business practice", "meaning": "사업 관행", "example": "We strictly follow ethical business practice at work.", "translation": "우리는 직장에서 윤리적인 사업 관행을 엄격히 따릅니다."}, {"word": "collapse", "meaning": "붕괴", "example": "The old bridge collapsed during the heavy earthquake.", "translation": "오래된 다리가 강진 중에 붕괴되었습니다."}, {"word": "cope with", "meaning": "~에 대처하다", "example": "It is difficult to cope with so much stress at once.", "translation": "한꺼번에 너무 많은 스트레스에 대처하기는 어렵습니다."}, {"word": "cost-effective", "meaning": "비용 효율적인", "example": "We need to find a more cost-effective software solution.", "translation": "우리는 더 비용 효율적인 소프트웨어 솔루션을 찾아야 합니다."}, {"word": "descending", "meaning": "내려가는, 하향의", "example": "The airplane is currently in a descending flight path.", "translation": "비행기가 현재 하향 비행 경로에 있습니다."}, {"word": "dominate", "meaning": "지배하다, 우위를 차지하다", "example": "The team dominated the game from the very start.", "translation": "그 팀은 처음부터 게임을 지배했습니다(우위를 차지했습니다)."}, {"word": "downturn", "meaning": "(경기) 침체", "example": "The tech industry suffered a severe economic downturn.", "translation": "기술 산업이 심각한 경제 침체를 겪었습니다."}, {"word": "entail", "meaning": "~을 수반하다, ~을 유발하다", "example": "This new job will entail a lot of international traveling.", "translation": "이 새 직장은 많은 해외 출장을 수반할 것입니다."}, {"word": "exchange rate", "meaning": "환율", "example": "The currency exchange rate fluctuates every single day.", "translation": "통화 환율은 매일매일 변동합니다."}, {"word": "flourish", "meaning": "번창하다, 융성하다", "example": "The small business began to flourish under new management.", "translation": "그 소규모 사업체는 새 경영진 하에서 번창하기 시작했습니다."}, {"word": "for large purchases", "meaning": "대량 구매에 대해서", "example": "We offer a special discount for large purchases.", "translation": "우리는 대량 구매에 대해서 특별 할인을 제공합니다."}, {"word": "for the benefit of", "meaning": "~의 이익을 위해", "example": "The park was built for the benefit of the local community.", "translation": "공원은 지역 사회의 이익을 위해 건설되었습니다."}, {"word": "foremost", "meaning": "선두의, 으뜸가는", "example": "She is one of the foremost experts in this academic field.", "translation": "그녀는 이 학문 분야에서 으뜸가는 전문가 중 한 명입니다."}, {"word": "forerunner", "meaning": "선구자", "example": "This early invention was a forerunner of the modern computer.", "translation": "이 초기 발명품은 현대 컴퓨터의 선구자였습니다."}, {"word": "from around the globe", "meaning": "전 세계에서", "example": "Students from around the globe attended the international seminar.", "translation": "전 세계에서 온 학생들이 국제 세미나에 참석했습니다."}, {"word": "infrastructure", "meaning": "사회 기반 시설, 경제 기반 시설", "example": "The government will invest heavily in transportation infrastructure.", "translation": "정부는 교통 사회 기반 시설에 막대하게 투자할 것입니다."}, {"word": "marketable", "meaning": "시장성이 높은", "example": "We need to turn this brilliant idea into a marketable product.", "translation": "우리는 이 훌륭한 아이디어를 시장성이 높은 제품으로 바꿔야 합니다."}, {"word": "momentary", "meaning": "순간적인, 잠깐의", "example": "There was om", "meaning": "진열실, 전시실", "example": "You can see all the new cars in our large showroom.", "translation": "저희 대형 전시실에서 모든 신차를 보실 수 있습니다."}, {"word": "sleeve", "meaning": "(옷) 소매", "example": "She rolled up the long sleeves of her white shirt.", "translation": "그녀는 흰 셔츠의 긴 소매를 걷어 올렸습니다."}, {"word": "souvenir", "meaning": "기념품", "example": "I bought a small, pretty souvenir from the trip to Paris.", "translation": "나는 파리 여행에서 작고 예쁜 기념품을 샀습니다."}, {"word": "stack", "meaning": "더미; 쌓아 올리다", "example": "He organized the loose papers into a neat stack.", "translation": "그는 흩어진 종이들을 깔끔한 더미로 정리했습니다."}, {"word": "stand in line", "meaning": "줄을 서다", "example": "We had to stand in line for over an hour to get in.", "translation": "우리는 들어가기 위해 한 시간 넘게 줄을 서야 했습니다."}, {"word": "storefront", "meaning": "가게 앞 공간", "example": "They painted the entire storefront bright yellow.", "translation": "그들은 가게 앞 공간 전체를 밝은 노란색으로 칠했습니다."}, {"word": "stylish", "meaning": "패션 감각이 있는, 멋진", "example": "She always wears very stylish and modern clothes.", "translation": "그녀는 항상 매우 멋지고 현대적인 옷을 입습니다."}, {"word": "tag", "meaning": "(물건에 붙어 있는) 꼬리표", "example": "I completely forgot to remove the price tag from the gift.", "translation": "선물에서 가격 꼬리표를 떼는 것을 깜빡했습니다."}, {"word": "take the order", "meaning": "주문을 받다", "example": "The waiter immediately came to our table to take the order.", "translation": "웨이터가 주문을 받기 위해 우리 테이블로 바로 왔습니다."}, {"word": "try on", "meaning": "(옷 따위를) 입어 보다", "example": "Would you like to try on this leather jacket?", "translation": "이 가죽 재킷을 입어 보시겠습니까?"}, {"word": "underline", "meaning": "밑줄을 긋다, 강조하다", "example": "Please underline the most important keywords in the text.", "translation": "텍스트에서 가장 중요한 키워드에 밑줄을 그어주세요."}, {"word": "watch band", "meaning": "(손목시계의) 시곗줄", "example": "I really need to replace my broken leather watch band.", "translation": "나는 끊어진 가죽 시곗줄을 정말 교체해야 합니다."}, {"word": "window-shopping", "meaning": "아이쇼핑", "example": "They went window-shopping in the new e.", "translation": "호텔 룸서비스에는 항상 추가 비용이 붙습니다."}, {"word": "get in line", "meaning": "줄에 들어가 서다", "example": "Please politely get in line to buy the concert tickets.", "translation": "콘서트 티켓을 사려면 정중하게 줄에 들어가 서 주세요."}, {"word": "give a discount", "meaning": "할인하다", "example": "They will generously give a discount to all university students.", "translation": "그들은 모든 대학생에게 관대하게 할인을 해 줄 것입니다."}, {"word": "in cash", "meaning": "현금으로", "example": "I simply don't have enough money to pay in cash.", "translation": "저는 단지 현금으로 지불할 충분한 돈이 없습니다."}, {"word": "merchandise", "meaning": "상품, 제품", "example": "The retail store displays all its new merchandise clearly.", "translation": "그 소매점은 모든 신제품을 명확하게 진열합니다."}, {"word": "no later than", "meaning": "늦어도 ~까지", "example": "Please arrive at the meeting room no later than 9 AM.", "translation": "늦어도 오전 9시까지는 회의실에 도착해 주십시오."}, {"word": "showcase", "meaning": "유리 진열장, 공개 행사", "example": "The art exhibit is a perfect showcase for talented local artists.", "translation": "그 미술 전시회는 재능 있는 지역 예술가들을 위한 완벽한 공개 행사입니다."}, {"word": "textile", "meaning": "직물, 섬유", "example": "The vibrant city is famous for its traditional textile industry.", "translation": "그 활기찬 도시는 전통 섬유 산업으로 유명합니다."}, {"word": "thrifty", "meaning": "검소한, 검약하는", "example": "She is a very thrifty shopper who always looks for sales.", "translation": "그녀는 항상 세일 상품을 찾는 매우 검소한 쇼핑객입니다."}, {"word": "under warranty", "meaning": "보증 기간 중인", "example": "Is this broken laptop still under warranty?", "translation": "이 고장 난 노트북은 아직 보증 기간 중입니까?"}, {"word": "valid for", "meaning": "~에 유효한, ~ 동안 유효한", "example": "This special discount coupon is valid for exactly three months.", "translation": "이 특별 할인 쿠폰은 정확히 3개월 동안 유효합니다."}, {"word": "voucher", "meaning": "(현금 대용의) 상품권", "example": "I happily received a $100 travel voucher as a holiday gift.", "translation": "나는 명절 선물로 100달러짜리 여행 상품권을 기쁘게 받았습니다."}, {"word": "wholesale", "meaning": "도매의, 다량의", "example": "We regularly buy various goods at low g": "유람선 여행", "example": "They went on a luxury cruise for their honeymoon.", "translation": "그들은 신혼여행으로 호화 유람선 여행을 갔습니다."}, {"word": "currency exchange", "meaning": "환전", "example": "Where is the nearest currency exchange counter?", "translation": "가장 가까운 환전소는 어디에 있습니까?"}, {"word": "drift", "meaning": "떠다니다", "example": "The empty boat was drifting slowly on the water.", "translation": "빈 보트가 물 위를 천천히 떠다니고 있었습니다."}, {"word": "ferry", "meaning": "여객선", "example": "We took a ferry to reach the island.", "translation": "우리는 섬에 가기 위해 여객선을 탔습니다."}, {"word": "flight attendant", "meaning": "승무원", "example": "The flight attendant helped me with my luggage.", "translation": "승무원이 내 짐을 도와주었습니다."}, {"word": "fluid", "meaning": "액체, 마실 것", "example": "Passengers cannot bring large amounts of fluid on board.", "translation": "승객들은 다량의 액체를 기내에 반입할 수 없습니다."}, {"word": "guest pass", "meaning": "손님용 입장권", "example": "Visitors must wear a guest pass at all times.", "translation": "방문객들은 항상 손님용 입장권을 착용해야 합니다."}, {"word": "guided tour", "meaning": "가이드 동반 여행", "example": "We booked a guided tour of the ancient ruins.", "translation": "우리는 고대 유적지의 가이드 동반 여행을 예약했습니다."}, {"word": "immigration", "meaning": "입국 심사, 이민", "example": "It took an hour to pass through immigration.", "translation": "입국 심사를 통과하는 데 한 시간이 걸렸습니다."}, {"word": "in-flight", "meaning": "기내의", "example": "They offer excellent in-flight entertainment.", "translation": "그들은 훌륭한 기내 엔터테인먼트를 제공합니다."}, {"word": "landing", "meaning": "착륙", "example": "The plane made a smooth landing despite the rain.", "translation": "비행기는 비에도 불구하고 부드러운 착륙을 했습니다."}, {"word": "landmark", "meaning": "유명한 건물, 유명한 장소", "example": "The Eiffel Tower is a famous landmark in Paris.", "translation": "에펠탑은 파리의 유명한 건물(장소)입니다."}, {"word": "layover", "meaning": "(비행 시의) 도중 하차, 경유지", "example": "We had a three-hour layover in Dubai.", "translation": "우리는 두바이에서 3시간의 도중 하차(경유)가 있었습니다."}, {"word": "leave for", "meaning": "~로 떠나다", "example": "She will leave for er in London for two days.", "translation": "우리는 런던에 이틀 동안 잠깐 들를 것입니다."}, {"word": "take off", "meaning": "이륙하다", "example": "The plane will take off in fifteen minutes.", "translation": "비행기는 15분 후에 이륙할 것입니다."}, {"word": "take one's bag off", "meaning": "가방을 내려놓다", "example": "Please take one's bag off the empty seat.", "translation": "빈 좌석에서 가방을 내려놓으십시오. (원형 유지)"}, {"word": "train conductor", "meaning": "기차 차장", "example": "The train conductor checked everyone's tickets.", "translation": "기차 차장이 모든 사람의 표를 확인했습니다."}, {"word": "travel agency", "meaning": "여행사", "example": "I booked the package through a local travel agency.", "translation": "나는 지역 여행사를 통해 패키지를 예약했습니다."}, {"word": "unload", "meaning": "짐을 내리다", "example": "The workers began to unload the truck.", "translation": "작업자들이 트럭의 짐을 내리기 시작했습니다."}, {"word": "unlock", "meaning": "자물쇠를 열다", "example": "I forgot the password to unlock my suitcase.", "translation": "나는 내 여행 가방 자물쇠를 열 비밀번호를 잊어버렸습니다."}, {"word": "walking tour", "meaning": "도보 여행", "example": "We joined a walking tour of the historic city center.", "translation": "우리는 역사적인 도심의 도보 여행에 참여했습니다."}, {"word": "distant", "meaning": "멀리 떨어진", "example": "I heard the sound of thunder from a distant mountain.", "translation": "나는 멀리 떨어진 산에서 천둥소리를 들었습니다."}, {"word": "favor", "meaning": "호의, 친절", "example": "Could you do me a small favor?", "translation": "제게 작은 호의(부탁)를 베풀어 주시겠습니까?"}, {"word": "overhead", "meaning": "머리 위의", "example": "She turned on the overhead reading light.", "translation": "그녀는 머리 위의 독서등을 켰습니다."}, {"word": "remains", "meaning": "유물", "example": "The museum exhibits ancient Roman remains.", "translation": "박물관은 고대 로마의 유물을 전시합니다."}, {"word": "rightly", "meaning": "당연히, 마땅히", "example": "She is rightly proud of her great achievements.", "translation": "그녀는 당연히 자신의 훌륭한 성취를 자랑스러워합니다."}, {"word": "tastefully", "meaning": "고상하게, 우아하게", "example": "The hotel room was tastefully decorated.", "translation": "호텔 방은 우아하게 장식되어 있었습니다."}, {"word": "travel arrangement", "meaning": "여행 준비", "example": "I am currently making the final travel arrangement.", "translation": "나는 현재 최종 여행 준비를 하고 있습니다."}, {"word": "accumulate", "meaning": "축적하다", "example": "Dust quickly accumulated on the old bookshelf.", "translation": "낡은 책장에 먼지가 빠르게 축적되었습니다."}, {"word": "geographic", "meaning": "지리상의", "example": "The unique geographic features attract many tourists.", "translation": "독특한 지리상의 특징들이 많은 관광객을 끌어모읍니다."}, {"word": "go through customs", "meaning": "세관을 통과하다", "example": "All international passengers must go through customs.", "translation": "모든 국제선 승객은 세관을 통과해야 합니다."}, {"word": "jet lag", "meaning": "시차증 (여행 시 시차로 인한 피로)", "example": "I usually suffer from terrible jet lag after a long flight.", "translation": "나는 보통 긴 비행 후에 심한 시차증에 시달립니다."}, {"word": "memorable", "meaning": "기억할 만한, 잊혀지지 않는", "example": "It was a truly memorable vacation for my family.", "translation": "그것은 우리 가족에게 정말 기억할 만한 휴가였습니다."}, {"word": "memorial", "meaning": "기념물; 기념의", "example": "They built a large stone memorial in the park.", "translation": "그들은 공원에 큰 돌 기념물을 지었습니다."}, {"word": "precisely", "meaning": "정확히", "example": "The meeting will start precisely at noon.", "translation": "회의는 정확히 정오에 시작될 것입니다."}, {"word": "round trip", "meaning": "왕복 여행", "example": "A round trip ticket is cheaper than two one-way tickets.", "translation": "왕복 여행 티켓이 편도 티켓 두 장보다 쌉니다."}, {"word": "runway", "meaning": "활주로", "example": "The airplane taxied slowly down the long runway.", "translation": "비행기가 긴 활주로를 따라 천천히 이동했습니다."}, {"word": "seasickness", "meaning": "뱃멀미", "example": "She took medicine to prevent seasickness.", "translation": "그녀는 뱃멀미를 예방하기 위해 약을 먹었습니다."}, {"word": "sensation", "meaning": "느낌, 감각", "example": "I had a strange sensation in my left leg.", "translation": "나는 왼쪽 다리에 이상한 느낌(감각)이 있었습니다."}, {"word": "suburban train line", "meaning": "교외로 나가는 열차선", "example": "The suburban train line connects the city to the quiet towns.", "translation": "교외로 나가는 열차선은 도시와 조용한 마을들을 연결합니다."}, {"word": "voyage", "meaning": "(원거리) 항해", "example": "The long sea voyage took almost three weeks.", "translation": "긴 바다 항해는 거의 3주가 걸렸습니다."}, {"word": "wildlife", "meaning": "야생 동물", "example": "The national park is famous for its diverse wildlife.", "translation": "그 국립 공원은 다양한 야생 동물로 유명합니다."}, {"word": "close a deal", "meaning": "계약을 체결하다", "example": "The manager finally managed to close a deal.", "translation": "매니저가 마침내 계약을 체결하는 데 성공했습니다."}, {"word": "complicate", "meaning": "복잡하게 하다", "example": "These extra rules only complicate the situation.", "translation": "이 추가 규칙들은 상황을 복잡하게 할 뿐입니다."}, {"word": "dial a number", "meaning": "전화번호를 돌리다, 전화를 걸다", "example": "Please carefully dial a number on the screen.", "translation": "화면에 있는 전화번호를 조심스럽게 걸어주십시오."}, {"word": "disadvantage", "meaning": "불이익", "example": "This strict contract puts us at a huge disadvantage.", "translation": "이 엄격한 계약은 우리에게 큰 불이익을 줍니다."}, {"word": "focus on", "meaning": "~에 집중하다", "example": "We need to strongly focus on improving customer service.", "translation": "우리는 고객 서비스 개선에 강하게 집중해야 합니다."}, {"word": "for ages", "meaning": "오랫동안", "example": "I haven't seen my old college friend for ages.", "translation": "나는 내 옛 대학 친구를 오랫동안 보지 못했습니다."}, {"word": "household", "meaning": "가족, 가구 세대", "example": "Every household in the area received a warning letter.", "translation": "그 지역의 모든 가구 세대가 경고 편지를 받았습니다."}, {"word": "I have no idea.", "meaning": "잘 모르겠어요.", "example": "Where did she go? I have no idea.", "translation": "그녀가 어디로 갔나요? 잘 모르겠어요."}, {"word": "lock up", "meaning": "(자물쇠를 채워) 보관하다", "example": "Please remember to safely lock up the valuable items.", "translation": "귀중품을 자물쇠를 채워 안전하게 보관하는 것을 잊지 마세요."}, {"word": "make a deposit", "meaning": "계약금을 치르다, 보증금을 치르다", "example": "You must make a deposit to secure the apartment.", "translation": "아파트를 확보하려면 계약금(보증금)을 치러야 합니다."}, {"word": "make a mistake", "meaning": "실수하다", "example": "Everyone can sometimes make a mistake under pressure.", "translation": "누구나 압박감 속에서는 때때로 실수할 수 있습니다."}, {"word": "peak", "meaning": "절정, 최고점", "example": "Hotel prices are highest during the peak summer season.", "translation": "호텔 가격은 여름 최고점(절정) 시즌에 가장 높습니다."}, {"word": "rain check", "meaning": "우천 교환권, 후일 구매권", "example": "They offered a rain check for the canceled baseball game.", "translation": "그들은 취소된 야구 경기에 대해 우천 교환권을 제공했습니다."}, {"word": "rent out", "meaning": "~을 임대하다", "example": "She plans to rent out her empty spare room.", "translation": "그녀는 빈 방을 임대할 계획입니다."}, {"word": "rental agreement", "meaning": "임대 계약서", "example": "Please read the rental agreement thoroughly before signing.", "translation": "서명하기 전에 임대 계약서를 철저히 읽어보십시오."}, {"word": "rough", "meaning": "힘든, 거친", "example": "The small boat struggled in the incredibly rough sea.", "translation": "작은 보트가 믿을 수 없을 정도로 거친 바다에서 고전했습니다."}, {"word": "royalty", "meaning": "저작권 사용료", "example": "The famous author receives a 10% royalty on each book sold.", "translation": "그 유명한 작가는 책 한 권이 팔릴 때마다 10%의 저작권 사용료를 받습니다."}, {"word": "run in several directions", "meaning": "여러 방향으로 뻗어 있다", "example": "The complex subway lines run in several directions.", "translation": "복잡한 지하철 노선들이 여러 방향으로 뻗어 있습니다."}, {"word": "scare", "meaning": "겁주다", "example": "The sudden loud noise scared the little child.", "translation": "갑작스러운 큰 소음이 어린아이를 겁주었습니다."}, {"word": "sign a contract", "meaning": "계약서에 서명하다", "example": "We will formally sign a contract tomorrow morning.", "translation": "우리는 내일 아침 공식적으로 계약서에 서명할 것입니다."}, {"word": "under a contract", "meaning": "계약 하에", "example": "The construction workers are currently under a contract.", "translation": "건설 노동자들은 현재 계약 하에 있습니다."}, {"word": "win a contract", "meaning": "계약을 따내다", "example": "Our company successfully won a contract to build the bridge.", "translation": "우리 회사는 다리를 건설하는 계약을 성공적으로 따냈습니다."}, {"word": "agreeable", "meaning": "기꺼이 동의하는, 기분 좋은", "example": "They reached an agreeable compromise for both sides.", "translation": "그들은 양측 모두에게 기분 좋은(동의할 만한) 타협에 도달했습니다."}, {"word": "call out", "meaning": "~를 부르다", "example": "The supervisor called out my name from the back.", "translation": "감독관이 뒤에서 내 이름을 불렀습니다."}, {"word": "convincing", "meaning": "설득력 있는", "example": "He gave a very convincing explanation for his absence.", "translation": "그는 결석에 대해 매우 설득력 있는 설명을 했습니다."}, {"word": "diplomatic", "meaning": "외교상의", "example": "The president resolved the issue through diplomatic channels.", "translation": "대통령은 외교상의 경로를 통해 그 문제를 해결했습니다."}, {"word": "equality", "meaning": "같음, 평등, 대등", "example": "We strongly support gender equality in the workplace.", "translation": "우리는 직장에서의 성 평등을 강력히 지지합니다."}, {"word": "ethical", "meaning": "윤리적인, 도덕에 관계된", "example": "The company is highly praised for its ethical business practices.", "translation": "그 회사는 윤리적인 사업 관행으로 높은 칭찬을 받습니다."}, {"word": "hesitate", "meaning": "망설이다, 머뭇거리다", "example": "Do not hesitate to contact us if you need help.", "translation": "도움이 필요하시면 망설이지 말고 연락해 주십시오."}, {"word": "in contrast", "meaning": "반대로", "example": "The red car is fast; in contrast, the blue one is slow.", "translation": "빨간 차는 빠릅니다. 반대로 파란 차는 느립니다."}, {"word": "instrumental", "meaning": "(어떤 일을 하는 데) 중요한", "example": "She was instrumental in organizing the charity event.", "translation": "그녀는 자선 행사를 조직하는 데 중요한 역할을 했습니다."}, {"word": "lengthen", "meaning": "길어지다, 늘이다", "example": "They plan to lengthen the current runway for bigger planes.", "translation": "그들은 더 큰 비행기를 위해 현재의 활주로를 늘일 계획입니다."}, {"word": "make a move", "meaning": "행동을 취하다", "example": "It is time for us to finally make a move.", "translation": "우리가 마침내 행동을 취할 때입니다."}, {"word": "offend", "meaning": "(규칙을) 위반하다", "example": "He severely offended the company's strict safety rules.", "translation": "그는 회사의 엄격한 안전 규칙을 심하게 위반했습니다."}, {"word": "opposing", "meaning": "대항하는, 반대하는", "example": "The opposing team played very aggressively today.", "translation": "반대하는(상대) 팀이 오늘 매우 공격적으로 경기했습니다."}, {"word": "origin", "meaning": "시초, 기원", "example": "The exact origin of this ancient tradition is unknown.", "translation": "이 고대 전통의 정확한 기원(시초)은 알려지지 않았습니다."}, {"word": "rational", "meaning": "합리적인", "example": "We must make a calm and rational decision now.", "translation": "우리는 침착하고 합리적인 결정을 지금 내려야 합니다."}, {"word": "recognition", "meaning": "인정", "example": "He received an award in recognition of his hard work.", "translation": "그는 그의 노고에 대한 인정으로 상을 받았습니다."}, {"word": "refusal", "meaning": "거절, 거부", "example": "Her sudden refusal of the offer completely surprised us.", "translation": "그녀의 갑작스러운 제안 거절은 우리를 완전히 놀라게 했습니다."}, {"word": "sarcastic", "meaning": "풍자적인, 빈정거리는", "example": "He made a highly sarcastic comment about the delayed project.", "translation": "그는 지연된 프로젝트에 대해 매우 빈정거리는 발언을 했습니다."}, {"word": "selected", "meaning": "선택된, 선발된", "example": "Only a few selected candidates will be interviewed.", "translation": "소수의 선택된(선발된) 후보자들만 면접을 볼 것입니다."}, {"word": "sort of", "meaning": "다소, 얼마간, 말하자면", "example": "I feel sort of tired after the long trip.", "translation": "긴 여행 후에 나는 다소 피곤함을 느낍니다."}, {"word": "surely", "meaning": "틀림없이, 꼭", "example": "The missing package will surely arrive by tomorrow.", "translation": "분실된 소포는 틀림없이 내일까지 도착할 것입니다."}, {"word": "surprise", "meaning": "놀라게 하다; 놀라운 일", "example": "The unexpected gift was a wonderful surprise for her.", "translation": "그 예상치 못한 선물은 그녀에게 멋지고 놀라운 일이었습니다."}, {"word": "uninterested", "meaning": "흥미 없는, 무관심한", "example": "He seemed completely uninterested in the business proposal.", "translation": "그는 그 사업 제안에 완전히 흥미 없는 것 같았습니다."}, {"word": "verbal", "meaning": "말의, 구두의", "example": "They reached a simple verbal agreement, not a written one.", "translation": "그들은 서면이 아닌 간단한 구두(말의) 합의에 도달했습니다."}, {"word": "virtual", "meaning": "사실상의", "example": "The internet has created a virtual global community.", "translation": "인터넷은 사실상의 글로벌 커뮤니티를 만들었습니다."}, {"word": "within reason", "meaning": "온당한 범위 내에서", "example": "You can choose any item from the menu, within reason.", "translation": "당신은 온당한 범위 내에서 메뉴의 어떤 항목이든 고를 수 있습니다."}, {"word": "be in agreement", "meaning": "동의하다", "example": "All board members be in agreement on the new budget.", "translation": "모든 이사회 구성원들이 새 예산에 동의합니다. (원형 유지)"}, {"word": "draw up a new agreement", "meaning": "새 계약서를 작성하다", "example": "The lawyer will draw up a new agreement tomorrow.", "translation": "변호사가 내일 새 계약서를 작성할 것입니다."}, {"word": "enclosure", "meaning": "동봉(한 것), 동봉물, 둘러쌈", "example": "Please check the documents in the attached enclosure.", "translation": "첨부된 동봉물(동봉된 것) 안의 서류들을 확인해 주십시오."}, {"word": "generation gap", "meaning": "세대 차이", "example": "The rapid technological changes widened the generation gap.", "translation": "급격한 기술의 변화가 세대 차이를 넓혔습니다."}, {"word": "have difficulty (in) -ing", "meaning": "~하는 데 어려움을 겪다", "example": "I have difficulty (in) -ing this complex software.", "translation": "나는 이 복잡한 소프트웨어를 사용하는 데 어려움을 겪습니다. (원형 유지)"}, {"word": "in an attempt to", "meaning": "~하려는 시도로", "example": "He ran fast in an attempt to catch the leaving bus.", "translation": "그는 떠나는 버스를 잡으려는 시도로 빨리 달렸습니다."}, {"word": "in appreciation of", "meaning": "~에 감사하여", "example": "We sent a gift basket in appreciation of her help.", "translation": "우리는 그녀의 도움에 감사하여 선물 바구니를 보냈습니다."}, {"word": "in print", "meaning": "인쇄된", "example": "It is amazing to finally see my own name in print.", "translation": "마침내 내 이름이 인쇄된 것을 보는 것은 놀랍습니다."}, {"word": "in summary", "meaning": "요약하면", "example": "In summary, the project was a complete success.", "translation": "요약하면, 그 프로젝트는 완전한 성공이었습니다."}, {"word": "lifetime employment", "meaning": "종신 고용", "example": "The traditional company still generously offers lifetime employment.", "translation": "그 전통적인 회사는 여전히 관대하게 종신 고용을 제공합니다."}, {"word": "low-income resident", "meaning": "저소득 주민", "example": "The new housing project is entirely for low-income residents.", "translation": "새 주택 프로젝트는 전적으로 저소득 주민을 위한 것입니다."}, {"word": "make a bid", "meaning": "입찰하다", "example": "Several large companies made a bid for the construction contract.", "translation": "여러 대기업이 건설 계약에 입찰했습니다."}, {"word": "make a contract with", "meaning": "~와 계약을 맺다", "example": "We recently made a contract with a new supplier.", "translation": "우리는 최근에 새 공급업체와 계약을 맺었습니다."}, {"word": "on hand", "meaning": "가까이에", "example": "Please keep your passport and ticket on hand.", "translation": "여권과 티켓을 가까이에 두십시오."}, {"word": "replica", "meaning": "복제품", "example": "He bought a perfect replica of the famous sword.", "translation": "그는 그 유명한 검의 완벽한 복제품을 샀습니다."}, {"word": "rigid", "meaning": "엄격한, 완고한", "example": "The military academy has incredibly rigid disciplinary rules.", "translation": "사관학교는 믿을 수 없을 정도로 엄격한 규율을 가지고 있습니다."}, {"word": "security deposit", "meaning": "보증금", "example": "The landlord requires a full month's rent as a security deposit.", "translation": "집주인은 보증금으로 한 달 치 월세 전액을 요구합니다."}, {"word": "sequential", "meaning": "순차적인", "example": "The files are neatly organized in a sequential order.", "translation": "파일들이 순차적인 순서로 깔끔하게 정리되어 있습니다."}, {"word": "successful candidate", "meaning": "합격자", "example": "The successful candidate will be directly notified by email.", "translation": "합격자는 이메일로 직접 통보받을 것입니다."}, {"word": "take A seriously", "meaning": "A를 진지하게 받아들이다", "example": "You must definitely take A seriously from now on.", "translation": "당신은 지금부터 A를 확실히 진지하게 받아들여야 합니다. (원형 유지)"}, {"word": "back away from", "meaning": "~에서 뒷걸음치다, 물러나다", "example": "The frightened animal slowly backed away from the stranger.", "translation": "겁먹은 동물이 낯선 사람에게서 천천히 뒷걸음쳤습니다."}, {"word": "be closed for the day", "meaning": "(영업시간이 끝나) 문을 닫다", "example": "The museum will be closed for the day due to renovation.", "translation": "박물관은 보수 공사로 인해 영업시간이 끝나 문을 닫을 것입니다. (원형 유지)"}, {"word": "be determined to do", "meaning": "~하기로 결심하다", "example": "I be determined to do my absolute best in the final exam.", "translation": "나는 기말고사에서 내 절대적인 최선을 다하기로 결심합니다. (원형 유지)"}, {"word": "business day", "meaning": "영업일", "example": "Please allow exactly three to five business days for shipping.", "translation": "배송에 정확히 영업일 기준 3~5일을 허용해 주십시오."}, {"word": "commercial space", "meaning": "상업 공간", "example": "The new building offers large commercial spaces for rent.", "translation": "새 건물은 임대용 대형 상업 공간을 제공합니다."}, {"word": "day after tomorrow", "meaning": "모레", "example": "The final package will be delivered the day after tomorrow.", "translation": "최종 소포는 모레 배달될 것입니다."}, {"word": "front-page story", "meaning": "1면 기사", "example": "The massive scandal quickly became a huge front-page story.", "translation": "그 거대한 스캔들은 재빨리 엄청난 1면 기사가 되었습니다."}, {"word": "give a good price", "meaning": "좋은 가격에 주다", "example": "The kind seller gave a good price for the antique table.", "translation": "친절한 판매자가 골동품 탁자를 좋은 가격에 주었습니다."}, {"word": "headline", "meaning": "기사 제목", "example": "The bold newspaper headline caught everyone's attention today.", "translation": "굵은 신문 기사 제목이 오늘 모든 사람의 시선을 끌었습니다."}, {"word": "in stock", "meaning": "재고가 있는", "example": "Fortunately, we currently have plenty of those items in stock.", "translation": "다행히도, 우리는 현재 그 품목들을 재고로 많이 가지고 있습니다."}, {"word": "lead (up/down) to", "meaning": "~로 이어지다, ~로 통하다", "example": "This narrow dark path leads to the hidden underground cave.", "translation": "이 좁고 어두운 길은 숨겨진 지하 동굴로 이어집니다."}, {"word": "make a recording", "meaning": "녹음하다, 녹화하다", "example": "The artist silently went into the studio to make a recording.", "translation": "예술가가 녹음하기 위해 조용히 스튜디오에 들어갔습니다."}, {"word": "normal operating hours", "meaning": "정상 영업시간", "example": "We will cheerfully resume our normal operating hours on Monday.", "translation": "우리는 월요일에 정상 영업시간을 기분 좋게 재개할 것입니다."}, {"word": "on sale", "meaning": "판매되고 있는", "example": "Fresh, organic strawberries are currently on sale at the market.", "translation": "신선한 유기농 딸기가 현재 시장에서 판매되고 있습니다."}, {"word": "on the market", "meaning": "시판 중인", "example": "This is absolutely the best reliable smartphone currently on the market.", "translation": "이것은 현재 시판 중인 절대적으로 가장 믿을 수 있는 스마트폰입니다."}, {"word": "out of print", "meaning": "절판된", "example": "Unfortunately, that classic famous book has been out of print for years.", "translation": "안타깝게도 그 유명한 고전 책은 수년 동안 절판된 상태입니다."}, {"word": "out of stock", "meaning": "재고가 없는", "example": "I am terribly sorry, but the red shoes are completely out of stock.", "translation": "대단히 죄송하지만, 빨간 신발은 완전히 재고가 없습니다."}, {"word": "overcharge", "meaning": "바가지 씌우다, 부당한 값을 요구하다", "example": "The dishonest taxi driver aggressively tried to overcharge me.", "translation": "정직하지 못한 택시 기사가 내게 공격적으로 바가지를 씌우려 했습니다."}, {"word": "payment option", "meaning": "결제 방법", "example": "The online store offers several convenient payment options.", "translation": "온라인 상점은 여러 가지 편리한 결제 방법을 제공합니다."}, {"word": "place an order", "meaning": "주문하다", "example": "You can easily place an order directly through our official website.", "translation": "저희 공식 웹사이트를 통해 직접 쉽게 주문할 수 있습니다."}, {"word": "put A out for sale", "meaning": "A를 판매하기 위해 내놓다", "example": "They will officially put A out for sale next Friday.", "translation": "그들은 다음 주 금요일에 공식적으로 A를 판매하기 위해 내놓을 것입니다. (원형 유지)"}, {"word": "retail store", "meaning": "소매점", "example": "He successfully manages a busy clothing retail store downtown.", "translation": "그는 시내에서 바쁜 의류 소매점을 성공적으로 관리합니다."}, {"word": "run out of", "meaning": "~을 다 써 버리다, ~이 바닥나다", "example": "The printer suddenly ran out of black ink this morning.", "translation": "프린터에 갑자기 오늘 아침 검은색 잉크가 바닥났습니다."}, {"word": "sales presentation", "meaning": "제품 소개", "example": "She confidently gave an excellent sales presentation to the clients.", "translation": "그녀는 고객들에게 훌륭한 제품 소개를 자신 있게 했습니다."}, {"word": "salesperson", "meaning": "판매원, 외판원", "example": "The polite salesperson quickly helped me find the perfect gift.", "translation": "예의 바른 판매원이 내가 완벽한 선물을 찾도록 재빨리 도와주었습니다."}, {"word": "sold out", "meaning": "매진된", "example": "All the popular concert tickets were completely sold out in an hour.", "translation": "인기 있는 콘서트 티켓이 한 시간 만에 완전히 매진되었습니다."}, {"word": "stay open late", "meaning": "늦게까지 영업하다", "example": "The convenience store fiercely decides to stay open late on weekends.", "translation": "편의점은 주말에 늦게까지 영업하기로 굳게 결정합니다."}, {"word": "stockroom", "meaning": "물품 보관소", "example": "He went to the dark stockroom to fetch more paper supplies.", "translation": "그는 더 많은 종이 용품을 가져오기 위해 어두운 물품 보관소로 갔습니다."}, {"word": "storage facility", "meaning": "창고 시설", "example": "We proudly rent a secure temperature-controlled storage facility.", "translation": "우리는 온도 조절이 되는 안전한 창고 시설을 자랑스럽게 임대합니다."}, {"word": "storeroom", "meaning": "저장실", "example": "The old storeroom is completely filled with broken furniture.", "translation": "낡은 저장실은 망가진 가구들로 완전히 가득 차 있습니다."}, {"word": "take inventory", "meaning": "재고 목록을 만들다", "example": "The diligent staff must take inventory completely at the end of every month.", "translation": "성실한 직원들은 매월 말에 재고 목록을 완벽하게 만들어야 합니다."}, {"word": "accordingly", "meaning": "그에 알맞게, 따라서", "example": "We closely monitored the weather and planned accordingly.", "translation": "우리는 날씨를 면밀히 모니터링하고 그에 알맞게 계획했습니다."}, {"word": "adaptable", "meaning": "적응할 수 있는", "example": "Children are generally much more naturally adaptable to changes than adults.", "translation": "아이들은 일반적으로 어른들보다 변화에 자연스럽게 훨씬 더 잘 적응할 수 있습니다."}, {"word": "along with", "meaning": "~와 함께", "example": "Please send the application securely along with your updated resume.", "translation": "신청서를 업데이트된 이력서와 함께 안전하게 보내주십시오."}, {"word": "at the latest", "meaning": "늦어도", "example": "The critical report must definitely be finished by Friday at the latest.", "translation": "그 중요한 보고서는 늦어도 금요일까지는 반드시 완료되어야 합니다."}, {"word": "compliant", "meaning": "준수하는", "example": "All medical devices must absolutely be fully compliant with strict safety rules.", "translation": "모든 의료 기기는 엄격한 안전 규칙을 절대적으로 완전히 준수해야 합니다."}, {"word": "correspond", "meaning": "일치하다, 부합하다", "example": "His surprising actions simply do not correspond with his beautiful words.", "translation": "그의 놀라운 행동은 그의 아름다운 말과 전혀 일치하지(부합하지) 않습니다."}, {"word": "cultivation", "meaning": "우호 증진, 양성", "example": "The long-term cultivation of strong client relationships is highly essential.", "translation": "강력한 고객 관계의 장기적인 양성(우호 증진)은 매우 필수적입니다."}, {"word": "do business with", "meaning": "~와 거래하다", "example": "We are truly proud to reliably do business with your excellent company.", "translation": "우리는 귀하의 훌륭한 회사와 믿을 수 있게 거래하게 되어 진심으로 자랑스럽습니다."}, {"word": "had better do", "meaning": "~하는 편이 낫다, ~해야 한다", "example": "You firmly had better do your homework right now before dinner.", "translation": "당신은 저녁 식사 전 지금 당장 숙제를 단호히 하는 편이 낫습니다."}, {"word": "honorable", "meaning": "고결한, 정직한", "example": "She is an incredibly honorable person who always tells the pure truth.", "translation": "그녀는 항상 순수한 진실을 말하는 믿을 수 없을 정도로 고결한 사람입니다."}, {"word": "perceptive", "meaning": "통찰력 있는", "example": "The deeply perceptive manager easily noticed the subtle problem immediately.", "translation": "매우 통찰력 있는 매니저가 미묘한 문제를 즉시 쉽게 알아챘습니다."}, {"word": "reasonably", "meaning": "합리적으로, 적당하게", "example": "The used car is reasonably priced considering its surprisingly good condition.", "translation": "그 중고차는 놀라울 정도로 좋은 상태를 고려할 때 합리적으로 가격이 책정되었습니다."}, {"word": "transformation", "meaning": "변화, 변신", "example": "The old neighborhood underwent a truly remarkable massive transformation.", "translation": "오래된 동네가 진정으로 놀라운 대규모 변화를 겪었습니다."}, {"word": "attain", "meaning": "(목표를) 달성하다", "example": "He worked tirelessly to successfully attain his highest career goals.", "translation": "그는 자신의 최고 경력 목표를 성공적으로 달성하기 위해 지칠 줄 모르고 일했습니다."}, {"word": "barter", "meaning": "물물 교환하다; 물물 교환", "example": "Ancient people used to regularly barter essential goods instead of using money.", "translation": "고대 사람들은 돈을 사용하는 대신 필수품들을 정기적으로 물물 교환하곤 했습니다."}, {"word": "boycott", "meaning": "불매하다; 불매 운동", ling party intensely wants to continuously hold power for another decade.", "translation": "여당은 향후 10년 동안 계속해서 강렬하게 권력을 쥐고 싶어 합니다."}, {"word": "inclination", "meaning": "의향, 뜻", "example": "I have absolutely no inclination to suddenly fiercely argue with you today.", "translation": "나는 오늘 당신과 갑자기 맹렬히 언쟁할 의향이 절대 전혀 없습니다."}, {"word": "inevitable", "meaning": "불가피한", "example": "Mistakes are truly simply completely inevitable when you are constantly learning something new.", "translation": "새로운 것을 끊임없이 배울 때 실수는 진정으로 단순히 완전히 불가피합니다."}, {"word": "loyal customer", "meaning": "단골 고객", "example": "We generously offer totally free gifts to our most dedicated loyal customers.", "translation": "우리는 가장 헌신적인 단골 고객들에게 관대하게 완전 무료 선물을 제공합니다."}, {"word": "outside provider", "meaning": "외부 공급자", "example": "We wisely hired a reliable outside provider for the massive catering services.", "translation": "우리는 대규모 케이터링 서비스를 위해 믿을 수 있는 외부 공급자를 현명하게 고용했습니다."}, {"word": "poll", "meaning": "여론 조사", "example": "A recent comprehensive poll clearly incredibly showed overwhelming immense support for the bright new policy.", "translation": "최근의 종합적인 여론 조사는 밝은 새 정책에 대한 압도적이고 엄청난 지지를 믿을 수 없을 정도로 분명하게 보여주었습니다."}, {"word": "possession", "meaning": "소유물, 소유", "example": "He lost all his valuable personal possessions tragically in the raging terrible fire.", "translation": "그는 맹렬한 끔찍한 화재로 소중한 개인 소유물들을 모두 비극적으로 잃었습니다."}, {"word": "scarce", "meaning": "부족한", "example": "Clean, drinkable fresh water is dangerously scarce in this deeply remote arid region.", "translation": "이 깊고 외딴 건조한 지역에서는 깨끗하고 마실 수 있는 신선한 물이 위험할 정도로 부족합니다."}, {"word": "status", "meaning": "지위", "example": "The beloved famous celebrity enjoys a highly privileged special social status.", "translation": "그 사랑받는 유명한 연예인은 매우 특권적인 특별한 사회적 지위를 누립니다."}, {"word": "switch A to B", "meaning": "A를 B로 바꾸다", "example": "You can easily efficiently switch A to B with literally just one quick click.", "translation": "말 그대로 단 한 번의 빠른 클릭으로 A를 B로 쉽고 효율적으로 e to our mailing list.", "translation": "저희 우편물 수취인 명부에 이름을 추가해 주세요."}, {"word": "make a delivery", "meaning": "배달하다", "example": "The driver will make a delivery this afternoon.", "translation": "기사가 오늘 오후에 배달을 할 것입니다."}, {"word": "packing tape", "meaning": "포장 테이프", "example": "I used packing tape to seal the heavy boxes.", "translation": "나는 무거운 상자들을 밀봉하기 위해 포장 테이프를 사용했습니다."}, {"word": "pass over", "meaning": "~의 위를 지나가다", "example": "Planes often pass over this residential area.", "translation": "비행기들이 종종 이 주거 지역 위를 지나갑니다."}, {"word": "pavement", "meaning": "포장 도로, 인도", "example": "Don't ride your bicycle on the pavement.", "translation": "인도에서 자전거를 타지 마세요."}, {"word": "people on foot", "meaning": "보행자들", "example": "The bridge is only for people on foot.", "translation": "그 다리는 보행자들만을 위한 것입니다."}, {"word": "pick up passengers", "meaning": "승객을 태우다", "example": "Buses stop here to pick up passengers.", "translation": "버스들이 승객을 태우기 위해 여기서 멈춥니다."}, {"word": "pier", "meaning": "부두, 방파제", "example": "We walked along the pier to see the boats.", "translation": "우리는 배들을 보기 위해 부두를 따라 걸었습니다."}, {"word": "pile up", "meaning": "~을 쌓다", "example": "Dirty dishes began to pile up in the sink.", "translation": "싱크대에 더러운 접시들이 쌓이기 시작했습니다."}, {"word": "postal", "meaning": "우편의", "example": "The postal service is slower during holidays.", "translation": "연휴 기간에는 우편 서비스가 더 느려집니다."}, {"word": "strap", "meaning": "끈(줄)으로 묶다; 끈, 띠", "example": "Make sure to strap your luggage securely.", "translation": "짐을 끈으로 단단히 묶으세요."}, {"word": "time limit", "meaning": "기한", "example": "There is a 30-minute time limit for the test.", "translation": "시험에는 30분의 시간 제한(기한)이 있습니다."}, {"word": "waterway", "meaning": "(배가 다닐 수 있는) 수로", "example": "The country is known for its extensive waterway.", "translation": "그 나라는 광범위한 수로로 알려져 있습니다."}, {"word": "weigh", "meaning": "무게가 ~이다", "example": "This package weighs more than I expected.", "translation": "이 소포는 생각보다 무게가 더 나갑니다."}, {"word": "weight limit", "me o the ceramic teapot.", "translation": "그는 세라믹 찻주전자에 뜨거운 물을 부었습니다."}, {"word": "trial", "meaning": "재판, 공판", "example": "The trial for the new drug will last six months.", "translation": "신약에 대한 시험(재판)은 6개월 동안 지속될 것입니다."}, {"word": "unpack", "meaning": "(짐을) 풀다", "example": "I need to unpack my suitcase after the trip.", "translation": "여행 후에 여행 가방의 짐을 풀어야 합니다."}, {"word": "valuables", "meaning": "귀중품", "example": "Please keep your valuables in the hotel safe.", "translation": "귀중품은 호텔 금고에 보관하십시오."}, {"word": "wait for a table", "meaning": "테이블에 자리가 나기를 기다리다", "example": "Customers had to wait for a table for an hour.", "translation": "고객들은 자리가 나기를 한 시간 동안 기다려야 했습니다. (원형 유지)"}, {"word": "agreeably", "meaning": "쾌적하게, 기분 좋게", "example": "The room was agreeably warm during the winter.", "translation": "겨울 동안 방은 기분 좋게 따뜻했습니다."}, {"word": "amazed", "meaning": "놀란", "example": "I was amazed by the quality of the service.", "translation": "나는 서비스의 품질에 놀랐습니다."}, {"word": "competitiveness", "meaning": "경쟁력", "example": "Innovation is key to improving our competitiveness.", "translation": "혁신은 우리의 경쟁력을 향상시키는 핵심입니다."}, {"word": "explain to", "meaning": "~에게 설명하다", "example": "I will explain to you how to use the device.", "translation": "기기 사용법을 당신에게 설명해 드릴게요. (원형 유지)"}, {"word": "organizer", "meaning": "조직자, 창시자", "example": "The organizer announced the schedule changes.", "translation": "주최자(조직자)가 일정 변경을 발표했습니다."}, {"word": "progressively", "meaning": "계속해서", "example": "The company has become progressively larger.", "translation": "그 회사는 계속해서 더 커졌습니다."}, {"word": "recognized", "meaning": "인정된, 알려진", "example": "He is a widely recognized expert in the field.", "translation": "그는 그 분야에서 널리 인정받는 전문가입니다."}, {"word": "refer", "meaning": "참조하게 하다, 조회하다", "example": "Please refer to the manual for more details.", "translation": "자세한 내용은 설명서를 참조하십시오."}, {"word": "seemingly", "meaning": "외견상으로, 겉보기에는", "example": "It was a seemingly impossible task at first.", "translation": "그것은 처 ation": "이 시장에서 돈을 버는 것은 쉽지 않습니다."}, {"word": "meet one's goal", "meaning": "목표를 달성하다", "example": "He worked hard to meet one's goal of becoming a doctor.", "translation": "그는 의사가 되겠다는 목표를 달성하기 위해 열심히 일했습니다. (원형 유지)"}, {"word": "misread", "meaning": "잘못 읽다, 오해하다", "example": "I misread the map and took the wrong turn.", "translation": "나는 지도를 잘못 읽어서 길을 잘못 들었습니다."}, {"word": "sales report", "meaning": "매출 보고서", "example": "The manager is reviewing the monthly sales report.", "translation": "매니저가 월간 매출 보고서를 검토하고 있습니다."}, {"word": "situated", "meaning": "위치해 있는", "example": "The hotel is situated near the beautiful beach.", "translation": "그 호텔은 아름다운 해변 근처에 위치해 있습니다."}, {"word": "slight chance", "meaning": "희박한 가능성", "example": "There is a slight chance of rain this afternoon.", "translation": "오늘 오후에 비가 올 희박한 가능성이 있습니다."}, {"word": "take a course", "meaning": "강의를 듣다", "example": "I decided to take a course in graphic design.", "translation": "나는 그래픽 디자인 강의를 듣기로 결정했습니다."}, {"word": "to be honest with you", "meaning": "솔직히 말하자면", "example": "To be honest with you, I didn't like the movie.", "translation": "솔직히 말하자면, 나는 그 영화가 별로였어. (원형 유지)"}, {"word": "allot", "meaning": "할당하다", "example": "The committee will allot funds to each project.", "translation": "위원회는 각 프로젝트에 자금을 할당할 것입니다."}, {"word": "allotment", "meaning": "할당, 분배", "example": "The allotment of resources was done fairly.", "translation": "자원의 할당은 공정하게 이루어졌습니다."}, {"word": "charity", "meaning": "자선 단체", "example": "We donated some money to a local charity.", "translation": "우리는 지역 자선 단체에 약간의 돈을 기부했습니다."}, {"word": "continued", "meaning": "지속적인", "example": "Your continued support is very important to us.", "translation": "당신의 지속적인 지원은 우리에게 매우 중요합니다."}, {"word": "desperate", "meaning": "필사적인, 절망적인", "example": "The company made a desperate attempt to stay afloat.", "translation": "그 회사는 살아남기 위해 필사적인 시도를 했습니다."}, {"word": "doubtful", "meaning": "확신이 없는, 의심스러운", "example": "It is doubtful whether the new project  to be highly profitable.", "translation": "새로운 제품 라인은 매우 수익성이 높은 것으로 드러났습니다."}, {"word": "put A in jeopardy", "meaning": "A를 위험에 빠뜨리다", "example": "A lack of funding could put A in jeopardy.", "translation": "자금 부족은 A를 위험에 빠뜨릴 수 있습니다. (원형 유지)"}, {"word": "quite", "meaning": "꽤, 상당히", "example": "The results of the experiment were quite surprising.", "translation": "실험 결과는 꽤 놀라웠습니다."}, {"word": "sales figure", "meaning": "매출액", "example": "We are reviewing the sales figures for last quarter.", "translation": "우리는 지난 분기의 매출액을 검토하고 있습니다."}, {"word": "seek to do", "meaning": "~하려고 애쓰다", "example": "The government seek to do more for the environment.", "translation": "정부는 환경을 위해 더 많은 것을 하려고 애씁니다. (원형 유지)"}, {"word": "split", "meaning": "쪼개다, 분리시키다", "example": "The board decided to split the company into two.", "translation": "이사회는 회사를 둘로 나누기로 결정했습니다."}, {"word": "submission", "meaning": "제출", "example": "The deadline for the submission of reports is Friday.", "translation": "보고서 제출 마감일은 금요일입니다."}, {"word": "sufficient", "meaning": "충분한", "example": "We have sufficient evidence to support our claim.", "translation": "우리는 주장을 뒷받침할 충분한 증거를 가지고 있습니다."}, {"word": "surrounding", "meaning": "주위의, 주변의", "example": "The hotel is located in a beautiful surrounding area.", "translation": "그 호텔은 아름다운 주변 지역에 위치해 있습니다."}, {"word": "to that end", "meaning": "그 목적을 위해", "example": "We want to improve; to that end, we hired a consultant.", "translation": "우리는 개선을 원하며, 그 목적을 위해 컨설턴트를 고용했습니다."}, {"word": "transition", "meaning": "변화, 이행", "example": "The transition to the new system was very smooth.", "translation": "새로운 시스템으로의 전환은 매우 순조로웠습니다."}, {"word": "unusually", "meaning": "유난히, 비정상적으로", "example": "The weather has been unusually cold this week.", "translation": "이번 주는 날씨가 유난히 추웠습니다."}, {"word": "added benefits", "meaning": "부가적인 이점", "example": "The job comes with many added benefits like insurance.", "translation": "그 직업은 보험과 같은 많은 부가적인 이점이 따릅니다."}, {"word": "additional fee", "meaning": "추가 비용", "example": "There is an additional fee for late cancellations.", "translation": "늦은 취소에 대해서는 추가 비용이 발생합니다."}, {"word": "at a rapid rate", "meaning": "빠른 속도로", "example": "The industry is currently growing at a rapid rate.", "translation": "그 산업은 현재 빠른 속도로 성장하고 있습니다."}, {"word": "commercial value", "meaning": "상업적 가치", "example": "The land has high commercial value for developers.", "translation": "그 토지는 개발업자들에게 높은 상업적 가치가 있습니다."}, {"word": "dean", "meaning": "학장", "example": "I need to speak with the dean of the college.", "translation": "나는 대학 학장과 이야기해야 합니다."}, {"word": "disappointing", "meaning": "실망스러운", "example": "The sales results were very disappointing this year.", "translation": "올해 매출 결과는 매우 실망스러웠습니다."}, {"word": "do damage", "meaning": "손상하다, 손해를 입히다", "example": "The heavy storm did damage to the building's roof.", "translation": "심한 폭풍이 건물의 지붕을 손상시켰습니다."}, {"word": "engineering", "meaning": "공학", "example": "He graduated with a degree in electrical engineering.", "translation": "그는 전기 공학 학위로 졸업했습니다."}, {"word": "file for bankruptcy", "meaning": "파산 신청을 하다", "example": "The firm had to file for bankruptcy last month.", "translation": "그 회사는 지난달에 파산 신청을 해야 했습니다."}, {"word": "growth potential", "meaning": "성장 잠재력", "example": "Investors see great growth potential in this startup.", "translation": "투자자들은 이 스타트업에서 큰 성장 잠재력을 봅니다."}, {"word": "highlight", "meaning": "가장 중요한 부분; 강조하다", "example": "The CEO's speech was the highlight of the event.", "translation": "CEO의 연설이 행사의 하이라이트(가장 중요한 부분)였습니다."}, {"word": "long-term stability", "meaning": "장기 안정(성)", "example": "Our main goal is to achieve long-term stability.", "translation": "우리의 주된 목표는 장기적인 안정을 달성하는 것입니다."}, {"word": "non-profit organization", "meaning": "비영리 조직", "example": "She works for a local non-profit organization.", "translation": "그녀는 지역 비영리 조직에서 일합니다."}, {"word": "on the rise", "meaning": "상승하는", "example": "The cost of living is currently on the rise.", "translation": "물가가 현재 sition", "meaning": "~의 위치를 바꾸다", "example": "We need to reposition the cameras for a better view.", "translation": "더 나은 시야를 위해 카메라들의 위치를 바꿔야 합니다."}, {"word": "retiree", "meaning": "퇴직자", "example": "The company hosts an annual dinner for retirees.", "translation": "회사는 매년 퇴직자들을 위한 저녁 식사를 주최합니다."}, {"word": "retirement", "meaning": "은퇴, 퇴직", "example": "He is planning for his retirement next year.", "translation": "그는 내년에 자신의 은퇴를 계획하고 있습니다."}, {"word": "senior executive", "meaning": "고위 간부", "example": "The senior executive approved the new strategy.", "translation": "고위 간부가 새로운 전략을 승인했습니다."}, {"word": "spare key", "meaning": "여분의 열쇠", "example": "I always keep a spare key in my wallet.", "translation": "나는 항상 지갑에 여분의 열쇠를 보관합니다."}, {"word": "take early retirement", "meaning": "조기 퇴직하다", "example": "Several workers decided to take early retirement.", "translation": "몇몇 노동자들이 조기 퇴직을 하기로 결정했습니다."}, {"word": "take note", "meaning": "주목하다", "example": "Please take note of the changes in the schedule.", "translation": "일정 변경 사항에 주목해 주십시오."}, {"word": "take one's place", "meaning": "~의 자리를 차지하다", "example": "A new player will take one's place on the team.", "translation": "새로운 선수가 팀에서 누군가의 자리를 차지할 것입니다. (원형 유지)"}, {"word": "take over", "meaning": "인수하다", "example": "The larger corporation decided to take over the firm.", "translation": "그 대기업은 그 회사를 인수하기로 결정했습니다."}, {"word": "achiever", "meaning": "크게 성공한 사람", "example": "He is a high achiever who always hits his targets.", "translation": "그는 항상 목표를 달성하는 크게 성공한 사람입니다."}, {"word": "admired", "meaning": "존경받는", "example": "She is a highly admired professor at the college.", "translation": "그녀는 그 대학에서 매우 존경받는 교수입니다."}, {"word": "as a result of", "meaning": "~의 결과로서", "example": "The project was cancelled as a result of funding cuts.", "translation": "자금 삭감의 결과로서 프로젝트가 취소되었습니다."}, {"word": "elect", "meaning": "선출하다", "example": "The members will elect a new president tomorrow.", "translation": "회원들은 내일 새로운 회장을 선출할 것입니다."}, {"word": "incompetent", "meaning": "무능한", "example": "The manager was fired for being incompetent.", "translation": "매니저는 무능하다는 이유로 해고되었습니다."}, {"word": "knowledgeable", "meaning": "아는 것이 많은", "example": "Our guide was very knowledgeable about the city.", "translation": "우리 가이드는 그 도시에 대해 아는 것이 매우 많았습니다."}, {"word": "namely", "meaning": "즉, 다시 말해", "example": "We have one problem, namely a lack of time.", "translation": "우리에게는 한 가지 문제, 즉 시간 부족이 있습니다."}, {"word": "nearby", "meaning": "인근의", "example": "There is a quiet park nearby the office.", "translation": "사무실 인근에 조용한 공원이 있습니다."}, {"word": "nominate", "meaning": "지명하다, 추천하다", "example": "We should nominate him for the employee of the month.", "translation": "우리는 그를 이달의 직원으로 추천해야 합니다."}, {"word": "promotion", "meaning": "승진", "example": "Hard work is the best way to get a promotion.", "translation": "열심히 일하는 것이 승진하는 가장 좋은 방법입니다."}, {"word": "put in for", "meaning": "~을 신청하다", "example": "I decided to put in for a transfer to the London office.", "translation": "나는 런던 사무소로의 전근을 신청하기로 결정했습니다."}, {"word": "recommendable", "meaning": "추천할 수 있는", "example": "This software is highly recommendable for beginners.", "translation": "이 소프트웨어는 초보자들에게 매우 추천할 만합니다."}, {"word": "specially", "meaning": "특별히", "example": "This room was specially designed for music recording.", "translation": "이 방은 음악 녹음을 위해 특별히 설계되었습니다."}, {"word": "stand in for", "meaning": "~의 대리를 맡다, ~를 대신하다", "example": "Can you stand in for me while I am away?", "translation": "내가 자리를 비운 동안 내 대리를 맡아 줄 수 있나요?"}, {"word": "state", "meaning": "상태; 진술하다", "example": "Please state your name and occupation clearly.", "translation": "성함과 직업을 분명하게 진술해 주세요."}, {"word": "tech-savvy", "meaning": "최신 기술을 잘 아는", "example": "We need a tech-savvy assistant for the project.", "translation": "우리는 프로젝트를 위해 최신 기술을 잘 아는 조수가 필요합니다."}, {"word": "undoubtedly", "meaning": "의심할 여지 없이, 틀림없이", "example": "This is undoubtedly the best coffee in town.", "translation": "이것은 틀림없이 동네에서 최고의 커피입 e your official title on the business card.", "translation": "명함에 당신의 공식 직함을 포함해 주세요."}, {"word": "on the recommendation of", "meaning": "~의 추천으로", "example": "I applied for the job on the recommendation of my professor.", "translation": "나는 내 교수님의 추천으로 그 일자리에 지원했습니다."}, {"word": "pass up", "meaning": "(기회 등을) 거절하다, 포기하다", "example": "Do not pass up the chance to learn a new language.", "translation": "새로운 언어를 배울 기회를 포기하지 마세요."}, {"word": "preach", "meaning": "설교하다, 충고하다", "example": "He began to preach about the benefits of early morning exercise.", "translation": "그는 아침 일찍 운동하는 것의 이점에 대해 설교(충고)하기 시작했습니다."}, {"word": "predecessor", "meaning": "전임자", "example": "The new manager is much more efficient than his predecessor.", "translation": "새로운 매니저는 그의 전임자보다 훨씬 효율적입니다."}, {"word": "provincial", "meaning": "지방의", "example": "She works for a small provincial newspaper in her hometown.", "translation": "그녀는 고향에 있는 작은 지방 신문사에서 일합니다."}, {"word": "push back", "meaning": "연기하다", "example": "They decided to push back the meeting until next week.", "translation": "그들은 회의를 다음 주까지 연기하기로 결정했습니다."}, {"word": "ritual", "meaning": "(정규) 행사, 반드시 지키는 일", "example": "The Friday lunch meeting has become a weekly ritual for us.", "translation": "금요일 점심 회의는 우리에게 매주 반드시 지키는 일(행사)이 되었습니다."}, {"word": "run for", "meaning": "~에 입후보하다", "example": "He decided to run for the position of city council member.", "translation": "그는 시의회 의원 직에 입후보하기로 결정했습니다."}, {"word": "speck", "meaning": "작은 얼룩", "example": "There was a tiny speck of dust on the computer screen.", "translation": "컴퓨터 화면에 아주 작은 먼지 얼룩이 있었습니다."}, {"word": "supervisory", "meaning": "감독의, 관리의", "example": "He was promoted to a supervisory role last month.", "translation": "그는 지난달에 관리(감독)직으로 승진했습니다."}, {"word": "turn away", "meaning": "내쫓다", "example": "The stadium had to turn away thousands of disappointed fans.", "translation": "경기장은 실망한 수천 명의 팬을 내쫓아야(돌려보내야) 했습니다."}, {"word": "underestimate", "meaning": "과소평가하다", "example": "You should not underestimate the cost of the new project.", "translation": "새로운 프로젝트의 비용을 과소평가해서는 안 됩니다."}, {"word": "understaffed", "meaning": "인원 부족의", "example": "The restaurant was very slow today because it was understaffed.", "translation": "그 식당은 오늘 인원 부족 때문에 매우 느렸습니다."}, {"word": "across the street", "meaning": "길을 가로질러", "example": "The post office is located just across the street from the bank.", "translation": "우체국은 은행에서 길을 가로질러 바로 맞은편에 위치해 있습니다."}, {"word": "around the corner", "meaning": "길모퉁이에, 임박한", "example": "There is a convenient grocery store just around the corner.", "translation": "길모퉁이 바로 근처에 편리한 식료품점이 있습니다."}, {"word": "be closed to traffic", "meaning": "왕래를 금하다", "example": "The bridge be closed to traffic due to heavy construction.", "translation": "그 다리는 대규모 공사로 인해 왕래가 금지되었습니다. (원형 유지)"}, {"word": "be held up in traffic", "meaning": "교통 체증에 걸리다", "example": "I be held up in traffic during the morning rush.", "translation": "나는 아침 출근길에 교통 체증에 걸렸습니다. (원형 유지)"}, {"word": "be lined with", "meaning": "줄지어 있다", "example": "The park pathway be lined with colorful spring flowers.", "translation": "공원 통로에 다채로운 봄꽃들이 줄지어 있습니다. (원형 유지)"}, {"word": "broadcast", "meaning": "방송하다; 방송", "example": "The local station will broadcast the game live tonight.", "translation": "지역 방송국에서 오늘 밤 경기를 생중계로 방송할 것입니다."}, {"word": "bypass", "meaning": "우회로", "example": "They built a new bypass to reduce traffic in the city center.", "translation": "그들은 도심의 교통량을 줄이기 위해 새로운 우회로를 만들었습니다."}, {"word": "carpool", "meaning": "승용차 함께 타기를 하다", "example": "Employees are encouraged to carpool to save fuel costs.", "translation": "직원들은 연료비를 아끼기 위해 승용차 함께 타기를 하도록 권장받습니다."}, {"word": "come to a standstill", "meaning": "멈추다, 정지하다", "example": "Traffic came to a standstill because of the heavy snow.", "translation": "폭설 때문에 교통이 정체되었습니다(멈췄습니다)."}, {"word": "commuter", "meaning": "통근자", "example": "Most commuters in this city prefer taking the subway.", "translation": "이 도시의 대부분의 통근자는 지하철 타는 것을 선호합니다."}, {"word": "cross the street", "meaning": "길을 건너다", "example": "Always check for cars before you cross the street.", "translation": "길을 건너기 전에 항상 차가 오는지 확인하세요."}, {"word": "direct traffic", "meaning": "교통정리를 하다", "example": "A police officer was sent to direct traffic near the school.", "translation": "학교 근처에서 교통정리를 하기 위해 경찰관 한 명이 파견되었습니다."}, {"word": "driver's license", "meaning": "운전 면허증", "example": "I finally received my driver's license after the test.", "translation": "나는 시험 후에 마침내 운전 면허증을 받았습니다."}, {"word": "driveway", "meaning": "차도, 진입로", "example": "You can park your car in my driveway during your stay.", "translation": "머무시는 동안 제 집 진입로(차도)에 차를 주차하셔도 됩니다."}, {"word": "driving direction", "meaning": "주행 방향", "example": "The app provided a clear driving direction to the hotel.", "translation": "앱에서 호텔까지의 명확한 주행 방향을 제공했습니다."}, {"word": "footrest", "meaning": "발받침", "example": "This armchair has a very comfortable footrest for relaxing.", "translation": "이 안락의자는 휴식을 위한 매우 편안한 발받침을 갖추고 있습니다."}, {"word": "get a ride", "meaning": "차를 얻어 타다", "example": "I managed to get a ride to the airport from my brother.", "translation": "나는 형의 차를 얻어 타고 공항에 갈 수 있었습니다."}, {"word": "get lost", "meaning": "길을 잃다", "example": "If you don't use a map, you might get lost in the forest.", "translation": "지도를 사용하지 않으면 숲에서 길을 잃을지도 모릅니다."}, {"word": "get to", "meaning": "~에 도착하다", "example": "How long does it take to get to the station on foot?", "translation": "역에 걸어서 도착하는 데 얼마나 걸리나요?"}, {"word": "give A a ride", "meaning": "A를 태워 주다", "example": "He offered to give A a ride to the train station.", "translation": "그는 기차역까지 A를 태워 주겠다고 제안했습니다. (원형 유지)"}, {"word": "have a flat tire", "meaning": "타이어에 바람이 빠지다", "example": "I had a flat tire on my way to the meeting.", "translation": "나는 회의에 가는 길에 타이어에 바람이 빠졌습니다(펑크가 났습니다)."}, {"word": "headlight", "meaning": "전조등", "example": "One of the headlights on my car is not working properly.", "translation": "내 차의 전조등 중 하나가 제대로 작동하지 않습니다."}, The narrow pathway leads directly to the garden.", "translation": "좁은 통로가 정원으로 바로 이어집니다."}, {"word": "push one's way through", "meaning": "~을 뚫고 지나가다", "example": "He had to push one's way through the crowded room.", "translation": "그는 붐비는 방을 뚫고 지나가야 했습니다."}, {"word": "ride away", "meaning": "타고 가다", "example": "I watched the cyclist ride away into the distance.", "translation": "나는 자전거 타는 사람이 멀리 타고 가는 것을 보았습니다."}, {"word": "road sign", "meaning": "도로 표지", "example": "Please pay attention to every road sign on this highway.", "translation": "이 고속도로의 모든 도로 표지에 주의를 기울이십시오."}, {"word": "roadwork", "meaning": "도로 공사", "example": "The heavy roadwork caused a massive delay this morning.", "translation": "심한 도로 공사가 오늘 아침 대규모 지연을 야기했습니다."}, {"word": "shortcut", "meaning": "지름길", "example": "I know a quick shortcut to the city library.", "translation": "나는 시립 도서관으로 가는 빠른 지름길을 알고 있습니다."}, {"word": "stop at a light", "meaning": "신호등에서 정지하다", "example": "Drivers must always stop at a light when it is red.", "translation": "운전자들은 빨간불일 때 항상 신호등에서 정지해야 합니다."}, {"word": "stop for fuel", "meaning": "주유소에 들르다", "example": "We should stop for fuel before entering the desert.", "translation": "사막에 들어가기 전에 주유소에 들러야 합니다."}, {"word": "storage compartment", "meaning": "짐 싣는 곳", "example": "Put your luggage in the storage compartment above.", "translation": "당신의 짐을 위쪽 짐 싣는 곳에 두십시오."}, {"word": "street sign", "meaning": "도로 표지판", "example": "The damaged street sign was replaced yesterday.", "translation": "손상된 도로 표지판이 어제 교체되었습니다."}, {"word": "toll price", "meaning": "통행료", "example": "The toll price for this bridge has increased recently.", "translation": "이 다리의 통행료가 최근에 인상되었습니다."}, {"word": "traffic jam", "meaning": "교통 정체", "example": "I was stuck in a terrible traffic jam for an hour.", "translation": "나는 한 시간 동안 끔찍한 교통 정체에 갇혀 있었습니다."}, {"word": "walk through", "meaning": "~을 통과해 걷다", "example": "Let's walk through the park to get some fresh air.", "translation": "신선한 공기를 마시기 위해 공원을 통과해 걸 s collided on the slippery road today.", "translation": "오늘 미끄러운 도로에서 트럭 두 대가 충돌했습니다."}, {"word": "congested", "meaning": "(사람·교통이) 붐비는, 혼잡한", "example": "The city streets are always congested during rush hour.", "translation": "도심 거리는 출퇴근 시간에 항상 붐빕니다(혼잡합니다)."}, {"word": "encounter", "meaning": "(우연히) 만나다, (문제에) 부닥치다", "example": "We might encounter some difficulties during the trial.", "translation": "우리는 시도 중에 몇 가지 어려움에 부닥칠지도 모릅니다."}, {"word": "move forward", "meaning": "앞으로 나아가다", "example": "We are ready to move forward with the next phase.", "translation": "우리는 다음 단계로 앞으로 나아갈 준비가 되었습니다."}, {"word": "principal", "meaning": "주요한, 주된; 장, 교장", "example": "The principal reason for the delay was the bad weather.", "translation": "지연의 주요한 이유는 악천후였습니다."}, {"word": "public transportation", "meaning": "대중교통", "example": "Using public transportation is better for the environment.", "translation": "대중교통을 이용하는 것은 환경에 더 좋습니다."}, {"word": "standing room", "meaning": "입석", "example": "There was only standing room left on the crowded bus.", "translation": "붐비는 버스에는 입석(서서 가는 자리)만 남아 있었습니다."}, {"word": "steering wheel", "meaning": "핸들", "example": "Please keep both hands on the steering wheel while driving.", "translation": "운전하는 동안 양손을 핸들 위에 두십시오."}, {"word": "traffic congestion", "meaning": "교통 체증", "example": "The government is trying to reduce traffic congestion.", "translation": "정부는 교통 체증을 줄이기 위해 노력하고 있습니다."}, {"word": "alternate", "meaning": "대신인, 교대의, 상호 간의", "example": "We work on alternate Saturdays to cover the office.", "translation": "우리는 사무실을 지키기 위해 격주 토요일마다 교대로 근무합니다."}, {"word": "awfully", "meaning": "대단히, 정말", "example": "I am awfully sorry for the late response.", "translation": "답변이 늦어서 대단히 죄송합니다."}, {"word": "bank loan", "meaning": "은행 대출금", "example": "He applied for a bank loan to start his business.", "translation": "그는 사업을 시작하기 위해 은행 대출을 신청했습니다."}, {"word": "bank teller", "meaning": "은행 출납원", "example": "The bank teller helped me deposit the check.", "tran ming increase in costs.", "translation": "비용이 걱정스러울 정도로 증가했습니다."}, {"word": "anymore", "meaning": "이제는, 더 이상은", "example": "I don't work for that company anymore.", "translation": "나는 이제 더 이상 그 회사에서 일하지 않습니다."}, {"word": "at a time", "meaning": "한 번에, 동시에", "example": "Please enter the room one person at a time.", "translation": "한 번에 한 사람씩 방에 입장해 주세요."}, {"word": "indeed", "meaning": "실로, 정말", "example": "The task was indeed more difficult than expected.", "translation": "그 업무는 실로 예상보다 더 어려웠습니다."}, {"word": "otherwise", "meaning": "다르게, 달리; 만약 그렇지 않으면", "example": "You must hurry; otherwise, you will miss the train.", "translation": "서둘러야 합니다. 그렇지 않으면 기차를 놓칠 것입니다."}, {"word": "owing to", "meaning": "~로 인하여", "example": "The game was cancelled owing to heavy rain.", "translation": "폭우로 인하여 경기가 취소되었습니다."}, {"word": "partial", "meaning": "부분적인, 편파적인", "example": "The project was only a partial success.", "translation": "그 프로젝트는 부분적인 성공에 불과했습니다."}, {"word": "pay out", "meaning": "지불하다, 치르다", "example": "The insurance company will pay out the claim soon.", "translation": "보험사가 곧 보험금을 지불할 것입니다."}, {"word": "receptive", "meaning": "수용적인", "example": "The manager was very receptive to my new ideas.", "translation": "매니저는 내 새로운 아이디어에 매우 수용적이었습니다."}, {"word": "simplify", "meaning": "간소화하다", "example": "We need to simplify the registration process.", "translation": "우리는 등록 과정을 간소화해야 합니다."}, {"word": "someday", "meaning": "언젠가, 머지않아", "example": "I hope to travel around the world someday.", "translation": "나는 언젠가 세계 일주를 하기를 희망합니다."}, {"word": "turn down", "meaning": "거절하다", "example": "They had to turn down the invitation to the party.", "translation": "그들은 파티 초대를 거절해야 했습니다."}, {"word": "twofold", "meaning": "두 배로, 이중으로", "example": "The value of the house has increased twofold.", "translation": "그 집의 가치가 두 배로 증가했습니다."}, {"word": "account payable", "meaning": "지급 계정", "example": "Please check the account payable for this month.", "translation": "이번 달 지급 계정을 확인해 주세요."}, {"word" lation": "서류들을 구석에 있는 수납장에 보관하세요."}, {"word": "switch on", "meaning": "~의 스위치를 켜다", "example": "Could you switch on the lights in this room?", "translation": "이 방의 불을 좀 켜 주시겠어요?"}, {"word": "turn on its side", "meaning": "뒤집다, 옆으로 돌리다", "example": "You should turn on its side the heavy box to move it.", "translation": "그 무거운 상자를 옮기려면 옆으로 돌려야 합니다."}, {"word": "undergo renovation", "meaning": "개조(보수) 중이다", "example": "The hotel will undergo renovation next month.", "translation": "그 호텔은 다음 달에 보수 공사를 할 예정입니다."}, {"word": "windowsill", "meaning": "창턱", "example": "I placed a small plant on the windowsill.", "translation": "나는 창턱 위에 작은 식물을 놓았습니다."}, {"word": "construct", "meaning": "건설하다", "example": "The company plans to construct a new factory.", "translation": "그 회사는 새 공장을 건설할 계획입니다."}, {"word": "describe", "meaning": "말로 설명하다, 묘사하다", "example": "Can you describe the person you saw earlier?", "translation": "아까 본 사람을 설명해 주실 수 있나요?"}, {"word": "desirable", "meaning": "바람직한, 이상적인", "example": "Experience in sales is highly desirable for this job.", "translation": "영업 경력이 있는 것이 이 직무에 매우 바람직합니다."}, {"word": "structure", "meaning": "구조물", "example": "The ancient structure is still in good condition.", "translation": "그 고대 구조물은 여전히 상태가 좋습니다."}, {"word": "access road", "meaning": "진입로", "example": "The access road to the building is very narrow.", "translation": "건물의 진입로가 매우 좁습니다."}, {"word": "arrange the furniture", "meaning": "가구를 배치하다", "example": "We need to arrange the furniture in the lobby.", "translation": "우리는 로비의 가구를 배치해야 합니다."}, {"word": "be arranged on the patio", "meaning": "테라스에 정돈되어 있다", "example": "The tables be arranged on the patio for the guests.", "translation": "테이블들이 손님들을 위해 테라스에 정돈되어 있습니다. (원형 유지)"}, {"word": "built-in", "meaning": "붙박이의", "example": "The apartment comes with built-in wardrobes.", "translation": "그 아파트에는 붙박이 옷장이 딸려 있습니다."}, {"word": "carpentry", "meaning": "목수일", "example": "He learned carpentry from his grandfather.", "translation": " aning": "문지르기", "example": "The floor needs a good scrubbing to get clean.", "translation": "바닥을 깨끗하게 하려면 잘 문질러 닦아야 합니다."}, {"word": "skyscraper", "meaning": "고층 빌딩", "example": "New York is famous for its many skyscrapers.", "translation": "뉴욕은 많은 고층 빌딩으로 유명합니다."}, {"word": "space-saving", "meaning": "공간 절약의", "example": "This space-saving bed is perfect for small rooms.", "translation": "이 공간 절약형 침대는 작은 방에 완벽합니다."}, {"word": "tenant", "meaning": "(가옥 등의) 임차인", "example": "The tenant moved out at the end of the month.", "translation": "임차인은 월말에 이사를 나갔습니다."}, {"word": "along the shore", "meaning": "해변을 따라", "example": "We enjoyed a peaceful walk along the shore.", "translation": "우리는 해변을 따라 평화로운 산책을 즐겼습니다."}, {"word": "bay", "meaning": "(바다·호수의) 만", "example": "The boat entered the quiet bay at sunset.", "translation": "보트가 일몰 때 조용한 만으로 들어왔습니다."}, {"word": "body of water", "meaning": "물줄기", "example": "The Amazon River is a massive body of water.", "translation": "아마존강은 거대한 물줄기(수역)입니다."}, {"word": "bush", "meaning": "관목", "example": "He hid behind a large bush in the garden.", "translation": "그는 정원에 있는 큰 관목 뒤에 숨었습니다."}, {"word": "cliff", "meaning": "절벽", "example": "Be careful not to go too close to the cliff.", "translation": "절벽에 너무 가까이 가지 않도록 조심하세요."}, {"word": "countryside", "meaning": "시골, 지방", "example": "I prefer living in the countryside than in the city.", "translation": "나는 도시보다 시골에 사는 것을 더 좋아합니다."}, {"word": "eco-friendly", "meaning": "환경친화적인", "example": "The company switched to eco-friendly packaging.", "translation": "그 회사는 환경친화적인 포장재로 바꿨습니다."}, {"word": "footpath", "meaning": "보도, 오솔길", "example": "The narrow footpath leads to the hidden waterfall.", "translation": "좁은 오솔길이 숨겨진 폭포로 이어집니다."}, {"word": "fountain", "meaning": "분수", "example": "Children like to play near the fountain in the park.", "translation": "아이들은 공원에 있는 분수 근처에서 노는 것을 좋아합니다."}, {"word": "freezing", "meaning": "몹시 추운", "example": "It is freezing outside, so wear a warm coat.", "translation": "밖이 몹시 추우니 따뜻한 코트를 입으세요."}, {"word": "gardening tool", "meaning": "원예 도구", "example": "She keeps all her gardening tools in the shed.", "translation": "그녀는 모든 원예 도구를 창고에 보관합니다."}, {"word": "grasp", "meaning": "꽉 잡다, 움켜잡다", "example": "You must grasp the handle firmly for safety.", "translation": "안전을 위해 손잡이를 꽉 잡아야 합니다."}, {"word": "hail", "meaning": "우박", "example": "The cars were damaged by the heavy hail today.", "translation": "오늘 심한 우박으로 차들이 파손되었습니다."}, {"word": "lakefront", "meaning": "호숫가", "example": "We stayed at a beautiful lakefront cabin.", "translation": "우리는 아름다운 호숫가 통나무집에서 묵었습니다."}, {"word": "landscaping", "meaning": "조경", "example": "The hotel spent a lot on its landscaping this year.", "translation": "호텔은 올해 조경에 많은 돈을 썼습니다."}, {"word": "lighthouse", "meaning": "등대", "example": "The lighthouse guides ships safely to the harbor.", "translation": "등대가 배들을 항구로 안전하게 안내합니다."}, {"word": "nightfall", "meaning": "해 질 녘", "example": "We reached the camp just before nightfall.", "translation": "우리는 해 질 녘 직전에 캠프에 도착했습니다."}, {"word": "off the shore", "meaning": "해안에", "example": "A small island is located just off the shore.", "translation": "작은 섬이 해안 바로 근처에 위치해 있습니다."}, {"word": "overlook the water", "meaning": "호수를 굽어보다", "example": "Our room overlooks the water of the lake.", "translation": "우리 방은 호수 물을 굽어보고 있습니다."}, {"word": "pull weeds", "meaning": "잡초를 뽑다", "example": "I spent the whole morning pulling weeds.", "translation": "나는 아침 내내 잡초를 뽑으며 보냈습니다."}, {"word": "rain forest", "meaning": "열대 우림", "example": "Many unique animals live in the rain forest.", "translation": "많은 독특한 동물들이 열대 우림에 삽니다."}, {"word": "rain or shine", "meaning": "날씨에 상관없이, 어떤 일이 있어도", "example": "The event will take place rain or shine.", "translation": "그 행사는 날씨에 상관없이 열릴 것입니다."}, {"word": "rain shower", "meaning": "소나기", "example": "We got caught in a sudden rain shower.", "translation": "우리는 갑작스러운 소나기를 만났습니다."}, {"word": "rainstorm", "meaning": "폭풍우", "example": "The rainstorm caused some flooding in the city.", "translation": "폭풍우가 도시에 홍수를 일으켰습니다."}, {"word": "ranger", "meaning": "공원 관리인", "example": "The ranger told us not to feed the wild animals.", "translation": "공원 관리인이 우리에게 야생 동물에게 먹이를 주지 말라고 했습니다."}, {"word": "riverbank", "meaning": "강둑", "example": "We sat on the riverbank and watched the boats.", "translation": "우리는 강둑에 앉아 배들을 구경했습니다."}, {"word": "riverside", "meaning": "강변", "example": "There is a nice riverside restaurant in town.", "translation": "마을에 좋은 강변 식당이 있습니다."}, {"word": "scenery", "meaning": "풍경", "example": "The mountain scenery was absolutely breathtaking.", "translation": "산 풍경이 정말 숨이 막힐 정도로 아름다웠습니다."}, {"word": "scenic", "meaning": "경치의", "example": "We took the scenic route to enjoy the view.", "translation": "우리는 경치를 즐기기 위해 경치 좋은 길로 갔습니다."}, {"word": "slope", "meaning": "비탈; 경사지다", "example": "The slope was too steep for beginners to ski.", "translation": "그 비탈은 초보자들이 스키를 타기엔 너무 가팔랐습니다."}, {"word": "stream", "meaning": "시냇물; 흐르다", "example": "A small stream runs through the middle of the woods.", "translation": "작은 시냇물이 숲 한가운데를 가로질러 흐릅니다."}, {"word": "suburb", "meaning": "교외", "example": "Many people live in the suburbs and work in the city.", "translation": "많은 사람이 교외에 살면서 도시에서 일합니다."}, {"word": "sweep the leaves", "meaning": "낙엽을 쓸다", "example": "I need to sweep the leaves off the driveway.", "translation": "나는 진입로의 낙엽을 쓸어야 합니다."}, {"word": "thunderstorm", "meaning": "뇌우", "example": "A heavy thunderstorm is expected this afternoon.", "translation": "오늘 오후에 심한 뇌우가 예상됩니다."}, {"word": "trail", "meaning": "길, 자취", "example": "We followed the narrow trail up the mountain.", "translation": "우리는 산으로 이어진 좁은 길을 따라갔습니다."}, {"word": "trap", "meaning": "가두다, 함정에 빠뜨리다", "example": "He was trapped in the elevator for an hour.", "translation": "그는 한 시간 동안 엘리베이터에 갇혀 있었습니다."}, {"word": "tree trunk", "meaning": "나무줄기", "example": "The tree trunk was covered with thick green moss.", "translation": "나무줄기가 두꺼운 초록 이끼로 덮여 있었습니다." mple": "How did the market react to the news?", "translation": "시장이 그 소식에 어떻게 반응했나요?"}, {"word": "recyclable", "meaning": "재활용이 가능한", "example": "Please put recyclable items in the blue bin.", "translation": "재활용 가능한 물건들은 파란색 통에 넣어 주세요."}, {"word": "under construction", "meaning": "공사 중인", "example": "The new bridge is currently under construction.", "translation": "새로운 다리는 현재 공사 중입니다."}, {"word": "vague", "meaning": "모호한, 애매한", "example": "His explanation was too vague to understand.", "translation": "그의 설명은 이해하기에 너무 모호했습니다."}, {"word": "water level", "meaning": "수위(水位)", "example": "The water level of the dam has dropped recently.", "translation": "댐의 수위가 최근에 낮아졌습니다."}, {"word": "aging", "meaning": "나이 들어가는", "example": "The aging population is a major social issue.", "translation": "고령화(나이 들어가는) 인구는 주요한 사회적 이슈입니다."}, {"word": "ankle sprain", "meaning": "발목 접질림", "example": "He suffered a minor ankle sprain during the game.", "translation": "그는 경기 도중 가벼운 발목 접질림을 겪었습니다."}, {"word": "back injury", "meaning": "허리 부상", "example": "Heavy lifting can cause a serious back injury.", "translation": "무거운 것을 드는 것은 심각한 허리 부상을 유발할 수 있습니다."}, {"word": "be on a special diet", "meaning": "특수 식이 요법 중이다", "example": "I be on a special diet for my health.", "translation": "나는 건강을 위해 특수 식이 요법 중입니다. (원형 유지)"}, {"word": "blood pressure", "meaning": "혈압", "example": "You should check your blood pressure regularly.", "translation": "정기적으로 혈압을 체크해야 합니다."}, {"word": "blood supply", "meaning": "혈액 공급", "example": "The brain needs a constant blood supply.", "translation": "뇌는 지속적인 혈액 공급을 필요로 합니다."}, {"word": "buzzing", "meaning": "윙윙 소리를 내는, 와글거리는", "example": "I heard a buzzing sound coming from the light.", "translation": "전등에서 윙윙거리는 소리가 나는 것을 들었습니다."}, {"word": "doctor's appointment", "meaning": "진료 예약", "example": "I have a doctor's appointment at 3 PM today.", "translation": "나는 오늘 오후 3시에 진료 예약이 있습니다."}, {"word": "emergency room", "meaning": "응급실", "example": "He was rushed to the emergency room last night.", "translation": "그는 어젯밤에 응급실로 급히 후송되었습니다."}, {"word": "get some exercise", "meaning": "운동하다", "example": "It's good to get some exercise every morning.", "translation": "매일 아침 운동을 하는 것이 좋습니다."}, {"word": "heart ailment", "meaning": "심장병", "example": "He is recovering from a minor heart ailment.", "translation": "그는 가벼운 심장병에서 회복 중입니다."}, {"word": "heart attack", "meaning": "심장 마비", "example": "Stress can increase the risk of a heart attack.", "translation": "스트레스는 심장 마비의 위험을 높일 수 있습니다."}, {"word": "heart disease", "meaning": "심장 질환", "example": "Regular checkups help prevent heart disease.", "translation": "정기 검진은 심장 질환을 예방하는 데 도움이 됩니다."}, {"word": "injection", "meaning": "주사", "example": "The nurse gave him an injection for the pain.", "translation": "간호사가 통증을 위해 그에게 주사를 놓았습니다."}, {"word": "insomnia", "meaning": "불면증", "example": "She has been suffering from insomnia for weeks.", "translation": "그녀는 몇 주째 불면증으로 고통받고 있습니다."}, {"word": "lean back", "meaning": "뒤로 기대다", "example": "Please lean back and relax in your chair.", "translation": "뒤로 기대어 의자에서 휴식을 취하세요."}, {"word": "lose weight", "meaning": "살이 빠지다", "example": "He managed to lose weight by exercising daily.", "translation": "그는 매일 운동함으로써 살을 빼는 데 성공했습니다."}, {"word": "maternity ward", "meaning": "산부인과 병동", "example": "We visited my sister in the maternity ward.", "translation": "우리는 산부인과 병동에 있는 누이를 방문했습니다."}, {"word": "patient's record", "meaning": "환자의 의료 기록", "example": "The doctor is reviewing the patient's record.", "translation": "의사가 환자의 의료 기록을 검토하고 있습니다."}, {"word": "physical examination", "meaning": "신체검사", "example": "You need a physical examination for the job.", "translation": "당신은 그 직업을 위해 신체검사가 필요합니다."}, {"word": "physical therapy", "meaning": "물리 치료", "example": "He is undergoing physical therapy for his leg.", "translation": "그는 다리 때문에 물리 치료를 받고 있습니다."}, {"word": "resist", "meaning": "참다, 견디다, 저항하다", "example": "It was hard to resist the delicious smell of food.", "translation": "맛있는 음식 냄새를 참기는 어려웠습니다."}, {"word": "sneeze", "meaning": "재채기하다", "example": "Dust often makes me sneeze a lot.", "translation": "먼지는 종종 내가 재채기를 많이 하게 만듭니다."}, {"word": "surgical instrument", "meaning": "수술 도구", "example": "All surgical instruments must be sterilized.", "translation": "모든 수술 도구는 소독되어야 합니다."}, {"word": "tablet", "meaning": "알약", "example": "Take one tablet with water after every meal.", "translation": "매 끼니 후 물과 함께 알약 한 알을 복용하세요."}, {"word": "take effect", "meaning": "효과가 나타나다", "example": "The medicine will start to take effect soon.", "translation": "약 효과가 곧 나타나기 시작할 것입니다. (원형 유지)"}, {"word": "take medication", "meaning": "약을 복용하다", "example": "You must take medication exactly as prescribed.", "translation": "처방된 대로 정확하게 약을 복용해야 합니다. (원형 유지)"}, {"word": "take some medicine", "meaning": "약을 먹다", "example": "I need to take some medicine for my cold.", "translation": "감기 때문에 약을 좀 먹어야겠습니다. (원형 유지)"}, {"word": "terminal", "meaning": "말기의, 불치의", "example": "The patient was diagnosed with a terminal illness.", "translation": "그 환자는 불치병 진단을 받았습니다."}, {"word": "vaccination", "meaning": "백신, 예방 접종", "example": "Children must receive their vaccination on time.", "translation": "아이들은 제때 예방 접종을 받아야 합니다."}, {"word": "watch over", "meaning": "보호하다, 지키다", "example": "The nurse will watch over the patient tonight.", "translation": "간호사가 오늘 밤 환자를 돌볼(지킬) 것입니다. (원형 유지)"}, {"word": "consequently", "meaning": "그 결과, 따라서", "example": "He failed to study; consequently, he failed the test.", "translation": "그는 공부하지 않았고, 그 결과 시험에서 떨어졌습니다."}, {"word": "harmful", "meaning": "해로운, 유해한", "example": "Smoking is harmful to your overall health.", "translation": "흡연은 전반적인 건강에 해롭습니다."}, {"word": "maximize", "meaning": "극대화하다", "example": "We need to maximize our efficiency to succeed.", "translation": "성공하려면 효율성을 극대화해야 합니다."}, {"word": "medicinal", "meaning": "약용의, 치유력이 있는", "example": "Some plants have great medicinal properties.", "translation": "어떤 식물들은 훌륭한 약용 성분을 가지고 있습니다."
