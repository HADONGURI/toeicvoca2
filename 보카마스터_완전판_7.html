<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보카 마스터</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f4f8;--card:#fff;--border:#e2e8f0;
  --text:#1e293b;--sub:#64748b;--hint:#94a3b8;
  --primary:#3b82f6;--primary-d:#1d4ed8;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;
  --r:12px;--sh:0 1px 4px rgba(0,0,0,.08);
}
body.dark{
  --bg:#0f172a;--card:#1e293b;--border:#334155;
  --text:#f1f5f9;--sub:#94a3b8;--hint:#475569;
  --sh:0 1px 4px rgba(0,0,0,.4);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
header{background:var(--card);border-bottom:1px solid var(--border);padding:.875rem 1.5rem;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr{max-width:1320px;margin:0 auto;display:flex;align-items:center;gap:1rem}
.logo{font-size:20px;font-weight:700;color:var(--primary);white-space:nowrap}
.hdr-tabs{display:flex;gap:4px;flex:1;overflow-x:auto}
.hdr-tab{padding:.5rem 1rem;border:none;background:transparent;color:var(--sub);cursor:pointer;border-radius:8px;font-size:14px;font-weight:500;white-space:nowrap;transition:.15s}
.hdr-tab:hover{background:var(--bg);color:var(--text)}
.hdr-tab.on{background:var(--primary);color:#fff}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--sub);transition:.15s}
main{max-width:1320px;margin:0 auto;padding:1.5rem}
.page{display:none}.page.on{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;box-shadow:var(--sh)}
btn,.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-p:hover{background:var(--primary-d)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}
.btn-sm{padding:.35rem .75rem;font-size:13px;border-radius:6px}
/* 학습 */
.study-layout{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;align-items:start}
@media(max-width:900px){.study-layout{grid-template-columns:1fr}}
.ctrl-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;align-items:center}
.word-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;box-shadow:var(--sh)}
.w-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
.w-num{font-size:13px;color:var(--hint)}
.day-badge{font-size:12px;background:var(--primary);color:#fff;padding:.2rem .6rem;border-radius:20px;font-weight:600}
.w-en{font-size:36px;font-weight:700;color:var(--primary);margin-bottom:.4rem;line-height:1.2}
.w-ko{font-size:20px;color:var(--sub);margin-bottom:1.25rem}
.ex-box{background:var(--bg);border-radius:10px;padding:1rem 1.25rem;margin:1rem 0}
.ex-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.ex-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--hint)}
.ex-btns{display:flex;gap:4px}
.spk-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:12px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.spk-btn:hover{background:var(--primary);border-color:var(--primary)}
.ex-en{font-size:15px;color:var(--text);margin-bottom:.3rem}
.ex-ko{font-size:14px;color:var(--sub);font-style:italic}
.timer-row{display:flex;gap:.5rem;align-items:center;margin:.75rem 0}
.timer-inp{width:60px;padding:.4rem;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);text-align:center;font-size:14px}
.card-footer{display:flex;gap:.5rem;margin-top:1.5rem;align-items:center;flex-wrap:wrap}
.star-btn{width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:20px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.star-btn.on{background:#fef3c7;border-color:#f59e0b}
.speak-btn{width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:transparent;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;color:var(--sub)}
.speak-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.nav-btns{display:flex;gap:.5rem;flex:1;justify-content:flex-end}
/* 사이드바 */
.side-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--sh)}
.side-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--hint);margin-bottom:.5rem}
.side-val{font-size:28px;font-weight:700;color:var(--primary)}
.side-sub{font-size:13px;color:var(--sub);margin-top:.25rem}
.prog-bar{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:.5rem 0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--green));border-radius:4px;transition:.3s}
/* 리스트 */
.list-ctrl{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;align-items:center}
.search-inp{flex:1;min-width:180px;padding:.55rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px}
.search-inp:focus{outline:none;border-color:var(--primary)}
.w-table{width:100%;border-collapse:collapse;font-size:14px}
.w-table th{padding:.65rem .75rem;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--hint);border-bottom:2px solid var(--border);background:var(--bg)}
.w-table td{padding:.65rem .75rem;border-bottom:1px solid var(--border);vertical-align:top}
.w-table tr:hover td{background:var(--bg)}
.pager{display:flex;gap:.35rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.pg-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--sub);cursor:pointer;font-size:13px}
.pg-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
/* 일차 */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.5rem;margin-bottom:1.5rem}
.day-chip{padding:.5rem;border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;background:var(--card)}
.day-chip:hover{border-color:var(--primary);color:var(--primary)}
.day-chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.day-chip.done{background:#d1fae5;border-color:#10b981;color:#065f46}
body.dark .day-chip.done{background:#064e3b;color:#6ee7b7;border-color:#059669}
/* 퀴즈 */
.quiz-wrap{max-width:700px;margin:0 auto}
.q-type-btn{flex:1;padding:.65rem;border:2px solid var(--border);border-radius:10px;background:transparent;color:var(--text);cursor:pointer;font-size:14px;font-weight:600;transition:.15s;text-align:center}
.q-type-btn:hover{border-color:var(--primary);color:var(--primary)}
.q-type-btn.on{border-color:var(--primary);background:var(--primary);color:#fff}
.q-progress{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.q-prog-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.q-prog-fill{height:100%;background:var(--primary);transition:.3s}
.q-question{font-size:20px;font-weight:600;line-height:1.5;margin-bottom:1.5rem}
.q-sentence{font-size:17px;line-height:1.8;background:var(--bg);border-radius:10px;padding:1rem 1.25rem;color:var(--text);margin-bottom:.75rem}
.q-sentence-ko{font-size:14px;color:var(--sub);font-style:italic;background:var(--bg);border-radius:8px;padding:.6rem 1rem;margin-bottom:1.25rem}
.q-options{display:grid;gap:.6rem;margin-bottom:1.25rem}
.q-opt{width:100%;padding:.85rem 1.1rem;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:15px;text-align:left;transition:.15s}
.q-opt:hover:not(:disabled){border-color:var(--primary);background:var(--bg)}
.q-opt.correct{border-color:var(--green);background:#d1fae5;color:#065f46}
body.dark .q-opt.correct{background:#064e3b;color:#6ee7b7}
.q-opt.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b}
body.dark .q-opt.wrong{background:#450a0a;color:#fca5a5}
.q-opt:disabled{cursor:default}
.q-result{padding:.75rem 1rem;border-radius:8px;font-weight:600;margin-bottom:1rem}
.r-ok{background:#d1fae5;color:#065f46}
.r-ng{background:#fee2e2;color:#991b1b}
body.dark .r-ok{background:#064e3b;color:#6ee7b7}
body.dark .r-ng{background:#450a0a;color:#fca5a5}
.score-big{text-align:center;padding:2rem}
.score-num{font-size:64px;font-weight:800;color:var(--primary)}
/* 문법 */
.gram-tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.gram-tab{padding:.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--sub);cursor:pointer;font-size:13px;transition:.15s}
.gram-tab.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.gram-content{display:none}.gram-content.on{display:block}
.g-table{width:100%;border-collapse:collapse;font-size:14px}
.g-table th{padding:.6rem .75rem;text-align:left;font-size:12px;text-transform:uppercase;color:var(--hint);border-bottom:2px solid var(--border);background:var(--bg)}
.g-table td{padding:.6rem .75rem;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6}
.g-table tr:hover td{background:var(--bg)}
.tip-cell{font-size:13px;color:var(--amber);font-weight:500}
.prep-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:.75rem}
.prep-word{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:.5rem}
.prep-means{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.5rem}
.prep-ex{font-size:13px;color:var(--sub);margin-top:.25rem}
.badge{display:inline-block;padding:.15rem .55rem;border-radius:20px;font-size:12px;font-weight:600}
.b-blue{background:#dbeafe;color:#1d4ed8}.dark .b-blue{background:#1e3a5f;color:#93c5fd}
.b-green{background:#d1fae5;color:#065f46}.dark .b-green{background:#064e3b;color:#6ee7b7}
.b-purple{background:#ede9fe;color:#5b21b6}.dark .b-purple{background:#2e1065;color:#c4b5fd}
.b-amber{background:#fef3c7;color:#92400e}.dark .b-amber{background:#451a03;color:#fcd34d}
/* 통계 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-big{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;text-align:center}
.stat-big-val{font-size:40px;font-weight:800;color:var(--primary)}
.stat-big-label{font-size:13px;color:var(--sub);margin-top:.4rem}
.heat-grid{display:grid;grid-template-columns:repeat(30,1fr);gap:3px}
.heat-cell{aspect-ratio:1;border-radius:3px;background:var(--bg)}
.heat-cell.h1{background:#bfdbfe}.heat-cell.h2{background:#60a5fa}.heat-cell.h3{background:#2563eb}
.dark .heat-cell.h1{background:#1e3a5f}.dark .heat-cell.h2{background:#1d4ed8}.dark .heat-cell.h3{background:#3b82f6}
@media(max-width:600px){.w-en{font-size:26px}main{padding:1rem}}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">📚 보카 마스터</div>
    <div class="hdr-tabs">
      <button class="hdr-tab on" onclick="goPage('study',this)">학습</button>
      <button class="hdr-tab" onclick="goPage('list',this)">전체 단어</button>
      <button class="hdr-tab" onclick="goPage('days',this)">일차별</button>
      <button class="hdr-tab" onclick="goPage('quiz',this)">퀴즈</button>
      <button class="hdr-tab" onclick="goPage('grammar',this)">문법정리</button>
      <button class="hdr-tab" onclick="goPage('stats',this)">통계</button>
    </div>
    <div>
      <button class="icon-btn" onclick="toggleDark()">🌙</button>
    </div>
  </div>
</header>

<main>

<!-- 학습 -->
<div id="page-study" class="page on">
  <div class="ctrl-row">
    <button class="btn btn-p btn-sm" id="btnS900" onclick="setSeries(900)">900 시리즈</button>
    <button class="btn btn-sm" id="btnS800" onclick="setSeries(800)">800 시리즈</button>
    <select id="filterSel" onchange="setFilter(this.value)" style="padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;cursor:pointer">
      <option value="all">전체 단어</option>
      <option value="unknown">⭐ 모르는 단어만</option>
      <option value="known">✅ 아는 단어만</option>
    </select>
    <button class="btn btn-sm" onclick="shuffleNow()">🔀 섞기</button>
    <span id="filterCount" style="font-size:13px;color:var(--sub)"></span>
  </div>
  <div class="study-layout">
    <div>
      <div class="word-card">
        <div class="w-top">
          <div class="w-num" id="sWordNum">1 / 960</div>
          <div class="day-badge" id="sDayBadge">1일차</div>
        </div>
        <div class="w-en" id="sWordEn">-</div>
        <div class="w-ko" id="sWordKo">-</div>
        <div class="ex-box">
          <div class="ex-header">
            <div class="ex-label">예문</div>
            <div class="ex-btns">
              <button class="spk-btn" onclick="speakEx('en-US')" title="미국 발음">🇺🇸</button>
              <button class="spk-btn" onclick="speakEx('en-GB')" title="영국 발음">🇬🇧</button>
            </div>
          </div>
          <div class="ex-en" id="sExEn">-</div>
          <div class="ex-ko" id="sExKo">-</div>
        </div>
        <div class="timer-row">
          <input type="number" class="timer-inp" id="timerSec" value="5" min="1" max="60">
          <span style="font-size:13px;color:var(--sub)">초</span>
          <button class="btn btn-sm" onclick="startTimer()">⏱ 타이머</button>
          <span id="timerDisp" style="font-size:18px;font-weight:700;color:var(--primary);display:none"></span>
        </div>
        <div class="card-footer">
          <button class="star-btn" id="starBtn" onclick="toggleStar()">⭐</button>
          <button class="speak-btn" onclick="speakWord('en-US')" title="미국 발음">🇺🇸</button>
          <button class="speak-btn" onclick="speakWord('en-GB')" title="영국 발음">🇬🇧</button>
          <div class="nav-btns">
            <button class="btn" onclick="prevWord()">← 이전</button>
            <button class="btn btn-p" onclick="nextWord()">다음 →</button>
          </div>
        </div>
      </div>
    </div>
    <div>
      <div class="side-card">
        <div class="side-label">학습 진도</div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin:.25rem 0">
          <span id="progLearned">0</span>/<span id="progTotal">960</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
        <div style="font-size:13px;font-weight:600;color:var(--primary)" id="progPct">0%</div>
      </div>
      <div class="side-card">
        <div class="side-label">⭐ 모르는 단어</div>
        <div class="side-val" id="sideUnknown">0</div>
        <div class="side-sub">복습 필요</div>
      </div>
      <div class="side-card">
        <div class="side-label">현재 일차</div>
        <div class="side-val" id="sideCurDay">1</div>
        <div class="side-sub" id="sideDayInfo"></div>
      </div>
      <button class="btn btn-g" style="width:100%" onclick="saveProgress()">💾 진도 저장</button>
    </div>
  </div>
</div>

<!-- 전체 단어 -->
<div id="page-list" class="page">
  <div class="card">
    <div class="list-ctrl">
      <button class="btn btn-p btn-sm" id="lBtnS900" onclick="setListSeries(900)">900 시리즈</button>
      <button class="btn btn-sm" id="lBtnS800" onclick="setListSeries(800)">800 시리즈</button>
      <input type="text" class="search-inp" placeholder="🔍 단어 또는 뜻 검색..." id="searchInp" oninput="doSearch()">
      <select id="listFilter" onchange="doSearch()" style="padding:.5rem .75rem;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px">
        <option value="all">전체</option>
        <option value="unknown">⭐ 모르는 단어</option>
      </select>
      <span id="listCount" style="font-size:13px;color:var(--sub)"></span>
    </div>
    <div style="overflow-x:auto">
      <table class="w-table">
        <thead><tr><th style="width:40px">#</th><th>단어</th><th>뜻</th><th>예문</th><th style="width:60px">상태</th></tr></thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
    <div class="pager" id="listPager"></div>
  </div>
</div>

<!-- 일차별 -->
<div id="page-days" class="page">
  <div class="card" style="margin-bottom:1rem">
    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
      <button class="btn btn-p btn-sm" id="dBtnS900" onclick="setDaySeries(900)">900 시리즈</button>
      <button class="btn btn-sm" id="dBtnS800" onclick="setDaySeries(800)">800 시리즈</button>
      <span style="font-size:13px;color:var(--sub)" id="daySeriesInfo"></span>
    </div>
    <div class="day-grid" id="dayGrid"></div>
  </div>
  <div id="dayWordArea" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
        <h2 style="font-size:18px;font-weight:700" id="dayAreaTitle"></h2>
        <button class="btn btn-sm" onclick="studyThisDay()">📖 이 일차 학습하기</button>
      </div>
      <div style="overflow-x:auto">
        <table class="w-table">
          <thead><tr><th style="width:40px">#</th><th>단어</th><th>뜻</th><th>예문</th><th style="width:60px">상태</th></tr></thead>
          <tbody id="dayWordBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 퀴즈 -->
<div id="page-quiz" class="page">
  <div class="quiz-wrap">
    <div id="quizSetup">
      <div class="card">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:1rem">퀴즈 설정</h2>
        <div style="margin-bottom:1rem">
          <div style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:.5rem">단어 시리즈</div>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-p btn-sm" id="qBtnS900" onclick="setQuizSeries(900)">900 시리즈</button>
            <button class="btn btn-sm" id="qBtnS800" onclick="setQuizSeries(800)">800 시리즈</button>
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <div style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:.5rem">출제 범위</div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap">
            <button class="btn btn-p btn-sm" id="qRangeAll" onclick="setQuizRange('all')">전체</button>
            <button class="btn btn-sm" id="qRangeUnknown" onclick="setQuizRange('unknown')">⭐ 모르는 단어만</button>
          </div>
        </div>
        <div style="margin-bottom:1.25rem">
          <div style="font-size:13px;font-weight:600;color:var(--sub);margin-bottom:.5rem">퀴즈 유형</div>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap">
            <button class="q-type-btn on" id="qTypeWord" onclick="setQuizType('word')">📝 단어→뜻</button>
            <button class="q-type-btn" id="qTypeMean" onclick="setQuizType('mean')">💬 뜻→단어</button>
            <button class="q-type-btn" id="qTypeFill" onclick="setQuizType('fill')">✏️ 예문 빈칸</button>
          </div>
        </div>
        <div style="display:flex;gap:.75rem;align-items:center;margin-bottom:1.25rem">

ith regularity for better health.", "translation": "건강을 위해 정기적으로 운동해야 합니다."}, {"word": "replenish", "meaning": "다시 채우다, 보충하다", "example": "Please replenish the ink in the printer.", "translation": "프린터의 잉크를 다시 채워 주세요."}, {"word": "simplicity", "meaning": "간단함", "example": "The simplicity of the user interface is a big plus.", "translation": "사용자 인터페이스의 간단함이 큰 장점입니다."}, {"word": "stellar", "meaning": "뛰어난, 별의", "example": "The company reported stellar profits this quarter.", "translation": "회사는 이번 분기에 뛰어난 수익을 기록했습니다."}, {"word": "versatile", "meaning": "다재다능한", "example": "This smartphone has a versatile camera system.", "translation": "이 스마트폰은 다재다능한 카메라 시스템을 갖추고 있습니다."}, {"word": "adept", "meaning": "능숙한", "example": "He is very adept at managing large teams.", "translation": "그는 대규모 팀을 관리하는 데 매우 능숙합니다."}, {"word": "against all odds", "meaning": "모든 역경을 딛고", "example": "They won the championship against all odds.", "translation": "그들은 모든 역경을 딛고 우승을 차지했습니다."}, {"word": "command", "meaning": "구사력, 명령, 지배력", "example": "Her command of French improved after living in Paris.", "translation": "파리에 거주한 후 그녀의 프랑스어 구사력이 향상되었습니다."}, {"word": "commensurate", "meaning": "비례한, 액수가 상응하는", "example": "Salary is commensurate with qualifications and experience.", "translation": "급여는 자격 및 경력에 상응하여 지급됩니다."}, {"word": "computer literate", "meaning": "컴퓨터 사용 기술을 가진", "example": "Most modern jobs require you to be computer literate.", "translation": "대부분의 현대 직업은 컴퓨터 활용 능력을 요구합니다."}, {"word": "eagerness", "meaning": "열의", "example": "The students showed great eagerness to participate.", "translation": "학생들은 참여하려는 강한 열의를 보였습니다."}, {"word": "familiarize oneself with", "meaning": "~에 정통하다, 익숙하다", "example": "Take some time to familiarize yourself with the system.", "translation": "시스템에 익숙해지는 시간을 가지세요."}, {"word": "increment", "meaning": "증가, 인상", "example": "You will receive a pay increment after the probation.", "translation": "수습 기간이 끝나면 급여 인상을 받게 됩니다."}, {"word": "interpersonal skills", " ": "effortlessly", "meaning": "힘들지 않게", "example": "She can complete the complex task effortlessly.", "translation": "그녀는 복잡한 업무를 힘들지 않게 완료할 수 있습니다."}, {"word": "in observance of", "meaning": "~을 기념하여", "example": "The office is closed in observance of the holiday.", "translation": "휴일을 기념하여 사무실 문을 닫습니다."}, {"word": "inadvertently", "meaning": "무심코, 우연히", "example": "I inadvertently reveal the secret to my friend.", "translation": "나는 무심코 친구에게 비밀을 드러냅니다."}, {"word": "judicial", "meaning": "사법의, 재판의", "example": "The case is handled by the judicial system.", "translation": "그 사건은 사법 체계에 의해 처리됩니다."}, {"word": "justification", "meaning": "정당한 이유", "example": "There is no justification for such a long delay.", "translation": "그렇게 긴 지연에 대한 정당한 이유는 없습니다."}, {"word": "keenly", "meaning": "날카롭게, 예민하게", "example": "I am keenly aware of the current market trends.", "translation": "나는 현재의 시장 흐름을 예민하게(잘) 인지하고 있습니다."}, {"word": "lawsuit", "meaning": "소송, 고소", "example": "The company faces a lawsuit for the defect.", "translation": "그 회사는 결함으로 인해 소송에 직면해 있습니다."}, {"word": "mundane", "meaning": "일상적인, 재미없는", "example": "He wants to escape from his mundane office life.", "translation": "그는 일상적이고 재미없는 사무실 생활에서 벗어나고 싶어 합니다."}, {"word": "off-limits", "meaning": "출입 금지의", "example": "This area is off-limits to unauthorized people.", "translation": "이 구역은 인가받지 않은 사람들에게 출입 금지입니다."}, {"word": "ordinance", "meaning": "법령, 명령", "example": "The city council passed a new ordinance.", "translation": "시의회는 새로운 법령을 통과시켰습니다."}, {"word": "pulled", "meaning": "철회된, 철수한", "example": "The product is pulled from the market today.", "translation": "그 제품은 오늘 시장에서 철회됩니다(판매 중단됩니다)."}, {"word": "reprimand", "meaning": "비난하다, 질책하다", "example": "The manager will reprimand the late employee.", "translation": "매니저는 지각한 직원을 질책할 것입니다."}, {"word": "resolution", "meaning": "결의(안), 결정, 해상도", "example": "The board will adopt a resolution to merge.", "translation": "이사회는 합병을 위한 결의안을 채택할 것입니다."}, {"word": "stiff", "meaning": "뻣뻣한, 경직된", "example": "I feel a stiff pain in my neck after work.", "translation": "업무 후에 목에 뻣뻣한 통증이 느껴집니다."}, {"word": "substantiate", "meaning": "입증하다", "example": "You need evidence to substantiate your claim.", "translation": "당신은 당신의 주장을 입증하기 위해 증거가 필요합니다."}, {"word": "trespass", "meaning": "(남의 토지에) 침입하다", "example": "It is illegal to trespass on private property.", "translation": "사유지에 침입하는 것은 불법입니다."}, {"word": "violate", "meaning": "위반하다", "example": "Do not violate the company safety rules.", "translation": "회사의 안전 규칙을 위반하지 마세요."}, {"word": "at the discretion of", "meaning": "~의 재량으로", "example": "The bonus is given at the discretion of the CEO.", "translation": "보너스는 CEO의 재량으로 지급됩니다."}, {"word": "bound", "meaning": "의무가 있는, 꼭 ~하게 되어 있는", "example": "You are bound to follow the terms of the contract.", "translation": "당신은 계약 조항을 따를 의무가 있습니다."}, {"word": "circumscribe", "meaning": "~을 제한하다", "example": "The new law will circumscribe the power of leaders.", "translation": "새로운 법은 지도자들의 권한을 제한할 것입니다."}, {"word": "enactment", "meaning": "입법, 법령", "example": "The enactment of the policy will take a month.", "translation": "그 정책의 입법(시행)은 한 달이 걸릴 것입니다."}, {"word": "impeccable", "meaning": "결점 없는", "example": "Your performance in the project is impeccable.", "translation": "프로젝트에서 당신의 성과는 결점 없습니다."}, {"word": "infringement", "meaning": "침해", "example": "This is a clear infringement of our patent rights.", "translation": "이것은 우리 특허권에 대한 명백한 침해입니다."}, {"word": "legitimate", "meaning": "합법적인, 적법한", "example": "The company has a legitimate reason to fire him.", "translation": "회사는 그를 해고할 적법한 사유가 있습니다."}, {"word": "petition", "meaning": "진정서, 탄원서", "example": "They sign a petition for a new local park.", "translation": "그들은 새로운 지역 공원을 위한 탄원서에 서명합니다."}, {"word": "when it comes to", "meaning": "~에 관해서는", "example": "When it comes to design, she is the best expert.", "translation": "디자인에 관해서는 그녀가 최고의 전문가입니다."}, {"word": "arrange items on the shelf", "meaning": "선 l conduct a site inspection.", "translation": "엔지니어가 현지 시찰을 실시할 것입니다."}, {"word": "subordinate", "meaning": "부하 직원, 하급자", "example": "He treats every subordinate with respect.", "translation": "그는 모든 부하 직원을 존중하며 대합니다."}, {"word": "subsidiary", "meaning": "자회사", "example": "This company is a subsidiary of a larger group.", "translation": "이 회사는 더 큰 그룹의 자회사입니다."}, {"word": "take initiative", "meaning": "솔선해서 하다, 주도권을 잡다", "example": "You should take initiative to solve the problem.", "translation": "당신은 문제를 해결하기 위해 솔선수범해야 합니다."}, {"word": "telecommute", "meaning": "재택근무하다", "example": "Many employees now choose to telecommute.", "translation": "많은 직원들이 이제 재택근무하는 것을 선택합니다."}, {"word": "bookkeeping", "meaning": "부기", "example": "You must learn bookkeeping for this accounting job.", "translation": "이 회계 업무를 위해 부기를 배워야 합니다."}, {"word": "have one's hands full", "meaning": "몹시 바쁘다", "example": "I have my hands full with many tasks today.", "translation": "나는 오늘 많은 업무로 몹시 바쁩니다."}, {"word": "make an outside call", "meaning": "외부로 전화를 걸다", "example": "You should press 9 to make an outside call.", "translation": "외부로 전화를 걸려면 9번을 눌러야 합니다."}, {"word": "motivation", "meaning": "이유, 동기", "example": "Money is not the only motivation for hard work.", "translation": "돈이 열심히 일하는 유일한 동기는 아닙니다."}, {"word": "newly listed", "meaning": "새로 목록에 오른", "example": "The newly listed items are on the second floor.", "translation": "새로 목록에 오른 품목들은 2층에 있습니다."}, {"word": "prioritize", "meaning": "우선적으로 처리하다", "example": "You must prioritize the most urgent request.", "translation": "가장 긴급한 요청을 우선적으로 처리해야 합니다."}, {"word": "sit in alternate seats", "meaning": "한 자리씩 건너 앉다", "example": "Please sit in alternate seats to keep distance.", "translation": "거리를 유지하기 위해 한 자리씩 건너 앉아 주세요."}, {"word": "written authorization", "meaning": "서면 결재", "example": "We need written authorization to start the project.", "translation": "프로젝트를 시작하려면 서면 결재가 필요합니다."}, {"word": "written consent", "meaning": "서면 동의", "example": neously at the news.", "translation": "청중은 그 소식에 자발적으로 환호했습니다."}, {"word": "trivial", "meaning": "사소한, 하찮은", "example": "Do not spend too much time on a trivial matter.", "translation": "사소한 문제에 너무 많은 시간을 소비하지 마세요."}, {"word": "turn in", "meaning": "실적 등을 올리다, 제출하다", "example": "Please turn in your report by 5 PM.", "translation": "오후 5시까지 보고서를 제출해 주세요."}, {"word": "ambiance", "meaning": "(장소의) 분위기", "example": "The cafe has a very cozy ambiance.", "translation": "그 카페는 매우 아늑한 분위기를 가지고 있습니다."}, {"word": "aspiration", "meaning": "포부, 열망", "example": "He has a strong aspiration to study abroad.", "translation": "그는 해외에서 공부하려는 강한 열망을 가지고 있습니다."}, {"word": "creditable", "meaning": "훌륭한, 칭찬할 만한", "example": "The team made a creditable effort today.", "translation": "팀은 오늘 훌륭한 노력을 기울였습니다."}, {"word": "eminent", "meaning": "저명한, 탁월한", "example": "She is an eminent lawyer in this city.", "translation": "그녀는 이 도시에서 저명한 변호사입니다."}, {"word": "endeavor", "meaning": "노력하다, 애쓰다", "example": "We should endeavor to satisfy our customers.", "translation": "우리는 고객들을 만족시키기 위해 노력해야 합니다."}, {"word": "entrust A with B", "meaning": "A에게 B의 책임을 맡기다", "example": "I entrust you with this important mission.", "translation": "나는 당신에게 이 중요한 임무의 책임을 맡깁니다."}, {"word": "on edge", "meaning": "흥분하여, 안절부절못하여", "example": "Everyone felt on edge before the announcement.", "translation": "발표 전에 모두가 안절부절못했습니다."}, {"word": "reach one's full potential", "meaning": "능력을 최대한 발휘하다", "example": "This training helps you reach your full potential.", "translation": "이 훈련은 당신이 능력을 최대한 발휘하도록 돕습니다."}, {"word": "astute", "meaning": "기민한", "example": "He is an astute businessman in the city.", "translation": "그는 그 도시에서 기민한 사업가입니다."}, {"word": "bring along", "meaning": "~를 데리고 가다, ~을 갖고 가다", "example": "You should bring along your umbrella today.", "translation": "오늘 우산을 갖고 가야 합니다."}, {"word": "compartment", "meaning": "구획, 칸막이", "example": "I put my bag in the overhead compartment.", "translation": "나는 내 가방을 머리 위 선반(구획 을 기록하다", "example": "Please sign out before you leave the building.", "translation": "건물을 떠나기 전에 서명하여 외출을 기록해 주세요."}, {"word": "undeniable", "meaning": "부인할 수 없는", "example": "The success of the product be undeniable.", "translation": "그 제품의 성공은 부인할 수 없습니다."}, {"word": "violation", "meaning": "위반, 위배", "example": "This be a clear violation of the law.", "translation": "이것은 명백한 법 위반입니다."}, {"word": "aggravate", "meaning": "악화시키다", "example": "Heavy rain aggravate the traffic jam.", "translation": "폭우가 교통 체증을 악화시킬 것입니다."}, {"word": "contingency", "meaning": "불의의 사태, 뜻밖의 일", "example": "We must have a contingency plan for the event.", "translation": "우리는 그 행사를 위한 비상(뜻밖의 일 대비) 계획이 있어야 합니다."}, {"word": "draw the line at", "meaning": "~에 선을 긋다, ~ 이상은 하지 않다", "example": "I draw the line at working on Sundays.", "translation": "나는 일요일에 일하는 것에는 선을 긋습니다(그 이상은 하지 않습니다)."}, {"word": "draw up", "meaning": "(문서를) 작성하다", "example": "You should draw up a contract for the deal.", "translation": "당신은 그 거래를 위한 계약서를 작성해야 합니다."}, {"word": "evacuate", "meaning": "(집, 장소에서) 대피하다", "example": "All people must evacuate the building immediately.", "translation": "모든 사람들은 즉시 건물에서 대피해야 합니다."}, {"word": "in commemoration of", "meaning": "~을 기념하여", "example": "We hold a concert in commemoration of the holiday.", "translation": "우리는 휴일을 기념하여 콘서트를 엽니다."}, {"word": "on probation", "meaning": "견습으로", "example": "New employees are on probation for three months.", "translation": "신입 사원들은 3개월 동안 견습(수습) 기간에 있습니다."}, {"word": "overestimate", "meaning": "과대평가하다", "example": "Do not overestimate your own ability.", "translation": "당신 자신의 능력을 과대평가하지 마세요."}, {"word": "privilege", "meaning": "특권, 특전", "example": "Education is a right, not a privilege.", "translation": "교육은 특권이 아니라 권리입니다."}, {"word": "restructure", "meaning": "구조조정을 하다", "example": "The firm decide to restructure its organization.", "translation": "그 회사는 조직을 구조조정하기로 결정합니다."}, {"word": "segregate A from B", "meaning": "A를 B로부터 분리하다", "example": "We segregate recyclable waste from trash.", "translation": "우리는 쓰레기로부터 재활용 폐기물을 분리합니다."}, {"word": "trigger", "meaning": "야기하다, 유발하다", "example": "Stress trigger a severe headache.", "translation": "스트레스는 심한 두통을 유발할 수 있습니다."}, {"word": "wary of", "meaning": "~을 조심하는", "example": "Be wary of emails from unknown senders.", "translation": "모르는 발신인으로부터 온 이메일을 조심하세요."}, {"word": "be in line", "meaning": "줄 서다", "example": "You should be in line to enter the theater.", "translation": "극장에 들어가려면 줄을 서야 합니다."}, {"word": "for a change", "meaning": "기분 전환으로", "example": "Let's eat lunch outside for a change.", "translation": "기분 전환으로 점심을 밖에서 먹읍시다."}, {"word": "pass the time", "meaning": "시간을 보내다, 시간을 때우다", "example": "I play games on my phone to pass the time.", "translation": "나는 시간을 때우기 위해 휴대폰으로 게임을 합니다."}, {"word": "pose", "meaning": "자세를 취하다; 자세", "example": "Please pose for the group photo now.", "translation": "이제 단체 사진을 위해 자세를 취해 주세요."}, {"word": "stay tuned", "meaning": "채널을 고정시키다", "example": "Please stay tuned for more updates.", "translation": "더 많은 소식을 위해 채널을 고정해 주세요."}, {"word": "vacate", "meaning": "집을 비우다, 방을 비우다", "example": "You must vacate the room by noon.", "translation": "정오까지 방을 비워야 합니다."}, {"word": "appreciative", "meaning": "감사하는", "example": "He is very appreciative of your support.", "translation": "그는 당신의 지원에 매우 감사해합니다."}, {"word": "casually", "meaning": "캐주얼하게, 약식으로", "example": "We dress casually on every Friday.", "translation": "우리는 매주 금요일마다 옷을 캐주얼하게 입습니다."}, {"word": "enlightening", "meaning": "계몽적인, 깨우치는", "example": "The lecture is very enlightening for students.", "translation": "그 강의는 학생들에게 매우 깨우치는 바가 많습니다(계몽적입니다)."}, {"word": "enthusiastically", "meaning": "열광적으로, 매우 열심히", "example": "The fans cheer enthusiastically for the team.", "translation": "팬들이 팀을 위해 열광적으로 응원합니다."}, {"word": "excellence", "meaning": "우수, 탁월성", "example": "The company strive for excellence in service.", "translation": "그 회사는 서비스의 우수성을 위해 노력합니다."}, {"word": "excursio pture", "meaning": "담아내다, 포착하다", "example": "The film successfully captured the city's atmosphere.", "translation": "그 영화는 도시의 분위기를 성공적으로 담아냈습니다."}, {"word": "consolidate", "meaning": "강화하다, 통합하다", "example": "The company consolidated its small offices into one.", "translation": "회사는 작은 사무실들을 하나로 통합했습니다."}, {"word": "contend", "meaning": "대처하다, 싸우다", "example": "We must contend with various market challenges.", "translation": "우리는 다양한 시장의 도전 과제들에 대처해야 합니다."}, {"word": "gauge", "meaning": "측정하다", "example": "It is hard to gauge the impact of the changes.", "translation": "변화의 영향을 측정하기는 어렵습니다."}, {"word": "momentum", "meaning": "추진력, 탄성", "example": "The project gained momentum after the new funding.", "translation": "그 프로젝트는 새로운 자금 지원 이후 추진력을 얻었습니다."}, {"word": "recognizable", "meaning": "알아볼 수 있는", "example": "The brand is easily recognizable by its logo.", "translation": "그 브랜드는 로고를 통해 쉽게 알아볼 수 있습니다."}, {"word": "segment", "meaning": "부분, 조각", "example": "This segment of the market is highly competitive.", "translation": "시장의 이 부분은 경쟁이 매우 치열합니다."}, {"word": "telling", "meaning": "효과적인, 드러내는", "example": "Her silence was a telling sign of her disagreement.", "translation": "그녀의 침묵은 반대의 의사를 드러내는 징후였습니다."}, {"word": "confiscation", "meaning": "몰수, 압수", "example": "The confiscation of illegal items was completed.", "translation": "불법 품목의 압수가 완료되었습니다."}, {"word": "constitute", "meaning": "~을 구성하다", "example": "These documents constitute a binding contract.", "translation": "이 서류들은 구속력 있는 계약을 구성합니다."}, {"word": "drive up", "meaning": "(값을) 올리다", "example": "The shortage of supply will drive up the prices.", "translation": "공급 부족이 가격을 올릴 것입니다."}, {"word": "feasibility study", "meaning": "타당성 조사", "example": "We finished the feasibility study for the new factory.", "translation": "우리는 새 공장을 위한 타당성 조사를 마쳤습니다."}, {"word": "intervention", "meaning": "간섭", "example": "Market intervention helped stabilize the economy.", "translation": "시장 간섭이 경제를 안정시키는 데 도움이 되었습니다."}, {"word":  is important for remote workers.", "translation": "자기 훈련(규율)은 원격 근무자들에게 중요합니다."}, {"word": "jingle", "meaning": "시엠송", "example": "I still remember the catchy jingle of that ad.", "translation": "나는 여전히 그 광고의 기억하기 쉬운 시엠송을 기억합니다."}, {"word": "mobility", "meaning": "이동성", "example": "The new app improved the mobility of our staff.", "translation": "새로운 앱이 우리 직원들의 이동성을 향상시켰습니다."}, {"word": "abruptly", "meaning": "갑자기", "example": "The meeting ended abruptly when the fire alarm rang.", "translation": "화재 경보가 울리자 회의가 갑자기 끝났습니다."}, {"word": "absorbing", "meaning": "흥미진진한", "example": "The documentary was truly absorbing to watch.", "translation": "그 다큐멘터리는 보기에 정말 흥미진진했습니다."}, {"word": "admiringly", "meaning": "감탄하여", "example": "The audience looked admiringly at the painting.", "translation": "관중은 그 그림을 감탄하며 바라보았습니다."}, {"word": "at large", "meaning": "대체로, 전체적으로", "example": "The public at large supports the new policy.", "translation": "대중은 대체로 새로운 정책을 지지합니다."}, {"word": "boast about", "meaning": "~을 자랑하다", "example": "He always boasts about his expensive car.", "translation": "그는 항상 자신의 비싼 차를 자랑합니다."}, {"word": "coincide with", "meaning": "~와 동시에 일어나다", "example": "The sale will coincide with the grand opening.", "translation": "세일은 그랜드 오픈과 동시에 일어날 것입니다."}, {"word": "correspondent", "meaning": "특파원", "example": "The foreign correspondent reported from the city.", "translation": "해외 특파원이 그 도시에서 보도했습니다."}, {"word": "counterpart", "meaning": "상대방", "example": "I met my French counterpart to discuss the deal.", "translation": "나는 계약을 논의하기 위해 프랑스 측 상대방을 만났습니다."}, {"word": "defeat", "meaning": "패배시키다", "example": "They managed to defeat the strongest competitor.", "translation": "그들은 가장 강력한 경쟁자를 패배시키는 데 성공했습니다."}, {"word": "dominant", "meaning": "지배적인", "example": "The company has a dominant share in the market.", "translation": "그 회사는 시장에서 지배적인 점유율을 가지고 있습니다."}, {"word": "fabulous", "meaning": "굉장히 좋은", "example": "We had a fabulous dinner at the new restaurant.", "translation": "우리는 새 식당에서 굉장히 좋은 저녁을 먹었습니다."}, {"word": "fortify", "meaning": "강화하다", "example": "The vitamin helps fortify your immune system.", "translation": "그 비타민은 면역 체계를 강화하는 데 도움을 줍니다."}, {"word": "fundamental", "meaning": "기본적인", "example": "Trust is a fundamental part of any relationship.", "translation": "신뢰는 모든 관계의 기본적인 부분입니다."}, {"word": "mingle", "meaning": "섞이다", "example": "Guests began to mingle during the party.", "translation": "파티 동안 손님들이 서로 섞여 대화하기 시작했습니다."}, {"word": "nuisance", "meaning": "성가신 존재", "example": "The construction noise is a major nuisance.", "translation": "공사 소음은 큰 성가신 존재입니다."}, {"word": "preciously", "meaning": "까다롭게, 매우", "example": "He treats his private documents very preciously.", "translation": "그는 자신의 개인 서류들을 매우 소중히(까다롭게) 다룹니다."}, {"word": "stark", "meaning": "(차이가) 극명한", "example": "There is a stark difference between the 두 모델.", "translation": "두 모델 사이에는 극명한 차이가 있습니다."}, {"word": "steadiness", "meaning": "착실함", "example": "Her steadiness during the crisis was impressive.", "translation": "위기 동안 그녀의 침착함(착실함)은 인상적이었습니다."}, {"word": "alluring", "meaning": "유혹하는", "example": "The island offers many alluring views to tourists.", "translation": "그 섬은 관광객들에게 많은 유혹적인 풍경을 제공합니다."}, {"word": "assimilate", "meaning": "흡수하다, 동화되다", "example": "It is not easy to assimilate into a new society.", "translation": "새로운 사회에 동화되는 것은 쉽지 않습니다."}, {"word": "at all costs", "meaning": "무슨 일이 있어도", "example": "We must win this contract at all costs.", "translation": "우리는 무슨 일이 있어도 이 계약을 따내야 합니다."}, {"word": "await", "meaning": "기다리다", "example": "A bright future awaits you after graduation.", "translation": "졸업 후에 밝은 미래가 당신을 기다립니다."}, {"word": "captivate", "meaning": "마음을 사로잡다", "example": "Her performance captivated the entire audience.", "translation": "그녀의 공연은 모든 관중의 마음을 사로잡았습니다."}, {"word": "culminate in", "meaning": "결국 ~이 되다", "example": "Their efforts culminated in a final victory.", "translation": "그들의 노력은 결국 최종 승리로 이어졌습니다."}, {"word": "dissipat teriorate in the evening.", "translation": "저녁에 날씨가 악화되기 시작했습니다."}, {"word": "implicitly", "meaning": "암암리에", "example": "We implicitly agreed on the terms of the deal.", "translation": "우리는 거래 조건에 대해 암암리에 합의했습니다."}, {"word": "leisurely", "meaning": "느긋한", "example": "They enjoyed a leisurely lunch by the lake.", "translation": "그들은 호숫가에서 느긋한 점심을 즐겼습니다."}, {"word": "menace", "meaning": "위협하다", "example": "The hurricane began to menace the coast.", "translation": "허리케인이 해안을 위협하기 시작했습니다."}, {"word": "perceptible", "meaning": "인지할 수 있는", "example": "There was a perceptible improve in the economy.", "translation": "경제에 인지할 수 있는 개선이 있었습니다."}, {"word": "placement", "meaning": "배치", "example": "The placement of the furniture was perfect.", "translation": "가구 배치가 완벽했습니다."}, {"word": "remark", "meaning": "말하다", "example": "He remarked that the office was too small.", "translation": "그는 사무실이 너무 좁다고 말했습니다."}, {"word": "retrieval", "meaning": "복구", "example": "The retrieval of the documents was successful.", "translation": "서류들의 복구가 성공적이었습니다."}, {"word": "slowdown", "meaning": "경기 후퇴", "example": "The global slowdown affected the industry.", "translation": "세계적인 경기 후퇴가 업계에 영향을 미쳤습니다."}, {"word": "solitary", "meaning": "혼자의", "example": "He prefers a solitary life in the countryside.", "translation": "그는 시골에서의 혼자만의 삶을 선호합니다."}, {"word": "ailing", "meaning": "병든, 침체된", "example": "The government helped the ailing steel industry.", "translation": "정부는 침체된 철강 업계를 도왔습니다."}, {"word": "financial statement", "meaning": "재무제표", "example": "Please review the financial statement carefully.", "translation": "재무제표를 주의 깊게 검토해 주세요."}, {"word": "have a monopoly on", "meaning": "~의 독점권을 갖다", "example": "The company has a monopoly on the local water.", "translation": "그 회사는 현지 수돗물에 대한 독점권을 가지고 있습니다."}, {"word": "in demand", "meaning": "수요가 있는", "example": "Graphic designers are highly in demand now.", "translation": "그래픽 디자이너들은 지금 수요가 매우 많습니다."}, {"word": "multilateral", "meaning": "다국간의", "example": "They held a multilateral talk to solve the issue.", "translation": "그들은 문제를 해결하기 위해 다국간 회담을 열었습니다."}, {"word": "nontransferable", "meaning": "양도할 수 없는", "example": "The event ticket is nontransferable to others.", "translation": "행사 티켓은 타인에게 양도할 수 없습니다."}, {"word": "parent company", "meaning": "모회사", "example": "The parent company is based in London.", "translation": "모회사는 런던에 기반을 두고 있습니다."}, {"word": "privatization", "meaning": "민영화", "example": "The privatization of the post office is planned.", "translation": "우체국 민영화가 계획되어 있습니다."}, {"word": "rebound", "meaning": "회복하다", "example": "The stock market rebounded after the news.", "translation": "그 소식 이후 주식 시장이 회복되었습니다."}, {"word": "runner-up", "meaning": "2위, 차점자", "example": "He was the runner-up in the singing contest.", "translation": "그는 노래 경연 대회에서 2위를 차지했습니다."}, {"word": "secondary effect", "meaning": "부차적 영향", "example": "We must monitor the secondary effect of the tax.", "translation": "우리는 세금의 부차적 영향을 모니터링해야 합니다."}, {"word": "sluggish", "meaning": "불경기의", "example": "The economy remained sluggish all year long.", "translation": "경제는 일 년 내내 침체된(불경기) 상태였습니다."}, {"word": "stagnation", "meaning": "침체", "example": "Low productivity leads to economic stagnation.", "translation": "낮은 생산성은 경제 침체로 이어집니다."}, {"word": "volatile", "meaning": "심하게 변동하는", "example": "The volatile market conditions caused concern.", "translation": "변동성이 심한 시장 상황이 우려를 자아냈습니다."}, {"word": "automotive repair shop", "meaning": "자동차 수리점", "example": "I left my car at the automotive repair shop.", "translation": "나는 자동차 수리점에 차를 맡겼습니다."}, {"word": "awning", "meaning": "차양, 덮개", "example": "The shop has a green awning over the window.", "translation": "그 가게는 창문 위에 초록색 차양을 가지고 있습니다."}, {"word": "cash register", "meaning": "계산대", "example": "The clerk is standing by the cash register.", "translation": "점원이 계산대 옆에 서 있습니다."}, {"word": "cooking utensil", "meaning": "조리 기구", "example": "I need a new cooking utensil for the kitchen.", "translation es.", "translation": "프로젝트는 예상대로 아무 문제 없이 끝났습니다."}, {"word": "secondhand", "meaning": "중고의", "example": "I found a good secondhand desk online.", "translation": "나는 온라인에서 좋은 중고 책상을 찾았습니다."}, {"word": "stylishly", "meaning": "유행에 따르게", "example": "She always dresses stylishly for the office.", "translation": "그녀는 항상 사무실에 유행에 따르게(세련되게) 입고 옵니다."}, {"word": "at a substantial discount", "meaning": "엄청난 할인가에", "example": "We bought the TV at a substantial discount.", "translation": "우리는 그 TV를 엄청난 할인가에 샀습니다."}, {"word": "bargain over prices", "meaning": "가격을 흥정하다", "example": "Do not bargain over prices in this store.", "translation": "이 가게에서는 가격을 흥정하지 마세요."}, {"word": "embellish", "meaning": "장식하다", "example": "He tried to embellish the story with details.", "translation": "그는 세부 사항으로 이야기를 꾸미려 노력했습니다."}, {"word": "embroider", "meaning": "수놓다", "example": "She embroidered her name on the towel.", "translation": "그녀는 수건에 자신의 이름을 수놓았습니다."}, {"word": "equivalent", "meaning": "~에 상당하는", "example": "A pound is equivalent to about 450 grams.", "translation": "1파운드는 약 450그램에 상당합니다."}, {"word": "exhilarating", "meaning": "아주 신나는", "example": "The roller coaster was an exhilarating ride.", "translation": "롤러코스터는 아주 신나는 놀이기구였습니다."}, {"word": "exorbitant price", "meaning": "터무니없이 비싼 가격", "example": "The hotel charged an exorbitant price for water.", "translation": "호텔은 물값으로 터무니없이 비싼 가격을 청구했습니다."}, {"word": "exquisite", "meaning": "정교한", "example": "The museum has an exquisite collection of jade.", "translation": "박물관은 정교한 옥 수집품들을 가지고 있습니다."}, {"word": "extravagance", "meaning": "사치품", "example": "Her only extravagance is buying expensive shoes.", "translation": "그녀의 유일한 사치는 비싼 신발을 사는 것입니다."}, {"word": "lavish", "meaning": "사치스러운", "example": "They lived a lavish lifestyle in their villa.", "translation": "그들은 별장에서 사치스러운 생활 방식을 누렸습니다."}, {"word": "redeem", "meaning": "바꾸다, 상환하다", "example": "I want to redeem this coupon for a discount.", "translation": "나는 이 쿠폰을 할인으로 바꾸고 싶습니다."}, {"wo bers conferred about the new policy.", "translation": "이사회 위원들이 새로운 정책에 대해 협의했습니다."}, {"word": "disembark", "meaning": "내리다", "example": "Passengers were asked to disembark from the plane.", "translation": "승객들은 비행기에서 내려달라는 요청을 받았습니다."}, {"word": "dispense", "meaning": "나누어 주다", "example": "The machine dispenses coffee and tea automatically.", "translation": "그 기계는 커피와 차를 자동으로 나누어 줍니다(나옵니다)."}, {"word": "impound", "meaning": "압수하다", "example": "The police impounded the illegally parked vehicle.", "translation": "경찰은 불법 주차된 차량을 압수했습니다."}, {"word": "motion sickness", "meaning": "멀미", "example": "I always wear a patch to prevent motion sickness.", "translation": "나는 멀미를 예방하기 위해 항상 패치를 붙입니다."}, {"word": "prestigious", "meaning": "명성 있는", "example": "He graduated from a prestigious university in London.", "translation": "그는 런던의 명성 있는 대학교를 졸업했습니다."}, {"word": "quarantine desk", "meaning": "검역대", "example": "All travelers must pass through the quarantine desk.", "translation": "모든 여행객은 검역대를 통과해야 합니다."}, {"word": "remittance", "meaning": "송금", "example": "Please confirm the remittance of the payment.", "translation": "대금 송금을 확인해 주십시오."}, {"word": "swap", "meaning": "맞바꾸다", "example": "Can we swap seats so I can sit by the window?", "translation": "창가에 앉을 수 있게 자리를 바꿀 수 있을까요?"}, {"word": "turn up", "meaning": "나타나다", "example": "He didn't turn up for the important meeting.", "translation": "그는 중요한 회의에 나타나지 않았습니다."}, {"word": "vessel", "meaning": "대형 선박", "example": "The large cargo vessel entered the international port.", "translation": "대형 화물선이 국제항에 들어왔습니다."}, {"word": "It is no wonder (that)", "meaning": "~은 당연하다", "example": "It is no wonder that he won the grand prize.", "translation": "그가 대상을 받은 것은 당연합니다."}, {"word": "portray", "meaning": "그리다, 묘사하다", "example": "The book portrays the life of a famous artist.", "translation": "그 책은 유명한 예술가의 삶을 묘사합니다."}, {"word": "reinstall", "meaning": "재설치하다", "example": "I had to reinstall the software on my computer.", "translation": The new law was passed by the parliament today.", "translation": "새로운 법안이 오늘 국회를 통과했습니다."}, {"word": "peddler", "meaning": "행상인", "example": "A peddler was selling handmade jewelry on the street.", "translation": "한 행상인이 거리에서 수제 보석을 팔고 있었습니다."}, {"word": "price quote", "meaning": "견적서", "example": "I requested a price quote for the office furniture.", "translation": "나는 사무용 가구에 대한 견적서를 요청했습니다."}, {"word": "protocol", "meaning": "의정서", "example": "We must follow the official safety protocol.", "translation": "우리는 공식 안전 의정서(절차)를 따라야 합니다."}, {"word": "scarcity", "meaning": "부족", "example": "The scarcity of clean water is a global issue.", "translation": "깨끗한 물의 부족은 세계적인 문제입니다."}, {"word": "summit", "meaning": "정상 회담", "example": "World leaders gathered for the economic summit.", "translation": "세계 지도자들이 경제 정상 회담을 위해 모였습니다."}, {"word": "surrender", "meaning": "양도하다, 항복하다", "example": "The enemy finally decided to surrender their weapons.", "translation": "적군은 마침내 무기를 양도하기(항복하기)로 결정했습니다."}, {"word": "take an action against", "meaning": "~를 고소하다", "example": "They will take an action against the company.", "translation": "그들은 그 회사를 고소할(조치를 취할) 것입니다. (원형 유지)"}, {"word": "third party", "meaning": "제삼자", "example": "The contract was reviewed by a neutral third party.", "translation": "계약서는 중립적인 제삼자에 의해 검토되었습니다."}, {"word": "unsuccessful candidate", "meaning": "낙선 후보", "example": "The unsuccessful candidate thanked his supporters.", "translation": "낙선 후보는 자신의 지지자들에게 감사를 표했습니다."}, {"word": "freight", "meaning": "운송 화물", "example": "The company moved the freight by train.", "translation": "그 회사는 기차로 운송 화물을 옮겼습니다."}, {"word": "heritage", "meaning": "전통, 유산", "example": "We must preserve our cultural heritage.", "translation": "우리는 우리의 문화유산을 보존해야 합니다."}, {"word": "janitor", "meaning": "(건물) 관리인", "example": "The janitor cleaned the hallway every night.", "translation": "관리인은 매일 밤 복도를 청소했습니다."}, {"word": "loading dock", "meaning": "하역장", "example": "The delivery truck is at the loading dock.", "translation": "배달 트럭이 하역장에 있습니다."}, {"word": "logistics", "meaning": "물류, 실행 계획", "example": "He works in the logistics department.", "translation": "그는 물류 부서에서 일합니다."}, {"word": "realtor", "meaning": "부동산 중개업자", "example": "The realtor showed us several houses.", "translation": "부동산 중개업자가 우리에게 집 몇 채를 보여주었습니다."}, {"word": "registered mail", "meaning": "등기 우편", "example": "Please send this document by registered mail.", "translation": "이 서류를 등기 우편으로 보내주세요."}, {"word": "wheelbarrow", "meaning": "손수레", "example": "He moved the dirt using a wheelbarrow.", "translation": "그는 손수레를 사용하여 흙을 옮겼습니다."}, {"word": "classified", "meaning": "기밀의", "example": "These documents are marked as classified.", "translation": "이 서류들은 기밀로 분류되어 있습니다."}, {"word": "consulate", "meaning": "영사관", "example": "I visited the consulate to renew my visa.", "translation": "나는 비자를 갱신하기 위해 영사관을 방문했습니다."}, {"word": "decidedly", "meaning": "확실히, 명백히", "example": "The weather is decidedly colder today.", "translation": "오늘 날씨가 확실히 더 춥습니다."}, {"word": "inaugurate", "meaning": "정식으로 ~을 개시하다", "example": "The city will inaugurate the new park tomorrow.", "translation": "시는 내일 새로운 공원을 정식으로 개장할 것입니다."}, {"word": "institute", "meaning": "협회, 연구소", "example": "He works for a famous research institute.", "translation": "그는 유명한 연구소에서 일합니다."}, {"word": "institution", "meaning": "기관, 시설", "example": "This financial institution offers low interest.", "translation": "이 금융 기관은 낮은 이자를 제공합니다."}, {"word": "openly", "meaning": "터놓고, 솔직하게", "example": "They discussed the problem very openly.", "translation": "그들은 그 문제를 매우 솔직하게 논의했습니다."}, {"word": "oversight", "meaning": "부주의, 감독", "example": "The error was due to a simple oversight.", "translation": "그 오류는 단순한 부주의 때문이었습니다."}, {"word": "province", "meaning": "지방", "example": "He grew up in a small province in the south.", "translation": "그는 남쪽의 작은 지방에서 자랐습니다."}, {"word": "selective", "meaning": "선택적인, 까다로운", "example": "The club is very selective about its members.", "translation": "그 클럽은 회원에 대해 매우 까다롭습니다."}, {"word": "transportable", "meaning": "수송 가능한", "example": "The equipment is designed to be transportable.", "translation": "그 장비는 수송 가능하도록 설계되었습니다."}, {"word": "alumni association", "meaning": "동창회", "example": "I joined the university alumni association.", "translation": "나는 대학 동창회에 가입했습니다."}, {"word": "bilateral", "meaning": "쌍방의", "example": "The 두 국가 signed a bilateral agreement.", "translation": "두 국가는 쌍방(호혜) 협정에 서명했습니다."}, {"word": "diplomat", "meaning": "외교관", "example": "The diplomat negotiated the peace treaty.", "translation": "외교관이 평화 조약을 협상했습니다."}, {"word": "embargo", "meaning": "무역 금지", "example": "The government imposed an embargo on oil.", "translation": "정부는 석유에 대한 무역 금지 조치를 내렸습니다."}, {"word": "expatriate", "meaning": "국적을 상실한 사람", "example": "Many expatriates live in this international city.", "translation": "많은 해외 거주자(국적 상실자)들이 이 국제 도시에 삽니다."}, {"word": "expedite", "meaning": "신속히 처리하다", "example": "We need to expedite the delivery process.", "translation": "우리는 배송 과정을 신속히 처리해야 합니다."}, {"word": "handling", "meaning": "처리; 취급의", "example": "The handling fee is included in the price.", "translation": "취급 수수료가 가격에 포함되어 있습니다."}, {"word": "import license", "meaning": "수입 허가(서)", "example": "You must apply for an import license first.", "translation": "먼저 수입 허가서를 신청해야 합니다."}, {"word": "intended recipient", "meaning": "해당 수취인", "example": "Please deliver it to the intended recipient.", "translation": "그것을 해당 수취인에게 전달해 주세요."}, {"word": "progression", "meaning": "진행, 진전", "example": "We observed a steady progression in the project.", "translation": "우리는 프로젝트에서 꾸준한 진행을 관찰했습니다."}, {"word": "reciprocal", "meaning": "상호의", "example": "They have a reciprocal business arrangement.", "translation": "그들은 상호적인 비즈니스 협약을 맺고 있습니다."}, {"word": "stow", "meaning": "넣다, 싣다", "example": "Please stow your bags under the seat.", "translation": "가방을 좌석 아래에 넣어 주십시오."}, {"word": "surplus", "meaning": "잉여, 흑자", "example": "The company reported a budget surplus.", "translation": "그 회사는 예산 흑자를 기록했습니다."}, {"word": "cloakroom", "meaning": "휴대품 보관소", "example": "You can leave your coat in the cloakroom.", "translation": "외투를 휴대품 보관소에 맡기실 수 있습니다."}, {"word": "gourmet", "meaning": "미식가", "example": "This restaurant attracts many gourmet diners.", "translation": "이 식당은 많은 미식가 식객들을 끌어모읍니다."}, {"word": "grab a bite", "meaning": "간단히 먹다", "example": "Let's grab a bite before the meeting starts.", "translation": "회의 시작 전에 간단히 뭘 좀 먹읍시다."}, {"word": "help oneself to the food", "meaning": "자유로이 먹다", "example": "Please help oneself to the food at the buffet.", "translation": "뷔페에서 음식을 자유로이 가져다 드세요. (원형 유지)"}, {"word": "meal pass", "meaning": "식권", "example": "You need a meal pass to enter the cafeteria.", "translation": "구내식당에 들어가려면 식권이 필요합니다."}, {"word": "pick up the check", "meaning": "돈을 내다", "example": "My boss offered to pick up the check.", "translation": "제 상사가 음식값을 내겠다고 제안했습니다."}, {"word": "preheat", "meaning": "예열하다", "example": "You should preheat the oven to 180 degrees.", "translation": "오븐을 180도로 예열해야 합니다."}, {"word": "scoop", "meaning": "퍼내다", "example": "Use the large spoon to scoop the ice cream.", "translation": "큰 숟가락을 사용하여 아이스크림을 퍼내세요."}, {"word": "slurp", "meaning": "소리 내어 마시다", "example": "It is considered rude to slurp your soup.", "translation": "수프를 소리 내어 마시는 것은 무례한 것으로 여겨집니다."}, {"word": "wait on", "meaning": "시중을 들다", "example": "She has worked to wait on tables for years.", "translation": "그녀는 수년 동안 테이블 시중을 드는 일을 해왔습니다."}, {"word": "as a courtesy", "meaning": "호의를 담아, 무료로", "example": "We provide free water as a courtesy.", "translation": "저희는 호의로(무료로) 생수를 제공합니다. (원형 유지)"}, {"word": "forfeit", "meaning": "몰수당하다", "example": "If you cancel now, you will forfeit your deposit.", "translation": "지금 취소하시면 보증금을 몰수당하게 됩니다."}, {"word": "garner", "meaning": "얻다, 모으다", "example": "The new movie managed to garner much praise.", "translation": "그 새 영화는 많은 찬사를 얻어냈습니다."}, {"word": "themed", "meaning": "테마의 분위기를 살린", "example": "We visited a space-themed restaurant today.", "translation": "우리는 오늘 우주 테마의 식당을 방문했습니다."}, {"word": "thriving", "meaning": "번성하는", "example": "The small bakery became a thriving business.", "translation": "그 작은 빵집은 번창하는 사업체가 되었습니다."}, {"word": "assorted", "meaning": "여러 가지 종류의", "example": "I bought a box of assorted chocolates.", "translation": "나는 여러 종류가 섞인 초콜릿 한 상자를 샀습니다."}, {"word": "atrium", "meaning": "중앙 홀", "example": "The hotel has a beautiful glass atrium.", "translation": "그 호텔은 아름다운 유리 중앙 홀을 가지고 있습니다."}, {"word": "batch", "meaning": "무리, 집단", "example": "The baker made a fresh batch of cookies.", "translation": "제빵사가 쿠키 한 무더기(배치)를 갓 구웠습니다."}, {"word": "batter", "meaning": "반죽", "example": "Mix the batter until it is smooth.", "translation": "반죽이 부드러워질 때까지 섞으세요."}, {"word": "concierge", "meaning": "안내인", "example": "The concierge booked a taxi for the guest.", "translation": "안내인이 투숙객을 위해 택시를 예약했습니다."}, {"word": "corridor", "meaning": "복도", "example": "Her office is at the end of the corridor.", "translation": "그녀의 사무실은 복도 끝에 있습니다."}, {"word": "culinary", "meaning": "요리의", "example": "He is attending a famous culinary school.", "translation": "그는 유명한 요리 학교에 다니고 있습니다."}, {"word": "decaffeinated", "meaning": "카페인을 제거한", "example": "I prefer to drink decaffeinated coffee at night.", "translation": "나는 밤에 카페인을 제거한 커피를 마시는 것을 선호합니다."}, {"word": "double occupancy", "meaning": "2인실 사용", "example": "The rate is based on double occupancy.", "translation": "요금은 2인 1실 사용을 기준으로 합니다."}, {"word": "garnish", "meaning": "장식하다", "example": "The chef used parsley to garnish the dish.", "translation": "요리사는 요리를 장식하기 위해 파슬리를 사용했습니다."}, {"word": "indigenous", "meaning": "지역 고유의, 토착의", "example": "These are indigenous plants of this region.", "translation": "이것들은 이 지역의 토착 식물들입니다."}, {"word": "palate", "meaning": "미각", "example": "The spicy food was too strong for my palate.", "translation": "매운 음식이 제 미각에는 너무 강했습니다."}, {"word": "parlor", "meaning": "가게", "example": "We went to the ice cream parlor yesterday.", "translation": "우리는 어제 아이스크림 가게에 갔습니다."}, {"word": "room attendant", "meaning": "객실 청소부", "example": "The room attendant changed the towels.", "translation": "객실 청소부가 수건을 교체했습니다."}, {"word": "sanitary", "meaning": "위생의", "example": "It is important to keep the kitchen sanitary.", "translation": "주방을 위생적으로 유지하는 것이 중요합니다."}, {"word": "shut down", "meaning": "폐점하다", "example": "Many small shops were forced to shut down.", "translation": "많은 작은 가게들이 문을 닫아야(폐점해야) 했습니다."}, {"word": "sift", "meaning": "체로 치다", "example": "You should sift the flour before baking.", "translation": "베이킹하기 전에 밀가루를 체로 쳐야 합니다."}, {"word": "coil", "meaning": "똘똘 감다", "example": "Please coil the rope neatly on the floor.", "translation": "밧줄을 바닥에 깔끔하게 감아 주세요."}, {"word": "make forecast", "meaning": "예측하다", "example": "Economists make forecast about the growth.", "translation": "경제학자들이 성장에 대해 예측합니다. (원형 유지)"}, {"word": "retrieve", "meaning": "되찾다", "example": "I need to retrieve my files from the server.", "translation": "나는 서버에서 내 파일들을 되찾아야(검색해야) 합니다."}, {"word": "uncover", "meaning": "알아내다", "example": "The investigation helped to uncover the truth.", "translation": "조사가 진실을 알아내는 데 도움이 되었습니다."}, {"word": "distributor", "meaning": "분배자, 판매자", "example": "We are looking for a local distributor.", "translation": "우리는 지역 판매 대리점(분배자)을 찾고 있습니다."}, {"word": "estimated", "meaning": "견적의, 추측의", "example": "The estimated cost of the project is high.", "translation": "그 프로젝트의 추정 비용은 높습니다."}, {"word": "financier", "meaning": "재정가, 재무관", "example": "The project was funded by a wealthy financier.", "translation": "그 프로젝트는 부유한 재정가에 의해 자금이 지원되었습니다."}, {"word": "gratified", "meaning": "만족한, 기뻐하는", "example": "He was gratified by the positive feedback.", "translation": "그는 긍정적인 피드백에 기뻐했습니다."}, {"word": "hollow", "meaning": "속이 빈", "example": "The sound came from a hollow wooden pipe.", "translation": "그 소리는 속이 빈 나무 파이프에서 났습니다."}, {"word": "immeasurably", "meaning": "헤아릴 수 없을 정도로", "example": "Technology has improved immeasurably.", "translation": "기술은 헤아릴 수 없을 정도로 향상되었습니다."}, {"word": "indicated", "meaning": "계기에 표시된", "example": "The level is indicated by the red line.", "translation": "수치는 빨간 선으로 표시되어 있습니다."}, {"word": "indicative", "meaning": "나타내는, 암시하는", "example": "High sales are indicative of a good product.", "translation": "높은 매출은 좋은 제품임을 나타냅니다."}, {"word": "literally", "meaning": "문자 그대로", "example": "He literally translated every single word.", "translation": "그는 모든 단어를 문자 그대로 번역했습니다."}, {"word": "minimally", "meaning": "최소한으로", "example": "The patient was only minimally affected.", "translation": "그 환자는 아주 최소한으로만 영향을 받았습니다."}, {"word": "outpace", "meaning": "앞지르다", "example": "Demand will soon outpace the current supply.", "translation": "수요가 곧 현재의 공급을 앞지를 것입니다."}, {"word": "outsell", "meaning": "~보다 많이 팔다", "example": "This model continues to outsell all others.", "translation": "이 모델은 다른 모든 것들보다 계속해서 더 많이 팔립니다."}, {"word": "proportionate", "meaning": "비례하는", "example": "The reward should be proportionate to the effort.", "translation": "보상은 노력에 비례해야 합니다."}, {"word": "rewarding", "meaning": "보답을 받는", "example": "Teaching is a very rewarding career for him.", "translation": "가르치는 것은 그에게 매우 보람 있는(보답을 받는) 직업입니다."}, {"word": "signify", "meaning": "의미하다", "example": "A red light usually signifies a stop.", "translation": "빨간불은 보통 정지를 의미합니다."}, {"word": "steeply", "meaning": "가파르게", "example": "The prices of houses have risen steeply.", "translation": "주택 가격이 가파르게 올랐습니다."}, {"word": "subside", "meaning": "가라앉다", "example": "The storm began to subside in the evening.", "translation": "폭풍이 저녁에 가라앉기 시작했습니다."}, {"word": "swell", "meaning": "부풀다", "example": "My ankle started to swell after the fall.", "translation": "넘어진 후에 발목이 부풀어 오르기 시작했습니다."}, {"word": "terminology", "meaning": "전문 용어", "example": "It is hard to understand the medical terminology.", "translation": "의학 전문 용어를 이해하는 것은 어렵습니다."}, {"word": ng": "엄격히, 엄중하게", "example": "The rules were stringently enforced by the manager.", "translation": "규칙들이 매니저에 의해 엄격하게 집행되었습니다."}, {"word": "year-end", "meaning": "연말의", "example": "We are busy preparing for the year-end party.", "translation": "우리는 연말 파티 준비로 바쁩니다."}, {"word": "make the first move", "meaning": "개시하다, 발단을 만들다", "example": "We are waiting for the company to make the first move.", "translation": "우리는 회사가 먼저 움직이기(개시하기)를 기다리고 있습니다."}, {"word": "take a turn for the better", "meaning": "호전되다", "example": "Fortunately, the patient's condition took a turn for the better.", "translation": "다행히 환자의 상태가 호전되었습니다."}, {"word": "warm-up", "meaning": "준비 운동, 예행연습", "example": "The athletes began their warm-up exercises before the game.", "translation": "선수들은 경기 전에 준비 운동을 시작했습니다."}, {"word": "be contingent upon", "meaning": "~에 따라 결정되다, ~에 달려 있다", "example": "The project's success be contingent upon your support.", "translation": "프로젝트의 성공은 당신의 지원에 달려 있습니다. (원형 유지)"}, {"word": "established", "meaning": "확립된, 정평이 있는", "example": "He is an established expert in the field of medicine.", "translation": "그는 의학 분야에서 정평이 나 있는 전문가입니다."}, {"word": "favorable", "meaning": "호의적인", "example": "The new product received very favorable reviews.", "translation": "신제품은 매우 호의적인 평가를 받았습니다."}, {"word": "front-runner", "meaning": "가장 유력한 우승 후보", "example": "She is currently the front-runner in the election.", "translation": "그녀는 현재 선거에서 가장 유력한 후보입니다."}, {"word": "intermittently", "meaning": "간헐적으로", "example": "It has been raining intermittently all day today.", "translation": "오늘 하루 종일 비가 간헐적으로 내리고 있습니다."}, {"word": "momentarily", "meaning": "잠깐", "example": "Please hold the line; she will be with you momentarily.", "translation": "잠시만 기다려 주세요. 그녀가 곧 당신과 함께할 것입니다."}, {"word": "narrative", "meaning": "(소설 속 사건들에 대한) 기술, 묘사", "example": "The author provided a compelling narrative of the event.", "translation": "작가는 사건에 대한 설득력 있는 묘사(기술)를 제공했습니다."}, {"word": "neutral", "meaning": "중립적인", "example": "The reporter tried to maintain a neutral point of view.", "translation": "기자는 중립적인 관점을 유지하려 노력했습니다."}, {"word": "retreat", "meaning": "후퇴하다, 물러나다", "example": "The army was forced to retreat after the heavy loss.", "translation": "군대는 큰 손실을 입은 후 후퇴해야만 했습니다."}, {"word": "stance", "meaning": "태도, 입장", "example": "The government has a firm stance on trade policies.", "translation": "정부는 무역 정책에 대해 확고한 입장을 가지고 있습니다."}, {"word": "allegedly", "meaning": "주장하는 바에 따르면", "example": "He allegedly stole the documents from the office.", "translation": "주장하는 바에 따르면, 그는 사무실에서 서류를 훔쳤습니다."}, {"word": "be oriented to", "meaning": "~에 중점을 두다", "example": "The program be oriented to practical job skills.", "translation": "그 프로그램은 실무적인 직업 기술에 중점을 두고 있습니다. (원형 유지)"}, {"word": "beware", "meaning": "조심하다", "example": "Beware of pickpockets in crowded tourist areas.", "translation": "붐비는 관광지에서는 소매치기를 조심하십시오."}, {"word": "clout", "meaning": "영향력, 권력", "example": "The CEO has a lot of political clout in the city.", "translation": "CEO는 도시에서 많은 정치적 영향력을 가지고 있습니다."}, {"word": "craftsmanship", "meaning": "솜씨", "example": "The detailed carvings show excellent craftsmanship.", "translation": "상세한 조각들은 훌륭한 솜씨를 보여줍니다."}, {"word": "detector", "meaning": "탐지기, 측정기", "example": "We installed a smoke detector in the hallway.", "translation": "우리는 복도에 연기 탐지기를 설치했습니다."}, {"word": "exemplify", "meaning": "예증하다, ~의 좋은 예가 되다", "example": "This painting exemplifies the artist's unique style.", "translation": "이 그림은 화가의 독특한 스타일을 잘 보여줍니다(예증합니다)."}, {"word": "exert pressure on", "meaning": "~에 압력을 행사하다", "example": "Investors began to exert pressure on the board.", "translation": "투자자들이 이사회에 압력을 행사하기 시작했습니다. (원형 유지)"}, {"word": "interfere with", "meaning": "~을 방해하다", "example": "Noise can easily interfere with your concentration.", "translation": "소음은 당신의 집중을 쉽게 방해할 수 있습니다. (원형 유지)"}, {"word": "keep on top of", "meaning": "~의 선두를 유지하다", "example": "We work hard to keep on top of the market trends.", "tr ing": "~에 받쳐 놓다", "example": "I decided to prop against the wall my bicycle.", "translation": "나는 내 자전거를 벽에 받쳐 놓기로 했습니다. (원형 유지)"}, {"word": "run late", "meaning": "늦게 하다, 늦게 도착하다", "example": "I am sorry, but the meeting is running late today.", "translation": "죄송하지만, 오늘 회의가 늦어지고 있습니다."}, {"word": "sit through", "meaning": "끝까지 자리를 지키다", "example": "It was hard to sit through the long presentation.", "translation": "긴 발표 동안 끝까지 자리를 지키는 것은 힘들었습니다."}, {"word": "stand on", "meaning": "~에 기초하다, ~에 의거하다", "example": "Their argument stands on very weak evidence.", "translation": "그들의 주장은 매우 빈약한 증거에 기초하고 있습니다."}, {"word": "symposium", "meaning": "토론회, 심포지엄", "example": "The international symposium will start tomorrow.", "translation": "국제 심포지엄이 내일부터 시작될 것입니다."}, {"word": "consenting", "meaning": "동의하는, 승낙하는", "example": "Both consenting parties signed the final contract.", "translation": "동의한 양측 모두가 최종 계약서에 서명했습니다."}, {"word": "conversationally", "meaning": "담화로, 회화체로", "example": "He explained the complex rules very conversationally.", "translation": "그는 복잡한 규칙들을 매우 대화하듯이(회화체로) 설명했습니다."}, {"word": "eloquent", "meaning": "웅변을 잘 하는", "example": "She gave an eloquent speech about human rights.", "translation": "그녀는 인권에 대해 감명 깊은(웅변조의) 연설을 했습니다."}, {"word": "faction", "meaning": "파벌, 당파", "example": "There is a small faction within the political party.", "translation": "정당 내에 작은 파벌이 하나 있습니다."}, {"word": "illegible", "meaning": "읽기 어려운", "example": "His handwriting is so messy that it is illegible.", "translation": "그의 글씨체는 너무 엉망이라 읽기가 어렵습니다."}, {"word": "presumably", "meaning": "아마, 생각건대", "example": "Presumably, the flight was cancelled due to fog.", "translation": "아마도, 안개 때문에 비행기가 취소된 것 같습니다."}, {"word": "abbreviate", "meaning": "요약하다, 단축하다", "example": "You can abbreviate \"United Kingdom\" to \"UK\".", "translation": "\"United Kingdom\"을 \"UK\"로 단축(줄여 쓸) 수 있습니다."}, {"word": "abridgment", "meaning": "요약본, 요약", "example": "I read an abridgment of the famous classic novel." dially", "meaning": "진심으로, 성심성의껏", "example": "You are cordially invited to the opening ceremony.", "translation": "당신을 개회식에 진심으로 초대합니다."}, {"word": "delicate", "meaning": "민감한, 세심한 주의가 필요한", "example": "The device is very delicate and breaks easily.", "translation": "그 장치는 매우 민감하여 쉽게 부서집니다."}, {"word": "designation", "meaning": "지정, 지명", "example": "The city received a special designation as a landmark.", "translation": "그 도시는 랜드마크로서 특별한 지정을 받았습니다."}, {"word": "intent", "meaning": "의지, 목적; 열심인", "example": "He expressed his intent to resign from the board.", "translation": "그는 이사회에서 사임하겠다는 의사를 표명했습니다."}, {"word": "irreversible", "meaning": "되돌릴 수 없는", "example": "Some types of environmental damage are irreversible.", "translation": "어떤 종류의 환경 파괴는 되돌릴 수 없습니다."}, {"word": "lingering", "meaning": "오래끄는, 오래가는", "example": "I still have a lingering doubt about the final plan.", "translation": "나는 여전히 최종 계획에 대해 오래가는(남아 있는) 의구심이 있습니다."}, {"word": "lose oneself in", "meaning": "~에 몰두하다", "example": "It is easy to lose oneself in a very good book.", "translation": "아주 좋은 책에 몰두하는 것은 쉽습니다. (원형 유지)"}, {"word": "perpetual", "meaning": "끊임없이 계속되는", "example": "The machine was designed for perpetual operation.", "translation": "그 기계는 끊임없는 작동을 위해 설계되었습니다."}, {"word": "tolerant", "meaning": "관대한, 아량 있는", "example": "The manager is very tolerant of minor errors.", "translation": "매니저는 가벼운 실수에 대해 매우 관대합니다."}, {"word": "degrade", "meaning": "(품위·지위 등을) 떨어뜨리다", "example": "High levels of pollution will degrade the air quality.", "translation": "높은 수치의 오염은 공기의 질을 떨어뜨릴 것입니다."}, {"word": "demote", "meaning": "강등시키다", "example": "He was demoted for failing to meet the targets.", "translation": "그는 목표 달성 실패로 강등되었습니다."}, {"word": "deploy", "meaning": "배치하다", "example": "The company decided to deploy new software today.", "translation": "회사는 오늘 새로운 소프트웨어를 배치하기로 했습니다."}, {"word": "dignitary", "meaning": "고위 인사", "example": "Several foreign dignitaries attended the forum.", "translation": "여러 명의 외국 고위 인사들이 포럼에 참석했습니다."}, {"word": "disorient", "meaning": "혼란스럽게 하다", "example": "The bright lights and noise can disorient visitors.", "translation": "밝은 조명과 소음은 방문객들을 혼란스럽게 할 수 있습니다."}, {"word": "extraordinary feat", "meaning": "놀랄 만한 업적", "example": "Building the skyscraper was an extraordinary feat.", "translation": "고층 빌딩을 짓는 것은 놀랄 만한 업적이었습니다."}, {"word": "forage", "meaning": "찾아다니다", "example": "The team had to forage for data in old archives.", "translation": "팀은 오래된 기록 보관소에서 데이터를 찾아다녀야 했습니다."}, {"word": "gratis", "meaning": "무료로", "example": "The hotel provides free Wi-Fi gratis to all guests.", "translation": "호텔은 모든 투숙객에게 와이파이를 무료로 제공합니다."}, {"word": "hurdle", "meaning": "곤란한 문제, 장애", "example": "Finding an investor is the biggest hurdle we face.", "translation": "투자자를 찾는 것이 우리가 직면한 가장 큰 장애물입니다."}, {"word": "immensity", "meaning": "광대함, 엄청난 크기", "example": "I was overwhelmed by the immensity of the task.", "translation": "나는 그 업무의 엄청난 크기에 압도되었습니다."}, {"word": "in defiance of", "meaning": "~에 반항하여", "example": "They went ahead in defiance of the official warning.", "translation": "그들은 공식적인 경고에 반항하여(무시하고) 강행했습니다."}, {"word": "in one's grasp", "meaning": "~의 수중에", "example": "The victory was finally in one's grasp tonight.", "translation": "마침내 오늘 밤 승리가 수중에 들어왔습니다. (원형 유지)"}, {"word": "incumbent", "meaning": "현직의", "example": "The incumbent mayor is running for reelection.", "translation": "현직 시장이 재선에 출마하고 있습니다."}, {"word": "miscellaneous", "meaning": "다양한", "example": "The box was filled with miscellaneous office items.", "translation": "그 상자는 다양한 사무용품들로 가득 차 있었습니다."}, {"word": "reinstate", "meaning": "복직시키다", "example": "The board voted to reinstate the manager today.", "translation": "이사회는 오늘 매니저를 복직시키기로 투표했습니다."}, {"word": "scuff", "meaning": "마모시키다", "example": "Be careful not to scuff the new leather shoes.", "translation": "새 가죽 신발을 마모시키지 않도록 조심하세요."}, {"word": "shred", "meaning": "갈기갈기 찢다", "example": "You must shred all confidential documents.", "translation": "모든 기밀 서류는 갈기갈기 찢어(파쇄해)야 합니다."}, {"word": "underpass", "meaning": "지하도", "example": "Use the underpass to cross the busy highway safely.", "translation": "바쁜 고속도로를 안전하게 건너려면 지하도를 이용하세요."}, {"word": "unwind", "meaning": "(긴장을) 풀다", "example": "Listening to music helps me unwind after work.", "translation": "음악을 듣는 것은 퇴근 후 긴장을 푸는 데 도움이 됩니다."}, {"word": "upbeat", "meaning": "낙관적인", "example": "The CEO gave an upbeat report on the growth.", "translation": "CEO는 성장에 대해 낙관적인 보고를 했습니다."}, {"word": "be towed away", "meaning": "(차가) 견인되다", "example": "Your car will be towed away if you park here.", "translation": "여기에 주차하면 차가 견인될 것입니다. (원형 유지)"}, {"word": "bicycle rack", "meaning": "자전거 보관대", "example": "Please leave your bike at the bicycle rack.", "translation": "자전거를 자전거 보관대에 두십시오."}, {"word": "carriage", "meaning": "차량, 객차", "example": "The last carriage of the train was empty today.", "translation": "오늘 열차의 마지막 객차는 비어 있었습니다."}, {"word": "fuel-efficient", "meaning": "연료 효율이 높은", "example": "We decided to buy a more fuel-efficient car.", "translation": "우리는 연료 효율이 더 높은 차를 사기로 했습니다."}, {"word": "navigate", "meaning": "길을 찾다", "example": "It is hard to navigate the narrow city streets.", "translation": "좁은 도시 거리에서 길을 찾는 것은 어렵습니다."}, {"word": "overnight express", "meaning": "심야 고속", "example": "I sent the package via overnight express mail.", "translation": "나는 그 소포를 심야 고속 우편으로 보냈습니다."}, {"word": "pass by", "meaning": "지나가다", "example": "I watched many people pass by the shop window.", "translation": "나는 많은 사람이 상점 유리창을 지나가는 것을 보았습니다."}, {"word": "passerby", "meaning": "행인", "example": "A friendly passerby helped me find the station.", "translation": "친절한 행인이 내가 역을 찾는 것을 도와주었습니다."}, {"word": "pave", "meaning": "(도로를) 포장하다", "example": "They are planning to pave the road next week.", "translation": "그들은 다음 주에 도로를 포장할 계획입니다."}, {"word": "pedestrian", "meaning": "보행자", "example": "This bridge is strictly for pedestrians only.", "translation": "이 다리는 엄격히 보행자 전용입니다."}, {"word": "pull into", "meaning": "(배가 항구에) 서다", "example": "The large vessel will pull into the port at noon.", "translation": "대형 선박이 정오에 항구에 들어올(설) 것입니다."}, {"word": "sidewalk", "meaning": "보도", "example": "Please do not ride your bicycle on the sidewalk.", "translation": "보도 위에서 자전거를 타지 마십시오."}, {"word": "specialist", "meaning": "전문가, 전공자", "example": "We need to consult a specialist about this.", "translation": "우리는 이것에 대해 전문가와 상담해야 합니다."}, {"word": "spoke", "meaning": "바퀴살", "example": "One of the spokes on my bike wheel is broken.", "translation": "내 자전거 바퀴살 중 하나가 부러졌습니다."}, {"word": "streetcar", "meaning": "전차", "example": "The old city is famous for its wooden streetcars.", "translation": "그 구시가지는 나무로 된 전차로 유명합니다."}, {"word": "towing service", "meaning": "견인 서비스", "example": "I had to call a towing service for my car.", "translation": "나는 차 때문에 견인 서비스를 불러야 했습니다."}, {"word": "wagon", "meaning": "화물 기차", "example": "The heavy goods were loaded onto the wagon.", "translation": "무거운 짐들이 화물차(짐마차)에 실렸습니다."}, {"word": "bear", "meaning": "~을 몸에 지니다", "example": "You must bear your identification at all times.", "translation": "당신은 항상 신분증을 몸에 지니고 있어야 합니다."}, {"word": "emphatic", "meaning": "단호한, 강한", "example": "The manager was emphatic about the new rules.", "translation": "매니저는 새로운 규칙에 대해 단호했습니다."}, {"word": "hastily", "meaning": "급히, 서둘러서", "example": "He hastily wrote down the message on paper.", "translation": "그는 급히 종이에 메시지를 적었습니다."}, {"word": "inconveniently", "meaning": "불편하게", "example": "The store is inconveniently located far away.", "translation": "그 상점은 불편하게도 멀리 위치해 있습니다."}, {"word": "necessitate", "meaning": "~을 필요하게 만들다", "example": "The growth will necessitate hiring more staff.", "translation": "성장은 더 많은 직원을 채용하는 것을 필요하게 만들 것입니다."}, {"word": "opposition", "meaning": "반대, 대항", "example": "There is a lot of opposition to the new tax.", "translation": "새로운 세금에 대한 많은 반대가 있습니다."}, {"word": "ridership", "meaning": "이용자 수", "example": "The bus ridership ample": "She is a top contender for the championship.", "translation": "그녀는 챔피언십의 유력한 경쟁자입니다."}, {"word": "counterfeit", "meaning": "가짜, 모조품", "example": "The police seized a large amount of counterfeit cash.", "translation": "경찰이 막대한 양의 위조(가짜) 현금을 압수했습니다."}, {"word": "credit money to one's account", "meaning": "~의 계좌에 돈을 입금하다", "example": "The firm will credit money to one's account.", "translation": "회사가 계좌에 돈을 입금할 것입니다. (원형 유지)"}, {"word": "deposit slip", "meaning": "예금 전표", "example": "Please fill out the deposit slip at the bank.", "translation": "은행에서 예금 전표를 작성해 주십시오."}, {"word": "deterrent", "meaning": "제지하는 것", "example": "High fines act as a deterrent to speeding.", "translation": "높은 벌금은 과속을 제지하는 것으로 작용합니다."}, {"word": "direct deposit", "meaning": "은행 자동 이체", "example": "My salary is paid every month via direct deposit.", "translation": "내 급여는 매달 자동 이체로 지급됩니다."}, {"word": "draw a check", "meaning": "수표를 발행하다", "example": "I will draw a check for the full amount today.", "translation": "내가 오늘 전액에 대해 수표를 발행하겠습니다."}, {"word": "fortnight", "meaning": "2주간", "example": "We will be away on a trip for a fortnight.", "translation": "우리는 2주 동안 여행을 떠날 것입니다."}, {"word": "on standby", "meaning": "대기 중인", "example": "The rescue team is on standby for emergencies.", "translation": "구조 팀이 비상 상황을 대비해 대기 중입니다."}, {"word": "spurious", "meaning": "허위의, 잘못된", "example": "He made spurious claims about his past success.", "translation": "그는 과거의 성공에 대해 허위 주장을 했습니다."}, {"word": "trust company", "meaning": "신탁 회사", "example": "We hired a trust company to manage the estate.", "translation": "우리는 유산 관리를 위해 신탁 회사를 고용했습니다."}, {"word": "trustee", "meaning": "수탁자", "example": "The trustee was responsible for the fund.", "translation": "수탁자가 그 자금을 책임지고 있었습니다."}, {"word": "wire money to", "meaning": "~에게 송금하다", "example": "I need to wire money to my sister in Tokyo.", "translation": "나는 도쿄에 있는 여동생에게 송금해야 합니다."}, {"word": "wire transfer", "meaning": "전신 송금", "example": "We paid for the furniture by wire transfer.", "translation": "우리는 전신 송금으로 가구 대금을 지불했습니다."}, {"word": "cost estimate", "meaning": "원가 견적", "example": "Please provide a cost estimate for the repairs.", "translation": "수리비에 대한 원가 견적을 제공해 주십시오."}, {"word": "dispatch", "meaning": "발송하다", "example": "We will dispatch the order as soon as possible.", "translation": "가능한 한 빨리 주문품을 발송하겠습니다."}, {"word": "faithfully", "meaning": "충실하게", "example": "He faithfully served the company for 30 years.", "translation": "그는 30년 동안 회사를 충실하게 섬겼습니다."}, {"word": "impair", "meaning": "손상시키다", "example": "Alcohol can impair your ability to drive safely.", "translation": "알코올은 안전하게 운전하는 능력을 손상시킬 수 있습니다."}, {"word": "in the vicinity of", "meaning": "~의 부근에", "example": "There is a park in the vicinity of the office.", "translation": "사무실 부근에 공원이 하나 있습니다."}, {"word": "outlying", "meaning": "외진, 변경의", "example": "They built a factory in the outlying area.", "translation": "그들은 외곽(외진) 지역에 공장을 지었습니다."}, {"word": "play a role in", "meaning": "~에 한몫하다", "example": "Luck can often play a role in business success.", "translation": "운이 종종 사업 성공에 한몫할 수 있습니다."}, {"word": "approximation", "meaning": "근사치", "example": "This figure is a rough approximation of sales.", "translation": "이 수치는 매출의 대략적인 근사치입니다."}, {"word": "attainable", "meaning": "이룰 수 있는", "example": "We need to set attainable targets for the team.", "translation": "우리는 팀을 위해 이룰 수 있는 목표를 세워야 합니다."}, {"word": "courteousness", "meaning": "예의 바름", "example": "I was impressed by the courteousness of the staff.", "translation": "직원들의 예의 바름에 감명받았습니다."}, {"word": "devalued", "meaning": "평가 절하된", "example": "The currency has been devalued by 10 percent.", "translation": "통화 가치가 10% 평가 절하되었습니다."}, {"word": "dividend", "meaning": "배당금", "example": "The company paid a high dividend to its owners.", "translation": "회사는 소유주들에게 높은 배당금을 지급했습니다."}, {"word": "fictitious", "meaning": "허구의, 지어낸", "example": "The author used fictitious names in the book.", "translation": "작가는 책에서 가
