const S = {
  series:900, filter:'all', idx:0, pool:[],
  u900:new Set(), u800:new Set(),
  lSeries:900, lPage:1, lQ:'', lFilter:'all',
  dSeries:900, selDay:null,
  qSeries:900, qRange:'all', qType:'word', qCount:10,
  qList:[], qIdx:0, qScore:0, qAnswered:false,
};
const RPP = 30;

function curData(){ return S.series===900?VOCAB_900:VOCAB_800; }
function curU(){ return S.series===900?S.u900:S.u800; }
function dSize(){ return S.series===900?32:68; }

function loadProg(){
  try{
    S.u900 = new Set(JSON.parse(localStorage.getItem('u900')||'[]'));
    S.u800 = new Set(JSON.parse(localStorage.getItem('u800')||'[]'));
  }catch(e){}
}
function persist(){
  localStorage.setItem('u900',JSON.stringify([...S.u900]));
  localStorage.setItem('u800',JSON.stringify([...S.u800]));
}
function saveProgress(){
  persist();
  const u=curU(), d=curData();
  alert('✅ 저장 완료!\n학습: '+(d.length-u.size)+'개 / 총 '+d.length+'개\n모르는 단어: '+u.size+'개');
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildPool(){
  const d=curData(), u=curU();
  let idx=d.map((_,i)=>i);
  if(S.filter==='unknown') idx=idx.filter(i=>u.has(i));
  else if(S.filter==='known') idx=idx.filter(i=>!u.has(i));
  S.pool=shuffle(idx); S.idx=0;
  document.getElementById('filterCount').textContent=S.pool.length+'개';
}

function renderCard(){
  if(!S.pool.length){
    document.getElementById('sWordEn').textContent='단어 없음';
    document.getElementById('sWordKo').textContent='필터를 변경해 주세요';
    document.getElementById('sExEn').textContent='';
    document.getElementById('sExKo').textContent='';
    return;
  }
  const ri=S.pool[S.idx], d=curData()[ri], u=curU(), ds=dSize();
  document.getElementById('sWordNum').textContent=(S.idx+1)+' / '+S.pool.length;
  document.getElementById('sDayBadge').textContent=Math.ceil((ri+1)/ds)+'일차';
  document.getElementById('sWordEn').textContent=d.word;
  document.getElementById('sWordKo').textContent=d.meaning;
  document.getElementById('sExEn').textContent=d.example;
  document.getElementById('sExKo').textContent=d.translation;
  document.getElementById('starBtn').classList.toggle('on',u.has(ri));
  updateSide();
}

function updateSide(){
  const d=curData(), u=curU(), ds=dSize();
  const ri=S.pool[S.idx]??0;
  const dayNum=Math.ceil((ri+1)/ds);
  const dayStart=(dayNum-1)*ds+1, dayEnd=Math.min(dayNum*ds,d.length);
  const learned=d.length-u.size;
  const pct=Math.round(learned/d.length*100);
  document.getElementById('sideUnknown').textContent=u.size;
  document.getElementById('sideCurDay').textContent=dayNum+'일차';
  document.getElementById('sideDayInfo').textContent=dayStart+'~'+dayEnd+'번';
  document.getElementById('progLearned').textContent=learned;
  document.getElementById('progTotal').textContent=d.length;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
}

function nextWord(){ if(S.pool.length){S.idx=(S.idx+1)%S.pool.length;renderCard();} stopTimer(); }
function prevWord(){ if(S.pool.length){S.idx=(S.idx-1+S.pool.length)%S.pool.length;renderCard();} stopTimer(); }
function toggleStar(){
  if(!S.pool.length) return;
  const ri=S.pool[S.idx], u=curU();
  if(u.has(ri)) u.delete(ri); else u.add(ri);
  persist(); renderCard();
}

function speakText(text, lang){
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang=lang; utt.rate=0.85;
  if(lang==='en-GB'){
    const voices=speechSynthesis.getVoices();
    const v=voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en-GB'));
    if(v) utt.voice=v;
  }
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}
function speakWord(lang){
  if(!S.pool.length) return;
  speakText(curData()[S.pool[S.idx]].word, lang);
}
function speakEx(lang){
  if(!S.pool.length) return;
  const ex=curData()[S.pool[S.idx]].example;
  if(ex) speakText(ex, lang);
}

let timerH=null;
function startTimer(){
  stopTimer();
  let sec=parseInt(document.getElementById('timerSec').value)||5;
  const el=document.getElementById('timerDisp');
  el.style.display='inline-block'; el.textContent=sec+'초';
  timerH=setInterval(()=>{ sec--; el.textContent=sec+'초'; if(sec<=0){stopTimer();nextWord();} },1000);
}
function stopTimer(){
  clearInterval(timerH);
  document.getElementById('timerDisp').style.display='none';
}

function setSeries(s){
  S.series=s;
  document.getElementById('btnS900').className='btn btn-sm'+(s===900?' btn-p':'');
  document.getElementById('btnS800').className='btn btn-sm'+(s===800?' btn-p':'');
  buildPool(); renderCard();
}
function setFilter(f){ S.filter=f; buildPool(); renderCard(); }
function shuffleNow(){ buildPool(); renderCard(); }

function setListSeries(s){
  S.lSeries=s; S.lPage=1; S.lQ='';
  document.getElementById('searchInp').value='';
  document.getElementById('lBtnS900').className='btn btn-sm'+(s===900?' btn-p':'');
  document.getElementById('lBtnS800').className='btn btn-sm'+(s===800?' btn-p':'');
  renderList();
}
function doSearch(){
  S.lQ=document.getElementById('searchInp').value.toLowerCase();
  S.lFilter=document.getElementById('listFilter').value;
  S.lPage=1; renderList();
}
function renderList(){
  const d=S.lSeries===900?VOCAB_900:VOCAB_800;
  const u=S.lSeries===900?S.u900:S.u800;
  let rows=d.map((v,i)=>Object.assign({},v,{i}));
  if(S.lQ) rows=rows.filter(v=>v.word.toLowerCase().includes(S.lQ)||v.meaning.includes(S.lQ));
  if(S.lFilter==='unknown') rows=rows.filter(v=>u.has(v.i));
  document.getElementById('listCount').textContent=rows.length+'개';
  const start=(S.lPage-1)*RPP;
  const page=rows.slice(start,start+RPP);
  document.getElementById('listBody').innerHTML=page.map(v=>`
    <tr>
      <td style="color:var(--hint);font-size:12px">${v.i+1}</td>
      <td style="font-weight:600;color:var(--primary)">${v.word}<br><small style="color:var(--sub)">${v.meaning}</small></td>
      <td style="color:var(--sub)">${v.meaning}</td>
      <td style="font-size:13px;color:var(--sub)">${v.example}<br><span style="color:var(--hint)">${v.translation}</span></td>
      <td style="text-align:center">
        <button onclick="toggleListStar(${v.i},${S.lSeries})" style="background:none;border:none;font-size:18px;cursor:pointer;opacity:${u.has(v.i)?1:.3}">⭐</button>
      </td>
    </tr>`).join('');
  const total=Math.ceil(rows.length/RPP);
  const pg=document.getElementById('listPager');
  if(total<=1){pg.innerHTML='';return;}
  const pages=[];
  for(let p=Math.max(1,S.lPage-3);p<=Math.min(total,S.lPage+3);p++) pages.push(p);
  pg.innerHTML=`<button class="pg-btn" onclick="lGo(1)">«</button><button class="pg-btn" onclick="lGo(${S.lPage-1})">‹</button>`
    +pages.map(p=>`<button class="pg-btn${p===S.lPage?' on':''}" onclick="lGo(${p})">${p}</button>`).join('')
    +`<button class="pg-btn" onclick="lGo(${S.lPage+1})">›</button><button class="pg-btn" onclick="lGo(${total})">»</button>`;
}
function lGo(p){
  const d=S.lSeries===900?VOCAB_900:VOCAB_800;
  S.lPage=Math.max(1,Math.min(p,Math.ceil(d.length/RPP)));
  renderList();
}
function toggleListStar(i,series){
  const u=series===900?S.u900:S.u800;
  if(u.has(i)) u.delete(i); else u.add(i);
  persist(); renderList(); updateSide();
}

/* 일차별 */
function setDaySeries(s){
  S.dSeries=s; S.selDay=null;
  document.getElementById('dBtnS900').className='btn btn-sm'+(s===900?' btn-p':'');
  document.getElementById('dBtnS800').className='btn btn-sm'+(s===800?' btn-p':'');
  renderDayGrid();
}
function renderDayGrid(){
  const d=S.dSeries===900?VOCAB_900:VOCAB_800;
  const u=S.dSeries===900?S.u900:S.u800;
  const ds=S.dSeries===900?32:68;
  const totalDays=Math.ceil(d.length/ds);
  document.getElementById('daySeriesInfo').textContent='총 '+totalDays+'일차 · '+ds+'개/일차';
  const grid=document.getElementById('dayGrid');
  grid.innerHTML='';
  for(let day=1;day<=totalDays;day++){
    const s2=(day-1)*ds, e2=Math.min(day*ds,d.length);
    const unk=d.slice(s2,e2).filter((_,i)=>u.has(s2+i)).length;
    const btn=document.createElement('button');
    btn.className='day-chip'+(S.selDay===day?' on':unk===0&&s2<d.length?' done':'');
    btn.innerHTML=`<div style="font-weight:700">${day}일차</div><div style="font-size:11px;opacity:.7">${e2-s2}개</div>`;
    btn.onclick=(()=>{const dd=day;return()=>selectDay(dd);})();
    grid.appendChild(btn);
  }
  document.getElementById('dayWordArea').style.display=S.selDay?'block':'none';
  if(S.selDay) renderDayWords(S.selDay);
}
function selectDay(day){
  S.selDay=day; renderDayGrid();
  document.getElementById('dayWordArea').scrollIntoView({behavior:'smooth',block:'start'});
}
function renderDayWords(day){
  const d=S.dSeries===900?VOCAB_900:VOCAB_800;
  const u=S.dSeries===900?S.u900:S.u800;
  const ds=S.dSeries===900?32:68;
  const s2=(day-1)*ds, e2=Math.min(day*ds,d.length);
  document.getElementById('dayAreaTitle').textContent=day+'일차 ('+(s2+1)+'~'+e2+'번, '+(e2-s2)+'개)';
  document.getElementById('dayWordBody').innerHTML=d.slice(s2,e2).map((v,li)=>{
    const gi=s2+li;
    return `<tr>
      <td style="color:var(--hint);font-size:12px">${gi+1}</td>
      <td style="font-weight:600;color:var(--primary)">${v.word}</td>
      <td style="color:var(--sub)">${v.meaning}</td>
      <td style="font-size:13px;color:var(--sub)">${v.example}<br><span style="color:var(--hint)">${v.translation}</span></td>
      <td style="text-align:center">
        <button onclick="toggleDayStar(${gi})" style="background:none;border:none;font-size:18px;cursor:pointer;opacity:${u.has(gi)?1:.3}">⭐</button>
      </td>
    </tr>`;
  }).join('');
}
function toggleDayStar(i){
  const u=S.dSeries===900?S.u900:S.u800;
  if(u.has(i)) u.delete(i); else u.add(i);
  persist(); renderDayWords(S.selDay); renderDayGrid();
}
function studyThisDay(){
  if(!S.selDay) return;
  const ds=S.dSeries===900?32:68;
  const s2=(S.selDay-1)*ds;
  const e2=Math.min(S.selDay*ds,(S.dSeries===900?VOCAB_900:VOCAB_800).length);
  S.series=S.dSeries;
  S.pool=shuffle([...Array(e2-s2).keys()].map(i=>s2+i));
  S.idx=0; S.filter='all';
  document.getElementById('filterSel').value='all';
  document.getElementById('filterCount').textContent=S.selDay+'일차 ('+(e2-s2)+'개)';
  setSeries(S.dSeries);
  goPage('study',document.querySelector('.hdr-tab'));
  renderCard();
}

/* 퀴즈 */
function setQuizSeries(s){
  S.qSeries=s;
  document.getElementById('qBtnS900').className='btn btn-sm'+(s===900?' btn-p':'');
  document.getElementById('qBtnS800').className='btn btn-sm'+(s===800?' btn-p':'');
}
function setQuizRange(r){
  S.qRange=r;
  document.getElementById('qRangeAll').className='btn btn-sm'+(r==='all'?' btn-p':'');
  document.getElementById('qRangeUnknown').className='btn btn-sm'+(r==='unknown'?' btn-p':'');
}
function setQuizType(t){
  S.qType=t;
  ['word','mean','fill'].forEach(x=>{
    const el=document.getElementById('qType'+x.charAt(0).toUpperCase()+x.slice(1));
    if(el) el.className='q-type-btn'+(t===x?' on':'');
  });
}
function startQuiz(){
  const d=S.qSeries===900?VOCAB_900:VOCAB_800;
  const u=S.qSeries===900?S.u900:S.u800;
  let pool=d.map((_,i)=>i);
  if(S.qRange==='unknown') pool=pool.filter(i=>u.has(i));
  if(S.qType==='fill') pool=pool.filter(i=>d[i].example&&d[i].example.toLowerCase().includes(d[i].word.split(' ')[0].toLowerCase()));
  if(!pool.length){ alert('퀴즈할 단어가 없습니다.'); return; }
  S.qCount=Math.min(parseInt(document.getElementById('qCount').value)||10,pool.length);
  S.qList=shuffle([...pool]).slice(0,S.qCount);
  S.qIdx=0; S.qScore=0; S.qAnswered=false;
  document.getElementById('quizSetup').style.display='none';
  document.getElementById('quizPlay').style.display='block';
  document.getElementById('quizResult').style.display='none';
  renderQ();
}
function renderQ(){
  if(S.qIdx>=S.qList.length){ showQuizResult(); return; }
  const d=S.qSeries===900?VOCAB_900:VOCAB_800;
  const ri=S.qList[S.qIdx];
  const item=d[ri];
  S.qAnswered=false;
  document.getElementById('qProgLabel').textContent=(S.qIdx+1)+' / '+S.qList.length;
  document.getElementById('qProgFill').style.width=((S.qIdx+1)/S.qList.length*100)+'%';
  document.getElementById('qScoreLabel').textContent=S.qScore+'점';
  document.getElementById('qResultMsg').style.display='none';
  document.getElementById('qNextBtn').style.display='none';
  document.getElementById('qFillArea').style.display='none';
  document.getElementById('qOptions').innerHTML='';

  const wrongs=d.map((_,i)=>i).filter(i=>i!==ri).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[ri,...wrongs].sort(()=>Math.random()-.5);

  if(S.qType==='fill'){
    const tok=item.word.split(' ')[0];
    const blanked=item.example.replace(new RegExp(tok.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),'_____');
    document.getElementById('qQuestion').textContent='빈칸에 들어갈 단어를 고르세요.';
    document.getElementById('qFillArea').style.display='block';
    document.getElementById('qSentence').textContent=blanked;
    document.getElementById('qSentenceKo').textContent='→ '+item.translation;
    document.getElementById('qOptions').innerHTML=opts.map(oi=>
      `<button class="q-opt" onclick="checkOpt(${oi},${ri},'word')">${d[oi].word}</button>`).join('');
  } else if(S.qType==='word'){
    document.getElementById('qQuestion').textContent='"'+item.word+'" 의 뜻은?';
    document.getElementById('qOptions').innerHTML=opts.map(oi=>
      `<button class="q-opt" onclick="checkOpt(${oi},${ri},'meaning')">${d[oi].meaning}</button>`).join('');
  } else {
    document.getElementById('qQuestion').textContent='"'+item.meaning+'" 의 영어 단어는?';
    document.getElementById('qOptions').innerHTML=opts.map(oi=>
      `<button class="q-opt" onclick="checkOpt(${oi},${ri},'word')">${d[oi].word}</button>`).join('');
  }
}
function checkOpt(chosen,correct,key){
  if(S.qAnswered) return;
  S.qAnswered=true;
  const d=S.qSeries===900?VOCAB_900:VOCAB_800;
  const u=S.qSeries===900?S.u900:S.u800;
  const btns=[...document.querySelectorAll('.q-opt')];
  btns.forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  if(ok){ S.qScore++; document.getElementById('qScoreLabel').textContent=S.qScore+'점'; }
  else { u.add(correct); persist(); }
  btns.forEach(b=>{
    if(b.textContent.trim()===d[correct][key]) b.classList.add('correct');
    else if(b.textContent.trim()===d[chosen][key]&&!ok) b.classList.add('wrong');
  });
  const msg=document.getElementById('qResultMsg');
  msg.style.display='block';
  msg.className='q-result '+(ok?'r-ok':'r-ng');
  msg.innerHTML=ok?'✅ 정답!':`❌ 오답! 정답: <strong>${d[correct][key]}</strong> <span style="font-size:12px;color:var(--hint)">(⭐ 모르는 단어로 추가됨)</span>`;
  document.getElementById('qNextBtn').style.display='block';
}
function nextQuestion(){ S.qIdx++; renderQ(); }
function showQuizResult(){
  document.getElementById('quizPlay').style.display='none';
  document.getElementById('quizResult').style.display='block';
  const pct=Math.round(S.qScore/S.qList.length*100);
  document.getElementById('resultScore').textContent=S.qScore+' / '+S.qList.length;
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪';
  document.getElementById('resultLabel').textContent=pct+'% 정답 '+emoji;
}
function showQuizSetup(){
  document.getElementById('quizSetup').style.display='block';
  document.getElementById('quizPlay').style.display='none';
  document.getElementById('quizResult').style.display='none';
}

/* 문법 */
function setGramTab(t,btn){
  document.querySelectorAll('.gram-tab').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  document.querySelectorAll('.gram-content').forEach(el=>el.classList.remove('on'));
  document.getElementById('gram-'+t).classList.add('on');
}
function renderGrammar(){
  document.getElementById('prepList').innerHTML=GRAMMAR.prepositions.map(p=>`
    <div class="prep-card">
      <div class="prep-word">${p.word}</div>
      <div class="prep-means">${p.meanings.map(m=>`<span class="badge b-blue">${m}</span>`).join('')}</div>
      ${p.examples.map(e=>`<div class="prep-ex">• ${e}</div>`).join('')}
    </div>`).join('');
  document.getElementById('tvBody').innerHTML=GRAMMAR.transitive.map(r=>`<tr>
    <td><strong>${r.meaning}</strong></td>
    <td><span class="badge b-blue">${r.vi||'-'}</span></td>
    <td><span class="badge b-green">${r.vt||'-'}</span></td>
    <td><span class="badge b-purple">${r.both||'-'}</span></td>
    <td class="tip-cell">${r.tip||''}</td></tr>`).join('');
  document.getElementById('countBody').innerHTML=GRAMMAR.countable.map(r=>`<tr>
    <td><strong>${r.category}</strong></td>
    <td>${r.countable||'-'}</td>
    <td>${r.uncountable||'-'}</td>
    <td class="tip-cell">${r.tip||''}</td></tr>`).join('');
  document.getElementById('gerBody').innerHTML=GRAMMAR.gerund.map(r=>`<tr>
    <td><strong>${r.category}</strong></td>
    <td><span class="badge b-amber">${r.gerund||'-'}</span></td>
    <td><span class="badge b-green">${r.infinitive||'-'}</span></td>
    <td><span class="badge b-purple">${r.both||'-'}</span></td>
    <td class="tip-cell">${r.tip||''}</td></tr>`).join('');
}

/* 통계 */
function renderStats(){
  const u9=S.u900.size, u8=S.u800.size;
  const t9=VOCAB_900.length, t8=VOCAB_800.length;
  const p9=Math.round((t9-u9)/t9*100), p8=Math.round((t8-u8)/t8*100);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-big"><div class="stat-big-val">${t9}</div><div class="stat-big-label">900 총 단어</div></div>
    <div class="stat-big"><div class="stat-big-val" style="color:var(--green)">${t9-u9}</div><div class="stat-big-label">900 학습 완료</div><div style="font-size:13px;color:var(--sub)">${p9}%</div></div>
    <div class="stat-big"><div class="stat-big-val" style="color:var(--red)">${u9}</div><div class="stat-big-label">900 모르는 단어</div></div>
    <div class="stat-big"><div class="stat-big-val">${t8}</div><div class="stat-big-label">800 총 단어</div></div>
    <div class="stat-big"><div class="stat-big-val" style="color:var(--green)">${t8-u8}</div><div class="stat-big-label">800 학습 완료</div><div style="font-size:13px;color:var(--sub)">${p8}%</div></div>
    <div class="stat-big"><div class="stat-big-val" style="color:var(--red)">${u8}</div><div class="stat-big-label">800 모르는 단어</div></div>`;
  const hg=document.getElementById('heatGrid');
  hg.innerHTML='';
  for(let day=1;day<=30;day++){
    const s2=(day-1)*32, e2=Math.min(day*32,VOCAB_900.length);
    const unk=VOCAB_900.slice(s2,e2).filter((_,i)=>S.u900.has(s2+i)).length;
    const r=1-unk/(e2-s2);
    const div=document.createElement('div');
    div.className='heat-cell'+(r>=1?' h3':r>=.5?' h2':r>0?' h1':'');
    div.title=day+'일차: '+Math.round(r*100)+'% 학습';
    hg.appendChild(div);
  }
}

/* 페이지 전환 */
function goPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.querySelectorAll('.hdr-tab').forEach(b=>b.classList.remove('on'));
  if(btn&&btn.classList) btn.classList.add('on');
  stopTimer();
  if(p==='list') renderList();
  if(p==='days') renderDayGrid();
  if(p==='stats') renderStats();
}

/* 다크모드 */
function toggleDark(){
  document.body.classList.toggle('dark');
  localStorage.setItem('dark',document.body.classList.contains('dark')?'1':'0');
}

/* 초기화 */
function init(){
  if(localStorage.getItem('dark')==='1') document.body.classList.add('dark');
  loadProg();
  buildPool();
  renderCard();
  renderGrammar();
}
init();
</script>
